                { id:'g5-w5-ra', topicId:'t_g5', type:'riseabove', title:'Week 5 總結：錯誤如何升成高風險', content:'第五組第五週的進步，是把『幻覺錯誤』改寫成『錯誤如何在特定任務、表述條件與穩定性下升成高風險』，並建立了實證測試計畫。', author:'stu_g5_liao', x:15600, y:3800, parentId:'g5-w5-20', date:DATES.W5+200000, cluster:'C', promisingness:100 },

                // --- Week 6 (21 篇) ---
                { id:'g5-w6-1', topicId:'t_g5', type:'question', title:'風險來自一整套表現方式？', content:'測試跑下來，很多高風險錯都有共通點：講得很順、很肯定、還不容易被抓包。這是不是表示風險不是只來自內容錯，而是來自一整套表現方式？', author:'stu_g5_liao', x:15850, y:3800, parentId:'g5-w5-ra', date:DATES.W6, cluster:'C', promisingness:92 },
                { id:'g5-w6-2', topicId:'t_g5', type:'counter', title:'機制怎麼避免空泛？', content:'如果現在要講『這是一個機制』，那我們要怎麼論述才不會聽起來只是一句空泛的形容詞？', author:'stu_g5_xie', x:16100, y:3600, parentId:'g5-w6-1', date:DATES.W6+10000, cluster:'A', promisingness:89 },
                { id:'g5-w6-3', topicId:'t_g5', type:'extend', title:'信任也被放進來', content:'如果錯誤會因為表達方式被放大，那使用者的『信任與依賴』其實也是這個機制的一部分。', author:'stu_g5_liu', x:16100, y:4000, parentId:'g5-w6-1', date:DATES.W6+20000, cluster:'B', promisingness:94 },
                { id:'g5-w6-4', topicId:'t_g5', type:'improve', title:'失真×流暢×自信×低可辨識', content:'我們先把機制抓成一個乘法公式：失真內容 × 流暢語言 × 過度自信 × 低可辨識。', author:'stu_g5_liao', x:16350, y:3600, parentId:'g5-w6-2', date:DATES.W6+30000, cluster:'A', promisingness:98 },
                { id:'g5-w6-5', topicId:'t_g5', type:'extend', title:'這是一個連鎖反應', content:'也就是說，這是一個連鎖反應，這四個條件都湊齊了，災難才會發生。', author:'stu_g5_xie', x:16600, y:3600, parentId:'g5-w6-4', date:DATES.W6+40000, cluster:'A', promisingness:96 },
                { id:'g5-w6-6', topicId:'t_g5', type:'extend', title:'湊齊才發生災難', content:'這四個元素就像炸藥跟引信，單獨存在不危險，碰在一起就爆。', author:'stu_g5_liu', x:16850, y:3600, parentId:'g5-w6-5', date:DATES.W6+50000, cluster:'A', promisingness:95 },
                { id:'g5-w6-7', topicId:'t_g5', type:'extend', title:'中間斷掉就解除', content:'反過來說，只要中間有一環被打破（例如 AI 語氣突然心虛，或是語言不流暢），使用者的警覺性就會拉高，風險就解除了。', author:'stu_g5_liao', x:17100, y:3600, parentId:'g5-w6-6', date:DATES.W6+60000, cluster:'A', promisingness:97 },
                { id:'g5-w6-8', topicId:'t_g5', type:'improve', title:'完美的知識陷阱', content:'但如果四環相扣，這就是一個為人類大腦量身打造的「完美的知識陷阱」。', author:'stu_g5_xie', x:17350, y:3600, parentId:'g5-w6-7', date:DATES.W6+70000, cluster:'A', promisingness:99 },
                { id:'g5-w6-9', topicId:'t_g5', type:'question', title:'這種陷阱怎麼防？', content:'既然這麼完美，那這種陷阱有辦法防備嗎？我們總不能叫大家不要用 AI。', author:'stu_g5_liu', x:16350, y:4000, parentId:'g5-w6-3', date:DATES.W6+80000, cluster:'B', promisingness:90 },
                { id:'g5-w6-10', topicId:'t_g5', type:'improve', title:'提高 AI 識讀力', content:'唯一的方法就是從使用者端著手，提高大家的「AI 識讀力」，懂得辨識那種刻意包裝的自信。', author:'stu_g5_liao', x:16600, y:4000, parentId:'g5-w6-9', date:DATES.W6+90000, cluster:'B', promisingness:93 },
                { id:'g5-w6-11', topicId:'t_g5', type:'extend', title:'辨識刻意包裝的自信', content:'對，我們要教育大家看出它「在裝懂」的痕跡。', author:'stu_g5_xie', x:16850, y:4000, parentId:'g5-w6-10', date:DATES.W6+100000, cluster:'B', promisingness:92 },
                { id:'g5-w6-12', topicId:'t_g5', type:'improve', title:'要求 AI 展現不確定性', content:'或者是從系統端著手，要求 AI 廠商在模型不確定的時候，必須強制它展現出不確定，不能不懂裝懂。', author:'stu_g5_liu', x:17100, y:4000, parentId:'g5-w6-11', date:DATES.W6+110000, cluster:'B', promisingness:95 },
                { id:'g5-w6-13', topicId:'t_g5', type:'counter', title:'商業邏輯的阻礙', content:'但這很難，因為廠商為了讓產品看起來很聰明、體驗很好，通常會拔掉它心虛的語氣。', author:'stu_g5_liao', x:17350, y:4000, parentId:'g5-w6-12', date:DATES.W6+120000, cluster:'B', promisingness:94 },

                    userList: window.state.userList,
                    topics: window.state.topics,
                    nodes: window.state.nodes,
                    trash: window.state.trash
                };
                db.collection(DB_COLLECTION).doc(DB_DOC).set(dataToSave)
                  .then(() => { console.log("Cloud Saved"); })
                  .catch((e) => { console.error("Save error:", e); });
                window.dataManager.saveLocalSession();
            },
            saveLocalSession: () => {
                if (!window.state.user) return;
                const userKey = Object.keys(window.state.userList).find(key => window.state.userList[key].id === window.state.user.id);
                const localState = {
                    currentUserKey: userKey || 'teacher',
                    currentView: window.state.currentView, 
                    currentTopicId: window.state.currentTopicId
                };
                localStorage.setItem('kb_local_session', JSON.stringify(localState));
            },
            load: () => {
                db.collection(DB_COLLECTION).doc(DB_DOC).onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        window.state.userList = data.userList || window.SEED_DATA.userList;
                        window.state.topics = data.topics || window.SEED_DATA.topics;
                        window.state.nodes = data.nodes || window.SEED_DATA.nodes;
                        window.state.trash = data.trash || [];
                        
                        const localSession = localStorage.getItem('kb_local_session');
                        let userKey = 'teacher';
                        if(localSession) {
                            try {
                                const parsed = JSON.parse(localSession);
                                if(window.state.userList[parsed.currentUserKey]) {
                                    userKey = parsed.currentUserKey;
                                }
                            } catch(e){}
                        }
                        
                        window.state.user = window.state.userList[userKey] || window.state.userList['teacher'];

                        if (window.state.currentView === 'entrance') window.ui.renderEntrance();
                        else if (window.state.currentView === 'canvas') window.ui.renderCanvas();
                        else if (window.state.currentView === 'profile') window.ui.renderProfile();
                        window.ui.renderUserInfo();
                        window.ui.renderUserMenu();
                        window.app.updateTrashBadge();
                    } else {
                        window.state.userList = JSON.parse(JSON.stringify(window.SEED_DATA.userList));
                        window.state.topics = JSON.parse(JSON.stringify(window.SEED_DATA.topics));
                        window.state.nodes = JSON.parse(JSON.stringify(window.SEED_DATA.nodes));
                        window.state.trash = [];
                        window.state.user = window.state.userList['teacher'];
                        window.dataManager.save();
                    }

                    console.error("Firebase Snapshot Error:", error);
                    window.ui.showToast("無法連接至雲端資料庫，目前使用單機模式。", "error");

        // --- 4. Canvas Logic ---
        window.app.canvas = {
            virtualWidth: 36000,
            virtualHeight: 4800,
            
            renderLoop: () => {
                if (window.state.currentView === 'canvas') {
                    const nodes = window.state.nodes.filter(n => n.topicId === window.state.currentTopicId);
                    if (window.state.canvas.draggedNodeId || window.state.canvas.isAnimating) {
                            window.ui.drawConnections(nodes);
                    }
                }
                requestAnimationFrame(window.app.canvas.renderLoop);
            },
            
            // Scrollbar Logic
            updateScrollbars: () => {
                const wrapper = document.getElementById('canvas-wrapper');
                if(!wrapper) return;
                const cw = wrapper.clientWidth;
                const ch = wrapper.clientHeight;
                const scale = window.state.canvas.scale;
                const vw = window.app.canvas.virtualWidth * scale;
                const vh = window.app.canvas.virtualHeight * scale;

                const hScroll = document.getElementById('h-scrollbar');
                const vScroll = document.getElementById('v-scrollbar');
                const hThumb = document.getElementById('h-thumb');
                const vThumb = document.getElementById('v-thumb');

                if (!hScroll || !vScroll || !cw) return;

                // 增加 80% 螢幕的邊界彈性 (Padding)
                const paddingX = cw * 0.8;
                const paddingY = ch * 0.8;

                let minX = Math.min(0, cw - vw) - paddingX;
                let maxX = paddingX;
                let minY = Math.min(0, ch - vh) - paddingY;
                let maxY = paddingY;

                // X Axis
                if (vw > cw) {
                    hScroll.style.opacity = '1';
                    hScroll.style.pointerEvents = 'auto';
                    let thumbW = Math.max(40, (cw / (vw + paddingX * 2)) * hScroll.clientWidth);
                    hThumb.style.width = `${thumbW}px`;
                    
                    let progressX = (maxX - window.state.canvas.offsetX) / (maxX - minX); 
                    progressX = Math.max(0, Math.min(1, progressX));
                    hThumb.style.left = `${progressX * (hScroll.clientWidth - thumbW)}px`;
                } else {
                    hScroll.style.opacity = '0';
                    hScroll.style.pointerEvents = 'none';
                    window.state.canvas.offsetX = 0;
                }

                // Y Axis
                if (vh > ch) {
                    vScroll.style.opacity = '1';
                    vScroll.style.pointerEvents = 'auto';
                    let thumbH = Math.max(40, (ch / (vh + paddingY * 2)) * vScroll.clientHeight);
                    vThumb.style.height = `${thumbH}px`;
                    
                    let progressY = (maxY - window.state.canvas.offsetY) / (maxY - minY);
                    progressY = Math.max(0, Math.min(1, progressY));
                    vThumb.style.top = `${progressY * (vScroll.clientHeight - thumbH)}px`;
                } else {
                    vScroll.style.opacity = '0';
                    vScroll.style.pointerEvents = 'none';
                    window.state.canvas.offsetY = 0;
                }
            },
            
            initScrollbars: () => {
                const hThumb = document.getElementById('h-thumb');
                const vThumb = document.getElementById('v-thumb');
                const hTrack = document.getElementById('h-scrollbar');
                const vTrack = document.getElementById('v-scrollbar');
                if(!hThumb || !vThumb) return;

                let isDraggingH = false;
                let isDraggingV = false;
                let startX, startY, startOffsetX, startOffsetY, startRatioX, startRatioY;

                const onMove = (e) => {
                    if(!isDraggingH && !isDraggingV) return;
                    const c = window.app.canvas.getCoords(e);
                    const w = document.getElementById('canvas-wrapper');
                    const cw = w.clientWidth;
                    const ch = w.clientHeight;
                    const scale = window.state.canvas.scale;
                    const vw = window.app.canvas.virtualWidth * scale;
                    const vh = window.app.canvas.virtualHeight * scale;

                    const paddingX = cw * 0.8;
                    const paddingY = ch * 0.8;
                    let minX = Math.min(0, cw - vw) - paddingX;
                    let maxX = paddingX;
                    let minY = Math.min(0, ch - vh) - paddingY;
                    let maxY = paddingY;

                    if(isDraggingH) {
                        const dx = c.x - startX;
                        const trackW = hTrack.clientWidth;
                        const thumbW = hThumb.clientWidth;
                        const ratioDelta = dx / (trackW - thumbW);
                        const newRatio = startRatioX + ratioDelta;
                        window.state.canvas.offsetX = maxX - newRatio * (maxX - minX);
                        window.state.canvas.offsetX = Math.max(minX, Math.min(maxX, window.state.canvas.offsetX));
                    }
                    if(isDraggingV) {
                        const dy = c.y - startY;
                        const trackH = vTrack.clientHeight;
                        const thumbH = vThumb.clientHeight;
                        const ratioDelta = dy / (trackH - thumbH);
                        const newRatio = startRatioY + ratioDelta;
                        window.state.canvas.offsetY = maxY - newRatio * (maxY - minY);
                        window.state.canvas.offsetY = Math.max(minY, Math.min(maxY, window.state.canvas.offsetY));
                    }
                    window.app.canvas.applyTransform();
                };

                const onEnd = () => {
                    isDraggingH = false;
                    isDraggingV = false;
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('mouseup', onEnd);
                    document.removeEventListener('touchend', onEnd);
                };

                const bindDrag = (thumb, isH) => {
                    const startDrag = (e) => {
                        e.stopPropagation();
                        if(isH) isDraggingH = true; else isDraggingV = true;
                        const c = window.app.canvas.getCoords(e);
                        startX = c.x; startY = c.y;
                        startOffsetX = window.state.canvas.offsetX;
                        startOffsetY = window.state.canvas.offsetY;
                        
                        const w = document.getElementById('canvas-wrapper');
                        const cw = w.clientWidth;
                        const ch = w.clientHeight;
                        const scale = window.state.canvas.scale;
                        const vw = window.app.canvas.virtualWidth * scale;
                        const vh = window.app.canvas.virtualHeight * scale;

                        const paddingX = cw * 0.8;
                        const paddingY = ch * 0.8;
                        let minX = Math.min(0, cw - vw) - paddingX;
                        let maxX = paddingX;
                        let minY = Math.min(0, ch - vh) - paddingY;
                        let maxY = paddingY;

                        startRatioX = (maxX - startOffsetX) / (maxX - minX);
                        startRatioY = (maxY - startOffsetY) / (maxY - minY);

                        document.addEventListener('mousemove', onMove);
                        document.addEventListener('touchmove', onMove, {passive: false});
                        document.addEventListener('mouseup', onEnd);
                        document.addEventListener('touchend', onEnd);
                    };
                    thumb.addEventListener('mousedown', startDrag);
                    thumb.addEventListener('touchstart', startDrag, {passive: false});
                };
                
                bindDrag(hThumb, true);
                bindDrag(vThumb, false);
            },

            applyTransform: () => {
                const w = document.getElementById('canvas-wrapper');
                if(!w) return;
                const cw = w.clientWidth;
                const ch = w.clientHeight;
                const scale = window.state.canvas.scale;
                const vw = window.app.canvas.virtualWidth * scale;
                const vh = window.app.canvas.virtualHeight * scale;
                
                // Bounds enforcement 允許大幅度拖曳出邊界
                const paddingX = cw * 0.8;
                const paddingY = ch * 0.8;

                let minX = Math.min(0, cw - vw) - paddingX;
                let maxX = paddingX;
                let minY = Math.min(0, ch - vh) - paddingY;
                let maxY = paddingY;
                
                window.state.canvas.offsetX = Math.max(minX, Math.min(maxX, window.state.canvas.offsetX));
                window.state.canvas.offsetY = Math.max(minY, Math.min(maxY, window.state.canvas.offsetY));

                const el = document.getElementById('canvas-content');
                if(el) el.style.transform = `translate(${window.state.canvas.offsetX}px, ${window.state.canvas.offsetY}px) scale(${window.state.canvas.scale})`;
                const bg = document.getElementById('canvas-bg');
                if(bg) bg.style.backgroundPosition = `${window.state.canvas.offsetX}px ${window.state.canvas.offsetY}px`;
                
                window.app.canvas.updateScrollbars();
            },
            
            getCoords: (e) => (e.touches && e.touches.length > 0) ? {x: e.touches[0].clientX, y: e.touches[0].clientY} : {x: e.clientX, y: e.clientY},
            getDistance: (touches) => {
                if (!touches || touches.length < 2) return 1; 
                return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
            },
            toggleMode: () => {
                window.state.canvas.isPanMode = !window.state.canvas.isPanMode;
                const w = document.getElementById('canvas-wrapper');
                if (window.state.canvas.isPanMode) {
                    if(w) w.style.cursor = 'grab';
                    window.state.canvas.isSelecting = false;
                    const sb = document.getElementById('selection-box');
                    if(sb) sb.style.display = 'none';
                    window.ui.showToast('已切換為：拖曳模式 (按左鍵拖曳)', 'success');
                } else {
                    if(w) w.style.cursor = 'default';
                    window.ui.showToast('已切換為：選取模式 (按左鍵框選)', 'info');
                }
                window.ui.renderCanvas();
            },
            handleDoubleClick: (e) => {
                if (e.target.closest('.node-card')) return;
                window.app.canvas.toggleMode();
            },
            startPan: (e) => {
                if (e.touches && e.touches.length === 2) {
                    window.state.canvas.isPinching = true;
                    window.state.canvas.lastPinchDist = window.app.canvas.getDistance(e.touches);
                    window.state.canvas.startPinchScale = window.state.canvas.scale;
                    return; 
                }

                if(e.target.closest('.node-card')) {
                    const nodeId = e.target.closest('.node-card').id.replace('node-', '');
                    if (!e.shiftKey && !e.ctrlKey && !window.state.selectedNodeIds.includes(nodeId)) {
                        window.state.selectedNodeIds = [];
                        document.querySelectorAll('.node-card.selected-node').forEach(el => el.classList.remove('selected-node'));
                    }
                    if (!window.state.selectedNodeIds.includes(nodeId)) {
                        window.state.selectedNodeIds.push(nodeId);
                        const card = document.getElementById(`node-${nodeId}`);
                        if(card) card.classList.add('selected-node');
                    }
                    return; 
                }
                
                if (e.ctrlKey || window.state.canvas.isPanMode) {
                    window.state.canvas.isDragging = true;
                    const c = window.app.canvas.getCoords(e);
                    window.state.canvas.lastX = c.x; 
                    window.state.canvas.lastY = c.y;
                    const w = document.getElementById('canvas-wrapper'); 
                    if(w) w.style.cursor = 'grabbing';
                    return;
                }
                
                window.state.canvas.isSelecting = true;
                const c = window.app.canvas.getCoords(e);
                window.state.canvas.selectionStart = {x: c.x, y: c.y};
                window.state.canvas.selectionCurrent = {x: c.x, y: c.y};
                const box = document.getElementById('selection-box');
                box.style.left = c.x + 'px';
                box.style.top = c.y + 'px';
                box.style.width = '0px';
                box.style.height = '0px';
                box.style.display = 'block';
                
                if (!e.shiftKey) {
                    window.state.selectedNodeIds = [];
                    document.querySelectorAll('.node-card.selected-node').forEach(el => el.classList.remove('selected-node'));
                }
            },
            pan: (e) => {
                if (window.state.canvas.isPinching && e.touches && e.touches.length === 2) {
                    const dist = window.app.canvas.getDistance(e.touches);
                    const zoomFactor = dist / window.state.canvas.lastPinchDist;
                    const oldScale = window.state.canvas.scale;
                    const newScale = Math.min(Math.max(0.2, window.state.canvas.startPinchScale * zoomFactor), 3);
                    
                    if (newScale !== oldScale) {
                        const wrapper = document.getElementById('canvas-wrapper');
                        const rect = wrapper.getBoundingClientRect();
                        const mx = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - rect.left;
                        const my = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
                        
                        const scaleChange = newScale / oldScale;
                        window.state.canvas.offsetX = mx - (mx - window.state.canvas.offsetX) * scaleChange;
                        window.state.canvas.offsetY = my - (my - window.state.canvas.offsetY) * scaleChange;
                        window.state.canvas.scale = newScale;
                    }
                    
                    // 持續更新雙指捏合的狀態，確保平滑過渡
                    window.state.canvas.lastPinchDist = dist;
                    window.state.canvas.startPinchScale = newScale;
                    
                    window.app.canvas.applyTransform();
                    return;
                }

                const c = window.app.canvas.getCoords(e);
                if(window.state.canvas.isDragging) {
                    window.state.canvas.offsetX += c.x - window.state.canvas.lastX;
                    window.state.canvas.offsetY += c.y - window.state.canvas.lastY;
                    window.state.canvas.lastX = c.x; window.state.canvas.lastY = c.y;
                    window.app.canvas.applyTransform();
                } else if(window.state.canvas.draggedNodeId) {
                    const dx = (c.x - window.state.canvas.lastX) / window.state.canvas.scale;
                    const dy = (c.y - window.state.canvas.lastY) / window.state.canvas.scale;
                    
                    let nodesToMoveIds = [window.state.canvas.draggedNodeId];
                    if (window.state.selectedNodeIds.includes(window.state.canvas.draggedNodeId)) {
                        nodesToMoveIds = window.state.selectedNodeIds;
                    }

                    nodesToMoveIds.forEach(id => {
                        const node = window.state.nodes.find(n => n.id === id);
                        if(node) {
                            node.x += dx;
                            node.y += dy;
                            const el = document.getElementById(`node-${node.id}`);
                            if(el) {
                                el.style.left = `${node.x}px`;
                                el.style.top = `${node.y}px`;
                            }
                        }
                    });

                    window.state.canvas.lastX = c.x; window.state.canvas.lastY = c.y;
                    const nodes = window.state.nodes.filter(n => n.topicId === window.state.currentTopicId);
                    window.ui.drawConnections(nodes);
                } else if (window.state.canvas.isSelecting) {
                    window.state.canvas.selectionCurrent = {x: c.x, y: c.y};
                    const start = window.state.canvas.selectionStart;
                    const current = window.state.canvas.selectionCurrent;
                    const x = Math.min(start.x, current.x);
                    const y = Math.min(start.y, current.y);
                    const w = Math.abs(current.x - start.x);
                    const h = Math.abs(current.y - start.y);
                    const box = document.getElementById('selection-box');
                    box.style.left = x + 'px';
                    box.style.top = y + 'px';
                    box.style.width = w + 'px';
                    box.style.height = h + 'px';
                }
            },
            handleEnd: (e) => {
                if (window.state.canvas.isPinching && (!e.touches || e.touches.length < 2)) {
                    window.state.canvas.isPinching = false;
                }

                if (window.state.canvas.isDragging) {
                    window.state.canvas.isDragging = false;
                    const cursor = window.state.canvas.isPanMode ? 'grab' : 'default'; 
                    const w = document.getElementById('canvas-wrapper'); 
                    if(w) w.style.cursor = cursor;
                }
                if (window.state.canvas.draggedNodeId) {
                    window.state.canvas.draggedNodeId = null;
                }
                if (window.state.canvas.isSelecting) {
                    const start = window.state.canvas.selectionStart;
                    const current = window.state.canvas.selectionCurrent;
                    const selRect = { 
                        left: Math.min(start.x, current.x), 
                        top: Math.min(start.y, current.y), 
                        right: Math.max(start.x, current.x), 
                        bottom: Math.max(start.y, current.y) 
                    };
                    
                    if (Math.abs(selRect.right - selRect.left) < 5 && Math.abs(selRect.bottom - selRect.top) < 5) {
                            window.state.canvas.isSelecting = false;
                            document.getElementById('selection-box').style.display = 'none';
                            return;
                    }

                    const nodeElements = document.querySelectorAll('.node-card');
                    const newSelectedIds = [];
                    nodeElements.forEach(el => {
                        const rect = el.getBoundingClientRect();
                        if (rect.left < selRect.right && rect.right > selRect.left &&
                            rect.top < selRect.bottom && rect.bottom > selRect.top) {
                            const id = el.id.replace('node-', '');
                            newSelectedIds.push(id);
                        }
                    });
                    
                    newSelectedIds.forEach(id => { 
                        if (!window.state.selectedNodeIds.includes(id)) window.state.selectedNodeIds.push(id); 
                    });
                    
                    document.querySelectorAll('.node-card.selected-node').forEach(el => {
                        const id = el.id.replace('node-', '');
                        if(!window.state.selectedNodeIds.includes(id)) { 
                             el.classList.remove('selected-node');
                        }
                    });

                    window.state.selectedNodeIds.forEach(id => {
                        const el = document.getElementById(`node-${id}`);
                        if(el) el.classList.add('selected-node');
                    });

                    window.state.canvas.isSelecting = false;
                    document.getElementById('selection-box').style.display = 'none';
                }
            },
            handleWheel: (e) => {
                e.preventDefault();
                const wrapper = document.getElementById('canvas-wrapper');
                if (!wrapper) return;
                
                // 取得滑鼠相對於畫布容器的座標
                const rect = wrapper.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;

                const oldScale = window.state.canvas.scale;
                const d = -e.deltaY * 0.001;
                const newScale = Math.min(Math.max(0.2, oldScale + d), 3);

                if (newScale !== oldScale) {
                    // 計算縮放變化率，並動態補償 offsetX 和 offsetY
                    const scaleChange = newScale / oldScale;
                    window.state.canvas.offsetX = mx - (mx - window.state.canvas.offsetX) * scaleChange;
                    window.state.canvas.offsetY = my - (my - window.state.canvas.offsetY) * scaleChange;
                    window.state.canvas.scale = newScale;
                    window.app.canvas.applyTransform();
                }
            },
            zoom: (d) => { 
                const wrapper = document.getElementById('canvas-wrapper');
                if (!wrapper) return;
                
                // 按鈕縮放預設以畫面正中央為中心
                const mx = wrapper.clientWidth / 2;
                const my = wrapper.clientHeight / 2;
                
                const oldScale = window.state.canvas.scale;
                const newScale = Math.min(Math.max(0.2, oldScale + d), 3);
                
                if (newScale !== oldScale) {
                    const scaleChange = newScale / oldScale;
                    window.state.canvas.offsetX = mx - (mx - window.state.canvas.offsetX) * scaleChange;
                    window.state.canvas.offsetY = my - (my - window.state.canvas.offsetY) * scaleChange;
                    window.state.canvas.scale = newScale;
                    window.app.canvas.applyTransform(); 
                }
            },
            fitView: () => { 
                window.state.canvas.scale = window.innerWidth < 768 ? 0.8 : 1; 
                window.state.canvas.offsetX = 0; 
                window.state.canvas.offsetY = 0; 
                window.app.canvas.applyTransform(); 
            },
            startDrag: (e, id) => {
                window.state.canvas.draggedNodeId = id;
                const c = window.app.canvas.getCoords(e);
                window.state.canvas.lastX = c.x; 
                window.state.canvas.lastY = c.y;
                
                if (!window.state.selectedNodeIds.includes(id)) {
                    if (!e.shiftKey) window.state.selectedNodeIds = [];
                    window.state.selectedNodeIds.push(id);
                    
                    document.querySelectorAll('.node-card').forEach(el => el.classList.remove('selected-node'));
                    window.state.selectedNodeIds.forEach(i => { 
                         const el = document.getElementById(`node-${i}`);
                         if(el) el.classList.add('selected-node');
                    });
                }
            },
            toggleHeatmap: () => {
                window.state.canvas.isHeatmapMode = !window.state.canvas.isHeatmapMode;
                window.ui.renderCanvas(); 
            },
            toggleCluster: () => {
                const isCluster = !window.state.canvas.isClusterMode;
                window.state.canvas.isClusterMode = isCluster;
                const nodes = window.state.nodes.filter(n => n.topicId === window.state.currentTopicId);
                
                if (isCluster) {
                    const clusterGroups = { 'A': [], 'B': [], 'C': [], 'Other': [] };
                    nodes.forEach(n => {
                        if (window.CLUSTER_CENTERS[n.cluster]) clusterGroups[n.cluster].push(n);
                        else clusterGroups['Other'].push(n);
                    });
                    
                    const targets = [];
                    const nodeW = 320; 
                    const nodeH = 200; 
                    Object.entries(clusterGroups).forEach(([key, groupNodes]) => {
                        const center = window.CLUSTER_CENTERS[key] || {x: 0, y: 0, width: 1000, height: 1000};
                        const cols = Math.max(1, Math.floor(center.width / nodeW));
                        groupNodes.forEach((n, idx) => {
                            if (n.savedX === undefined) { n.savedX = n.x; n.savedY = n.y; }
                            const col = idx % cols;
                            const row = Math.floor(idx / cols);
                            const startX = center.x - ((cols * nodeW) / 2) + (nodeW / 2);
                            const startY = center.y - (center.height / 2) + 100; 
                            const tx = startX + (col * nodeW);
                            const ty = startY + (row * nodeH);
                            targets.push({ id: n.id, x: tx, y: ty });
                        });
                    });
                    window.app.canvas.animateNodes(targets);
                } else {
                    const targets = nodes.map(n => ({ 
                        id: n.id, 
                        x: n.savedX !== undefined ? n.savedX : n.x, 
                        y: n.savedY !== undefined ? n.savedY : n.y 
                    }));
                    window.app.canvas.animateNodes(targets);
                }
                window.ui.renderCanvas();
            },
            animateNodes: (targets) => {
                const startPositions = {};
                const nodes = window.state.nodes.filter(n => n.topicId === window.state.currentTopicId);
                nodes.forEach(n => { startPositions[n.id] = {x: n.x, y: n.y}; });
                
                const duration = 800; 
                const startTime = performance.now(); 
                window.state.canvas.isAnimating = true;
                
                const animate = (time) => {
                    const elapsed = time - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
                    
                    targets.forEach(target => {
                        const node = nodes.find(n => n.id === target.id);
                        if (node) {
                            const start = startPositions[target.id];
                            node.x = start.x + (target.x - start.x) * ease;
                            node.y = start.y + (target.y - start.y) * ease;
                            const el = document.getElementById(`node-${node.id}`);
                            if (el) { 
                                el.style.left = `${node.x}px`; 
                                el.style.top = `${node.y}px`; 
                            }
                        }
                    });
                    
                    if (progress < 1) { 
                        requestAnimationFrame(animate); 
                    } else { 
                        window.state.canvas.isAnimating = false; 
                        targets.forEach(target => { 
                            const node = nodes.find(n => n.id === target.id); 
                            if(node) { node.x = target.x; node.y = target.y; } 
                        }); 
                        window.ui.drawConnections(nodes); 
                    }
                };
                requestAnimationFrame(animate);
            },
            animatePanTo: (targetX, targetY) => {
                const startX = window.state.canvas.offsetX;
                const startY = window.state.canvas.offsetY;
                const duration = 600;
                const startTime = performance.now();

                const animate = (time) => {
                    const elapsed = time - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 3); // ease-out cubic 曲線

                    window.state.canvas.offsetX = startX + (targetX - startX) * ease;
                    window.state.canvas.offsetY = startY + (targetY - startY) * ease;
                    window.app.canvas.applyTransform();

                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    }
                };
                requestAnimationFrame(animate);
            }
        };

        window.ui = {};

        window.ui.renderTrashList = () => { 
            const list = document.getElementById('trash-list');

                            <button onclick="event.stopPropagation(); window.app.openNodeDetail('${node.id}')" class="w-8 h-8 rounded hover:bg-white/50 text-slate-500 flex justify-center items-center"><i class="fa-solid fa-eye"></i></button>
                            <button onclick="event.stopPropagation(); window.app.openComposer('${node.id}')" class="w-8 h-8 rounded hover:bg-white/50 text-slate-500 flex justify-center items-center"><i class="fa-solid fa-reply"></i></button>
                            ${canDel ? `<button onclick="event.stopPropagation(); window.app.deleteNode('${node.id}')" class="w-8 h-8 rounded hover:bg-white/50 text-slate-500 hover:text-red-500 flex justify-center items-center"><i class="fa-solid fa-xmark"></i></button>` : ''}
                        </div>
                    </div>
                    <div class="p-3 text-sm text-slate-700 leading-relaxed min-h-[60px] pointer-events-none bg-white">
                        <h4 class="font-bold mb-1 text-slate-900 block truncate text-base">${node.title || '無標題'}</h4>
                        <p class="line-clamp-2 text-slate-600">${node.content}</p>
                    </div>
                    <div class="px-3 py-2 bg-slate-50 border-t flex justify-between text-[10px] text-slate-500 items-center rounded-b-xl">
                        <div class="flex items-center gap-2">
                            <img src="${user.avatar}" class="w-4 h-4 rounded-full">
                            <span>${user.name}</span>
                        </div>
                        <span>${new Date(node.date).toLocaleDateString()}</span>
                    </div>
                </div>`;
            }).join('');
        };
        
        window.ui.drawConnections = (nodes) => { 
            const layer = document.getElementById('connections-layer');
            if(!layer) return;
            
            layer.innerHTML = `
            <defs>
                ${Object.keys(window.SCAFFOLDS).map(k => { 
                    const c = { question: '#3b82f6', extend: '#eab308', improve: '#22c55e', counter: '#ef4444', riseabove: '#a855f7' }[k]; 
                    return `<marker id="arrow-${k}" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="${c}" /></marker>`; 
                }).join('')}
            </defs>`;
            
            const cardWidth = window.innerWidth < 768 ? 256 : 288;
            const halfW = cardWidth / 2;
            
            const paths = nodes.filter(n => n.parentId).map(node => {
                const parent = window.state.nodes.find(p => p.id === node.parentId);
                if (!parent) return '';
                const startX = parent.x + halfW; 
                const startY = parent.y + 140; 
                const endX = node.x + halfW; 
                const endY = node.y;
                
                const dist = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                let curveFactor = 0.4; 
                if (endY < startY) curveFactor = 0.6; 
                
                const cp1x = startX; 
                const cp1y = startY + dist * curveFactor; 
                const cp2x = endX; 
                const cp2y = endY - dist * curveFactor;
                
                const colorMap = { question: '#3b82f6', extend: '#eab308', improve: '#22c55e', counter: '#ef4444', riseabove: '#a855f7' };
                return `<path d="M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}" stroke="${colorMap[node.type]}" fill="none" stroke-width="2" stroke-opacity="0.6" marker-end="url(#arrow-${node.type})" />`;
            }).join('');
            
            layer.innerHTML += paths;
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (window.ui && typeof window.ui.init === 'function') {
                window.ui.init();
            } else {
                console.error("UI Init failed");
            }
        });
    </script>
</body>
</html>
