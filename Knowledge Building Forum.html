                { id:'g1-w1-1', topicId:'t_g1', type:'question', title:'空氣裡的一粒灰塵', content:'我現在在想，如果我是空氣裡的一粒灰塵，我真的會乖乖被聲波推去濾網嗎？還是其實我會先被氣流帶著亂跑？我覺得我們以前太快把『有聲波』直接當成『一定會有效』了。', author:'stu_g1_tsai', x:100, y:400, parentId:null, date:DATES.W1, cluster:'A', promisingness:60 },
                { id:'g1-w1-2', topicId:'t_g1', type:'question', title:'數值亂跳的疑問', content:'我有個卡住的地方：如果聲波真的能幫忙，為什麼有時候數值不是直接往下降，反而會先亂跳？這表示中間是不是有別的東西在影響？', author:'stu_g1_chien', x:350, y:200, parentId:'g1-w1-1', date:DATES.W1+1000, cluster:'A', promisingness:62 },
                { id:'g1-w1-3', topicId:'t_g1', type:'question', title:'不同粒徑的差異', content:'如果粒子大小不一樣，它們受到聲波的影響會一樣嗎？PM1.0、PM2.5、PM10 可能根本不是同一種反應。', author:'stu_g1_huang', x:350, y:600, parentId:'g1-w1-1', date:DATES.W1+2000, cluster:'B', promisingness:64 },
                { id:'g1-w1-4', topicId:'t_g1', type:'counter', title:'不能只用顆粒凝聚解釋', content:'如果只用 AI 說的顆粒凝聚來解釋，我覺得有點太快。因為現在我們還沒分清楚，到底是凝聚、氣流，還是濾網本身造成的。', author:'stu_g1_tsai', x:350, y:800, parentId:'g1-w1-1', date:DATES.W1+3000, cluster:'B', promisingness:65 },
                { id:'g1-w1-5', topicId:'t_g1', type:'extend', title:'中間的動態過程', content:'我覺得均燊提到『數值先亂跳』很關鍵，因為那代表我們看到的不只是過濾結果，還有中間的動態過程。', author:'stu_g1_huang', x:600, y:200, parentId:'g1-w1-2', date:DATES.W1+4000, cluster:'A', promisingness:67 },
                { id:'g1-w1-6', topicId:'t_g1', type:'extend', title:'非直線移動', content:'接均燊剛剛說的，我也覺得粒子不一定是直線移動。因為空氣本來就會亂流，如果聲波一打進去，路線可能更複雜，不是只有往前。', author:'stu_g1_tsai', x:600, y:400, parentId:'g1-w1-2', date:DATES.W1+5000, cluster:'A', promisingness:68 },
                { id:'g1-w1-7', topicId:'t_g1', type:'improve', title:'粒子會怎麼走', content:'我們可以先把第一週主題改成『粒子會怎麼走』，而不是『裝置怎麼設計』，這樣比較符合現在的課程方向。', author:'stu_g1_chien', x:850, y:400, parentId:'g1-w1-6', date:DATES.W1+6000, cluster:'A', promisingness:72 },
                { id:'g1-w1-8', topicId:'t_g1', type:'improve', title:'修正提問方向', content:'我覺得我們第一週先不要問『哪個頻率最好』，先改問『粒子在什麼條件下比較容易靠近濾網』，這樣問題會比較準。', author:'stu_g1_tsai', x:1100, y:400, parentId:'g1-w1-7', date:DATES.W1+7000, cluster:'A', promisingness:75 },
                { id:'g1-w1-9', topicId:'t_g1', type:'extend', title:'不急找最佳頻率', content:'我覺得坤冀說的『不要先急著找最佳頻率』很重要。因為如果原理還沒搞懂，就算找到一個有效數值，也可能只是剛好。', author:'stu_g1_chien', x:1350, y:400, parentId:'g1-w1-8', date:DATES.W1+8000, cluster:'A', promisingness:78 },
                { id:'g1-w1-10', topicId:'t_g1', type:'counter', title:'高功率可能擾亂', content:'我不太認同一開始就把高功率當成比較厲害。功率太大也可能把流場搞亂，說不定反而不利。', author:'stu_g1_chien', x:350, y:1000, parentId:'g1-w1-1', date:DATES.W1+9000, cluster:'C', promisingness:60 },
                { id:'g1-w1-11', topicId:'t_g1', type:'improve', title:'擾動再捕捉', content:'我們可以先記下第一週暫時的假設：粒子不是直接被推走，而是先經過擾動、碰撞、重新分布，最後才有可能被濾網抓住。', author:'stu_g1_huang', x:600, y:600, parentId:'g1-w1-3', date:DATES.W1+10000, cluster:'B', promisingness:68 },
                { id:'g1-w1-12', topicId:'t_g1', type:'counter', title:'避免工程視角', content:'如果我們只站在人怎麼設計機器的角度，我覺得很容易把自然現象想得太簡單。粒子不會照我們希望的方式移動。', author:'stu_g1_huang', x:850, y:600, parentId:'g1-w1-11', date:DATES.W1+11000, cluster:'B', promisingness:70 },
                { id:'g1-w1-ra', topicId:'t_g1', type:'riseabove', title:'Week 1 總結：核心從裝置轉向粒子', content:'這週真正重要的不是裝置看起來會不會成功，而是粒子在聲波和氣流裡到底怎麼移動。', author:'stu_g1_tsai', x:850, y:800, parentId:'g1-w1-4', date:DATES.W1+12000, cluster:'C', promisingness:85 },

                // --- Week 2 (13 nodes) ---
                { id:'g1-w2-1', topicId:'t_g1', type:'improve', title:'抓住或逃掉的條件？', content:'我們這週可以把問題改成：『哪些條件會讓粒子比較容易被抓住，哪些條件會讓它逃掉？』這樣比直接問裝置好不好更有方向。', author:'stu_g1_huang', x:1200, y:800, parentId:'g1-w1-ra', date:DATES.W2, cluster:'C', promisingness:65 },
                { id:'g1-w2-2', topicId:'t_g1', type:'question', title:'粒子的局部聚集', content:'我在想，粒子會不會不是被推去濾網，而是先在某些區域聚起來，之後才慢慢被吸過去？如果是這樣，那裝置裡面可能會有死角。', author:'stu_g1_tsai', x:1450, y:600, parentId:'g1-w2-1', date:DATES.W2+1000, cluster:'A', promisingness:68 },
                { id:'g1-w2-3', topicId:'t_g1', type:'question', title:'氣流的穩定性', content:'我比較想追問的是：我們裝置裡的氣流到底穩不穩？如果裡面本來就有渦流，那聲波一進去，可能不是單純變強，而是整個路徑都變了。', author:'stu_g1_chien', x:1450, y:900, parentId:'g1-w2-1', date:DATES.W2+2000, cluster:'B', promisingness:68 },
                { id:'g1-w2-4', topicId:'t_g1', type:'question', title:'聚集的好與壞', content:'如果粒子在濾網前先聚成比較大顆，那到底是好事還是壞事？理論上比較好抓，可是也有可能堵住路徑，讓後面的流場變掉。', author:'stu_g1_huang', x:1450, y:1100, parentId:'g1-w2-1', date:DATES.W2+3000, cluster:'B', promisingness:70 },
                { id:'g1-w2-5', topicId:'t_g1', type:'extend', title:'死角的堆積', content:'坤冀提到死角我很有感，因為如果粒子卡在某個區域，那看起來就像過濾沒那麼差，但其實只是暫時堆在那裡。', author:'stu_g1_chien', x:1700, y:400, parentId:'g1-w2-2', date:DATES.W2+4000, cluster:'A', promisingness:72 },
                { id:'g1-w2-6', topicId:'t_g1', type:'counter', title:'防範單一數據迷思', content:'如果只是看到 PM 降了就說有效，我覺得還不夠。因為有可能只是粒子移到別的地方，不一定真的被穩定過濾掉。', author:'stu_g1_tsai', x:1700, y:600, parentId:'g1-w2-2', date:DATES.W2+5000, cluster:'A', promisingness:74 },
                { id:'g1-w2-7', topicId:'t_g1', type:'counter', title:'留意流場變化', content:'如果我們一直把『凝聚』當核心，我怕會忽略流場本身。也許真正差異大的，不是顆粒有沒有黏在一起，而是它們被帶到哪裡。', author:'stu_g1_chien', x:1950, y:600, parentId:'g1-w2-6', date:DATES.W2+6000, cluster:'A', promisingness:76 },
                { id:'g1-w2-8', topicId:'t_g1', type:'counter', title:'非線性現象', content:'我不太想再用『越強越好』這種說法，因為現在看起來很多現象都不是線性的，太強不一定比較好。', author:'stu_g1_huang', x:2200, y:600, parentId:'g1-w2-7', date:DATES.W2+7000, cluster:'A', promisingness:78 },
                { id:'g1-w2-9', topicId:'t_g1', type:'extend', title:'動態過程的解釋', content:'均燊說的渦流我覺得很值得看，因為這可能解釋為什麼有些數據不是平滑下降，而是先上升再掉。', author:'stu_g1_huang', x:1700, y:900, parentId:'g1-w2-3', date:DATES.W2+8000, cluster:'B', promisingness:74 },
                { id:'g1-w2-10', topicId:'t_g1', type:'extend', title:'大粒子與小粒子差異', content:'接竑睿上週講的粒徑差異，我覺得不同大小的粒子應該真的不能混著看。因為大的可能比較快被攔，小的可能先飄來飄去。', author:'stu_g1_tsai', x:1700, y:1100, parentId:'g1-w2-4', date:DATES.W2+9000, cluster:'B', promisingness:72 },
                { id:'g1-w2-11', topicId:'t_g1', type:'improve', title:'列出影響條件', content:'這週我覺得可以先把影響條件列出來：粒子大小、聲波頻率、功率、氣流方向、濾網位置。先列清楚，後面比較不會亂。', author:'stu_g1_tsai', x:1450, y:1300, parentId:'g1-w2-1', date:DATES.W2+10000, cluster:'C', promisingness:78 },
                { id:'g1-w2-12', topicId:'t_g1', type:'improve', title:'看見數值不等於理解', content:'我覺得第二週可以先加上一句判斷：『看見數值變化，不等於已經理解粒子行為。』這句很像我們現在的狀態。', author:'stu_g1_chien', x:1700, y:1300, parentId:'g1-w2-11', date:DATES.W2+11000, cluster:'C', promisingness:82 },

                { id:'g1-w6-9', topicId:'t_g1', type:'counter', title:'硬湊不算理解', content:'如果最後只是把所有有效條件硬湊在一起，我覺得不算真的理解。因為我們還是要知道到底是哪一個在主導。', author:'stu_g1_chien', x:7700, y:200, parentId:'g1-w6-5', date:DATES.W6+8000, cluster:'A', promisingness:84 },
                { id:'g1-w6-10', topicId:'t_g1', type:'extend', title:'避免混雜現象', content:'均燊提到『先分主因』我很認同，因為第一組這題最怕的就是把很多現象混在一起講。', author:'stu_g1_huang', x:7450, y:300, parentId:'g1-w6-5', date:DATES.W6+9000, cluster:'A', promisingness:88 },
                { id:'g1-w6-11', topicId:'t_g1', type:'improve', title:'解釋成功和失敗', content:'我們可以把本週的重點修成：不是找最漂亮的成功，而是找最能解釋成功和失敗的線索。', author:'stu_g1_huang', x:7700, y:300, parentId:'g1-w6-10', date:DATES.W6+10000, cluster:'A', promisingness:90 },
                { id:'g1-w6-12', topicId:'t_g1', type:'counter', title:'保留失敗案例', content:'如果我們後面完全不提失敗案例，我覺得說服力反而會變弱，因為那代表我們只挑對自己有利的結果。', author:'stu_g1_huang', x:7950, y:300, parentId:'g1-w6-11', date:DATES.W6+11000, cluster:'A', promisingness:88 },
                { id:'g1-w6-13', topicId:'t_g1', type:'extend', title:'淘汰太快的解釋', content:'這週我最明確的感覺是，失敗其實在幫我們淘汰太快的解釋。也就是說，原本看起來很順的說法，只要一碰到波動就站不住，那它可能本來就不夠好。', author:'stu_g1_tsai', x:8200, y:300, parentId:'g1-w6-12', date:DATES.W6+12000, cluster:'A', promisingness:92 },
                { id:'g1-w6-14', topicId:'t_g1', type:'extend', title:'回頭問主因', content:'我的想法是，第一組到這裡不能再只追數值好不好看，而是要比較誠實地回頭問：真正主因到底有沒有被我們抓對。', author:'stu_g1_chien', x:8450, y:300, parentId:'g1-w6-13', date:DATES.W6+13000, cluster:'A', promisingness:94 },
                { id:'g1-w6-15', topicId:'t_g1', type:'extend', title:'分清三者角色', content:'如果用知識建構的角度看，我覺得這週最重要的不是把失敗藏起來，而是承認失敗正在幫我們把『聲場、流場、結構』三者的角色重新分清楚。', author:'stu_g1_huang', x:8700, y:300, parentId:'g1-w6-14', date:DATES.W6+14000, cluster:'A', promisingness:96 },
                { id:'g1-w6-ra', topicId:'t_g1', type:'riseabove', title:'Week 6 總結：失敗是知識入口', content:'第一組不是AI說顆粒凝聚就算結束，也不是數字變好就算成功；失敗與波動都在提醒我們：聲波、氣流與結構誰在主導，不能講得太快。', author:'stu_g1_tsai', x:8950, y:300, parentId:'g1-w6-15', date:DATES.W6+15000, cluster:'C', promisingness:98 },

                // --- Week 7 (16 nodes) ---
                { id:'g1-w7-1', topicId:'t_g1', type:'question', title:'最初假設的改寫', content:'如果回頭看七週，我們最早問的『聲波能不能推粒子去濾網』，現在是不是要改寫了？我覺得答案已經不像一開始那麼直線。', author:'stu_g1_tsai', x:9200, y:400, parentId:'g1-w6-ra', date:DATES.W7, cluster:'A', promisingness:88 },
                { id:'g1-w7-2', topicId:'t_g1', type:'question', title:'真的幫助 vs 看似幫助', content:'我覺得我們最後要回答的問題，是不是其實變成：什麼條件下，聲波真的有幫助；什麼條件下，它只是看起來有幫助？', author:'stu_g1_chien', x:9450, y:200, parentId:'g1-w7-1', date:DATES.W7+1000, cluster:'A', promisingness:90 },
                { id:'g1-w7-3', topicId:'t_g1', type:'question', title:'接受條件組合的複雜性', content:'我現在比較想知道，我們這七週最大的改變是不是：從想抓一個最強答案，變成接受這是一個條件組合問題？', author:'stu_g1_huang', x:9450, y:600, parentId:'g1-w7-1', date:DATES.W7+2000, cluster:'B', promisingness:92 },
                { id:'g1-w7-4', topicId:'t_g1', type:'improve', title:'聲場與結構共同塑造', content:'如果要當成最後的小組整理，我會把它寫成：『過濾效果不是單一頻率造成，而是聲場與結構共同塑造粒子路徑的結果。』', author:'stu_g1_tsai', x:9700, y:200, parentId:'g1-w7-3', date:DATES.W7+3000, cluster:'A', promisingness:94 },
                { id:'g1-w7-5', topicId:'t_g1', type:'improve', title:'判斷需完整', content:'我想把最後判斷再補完整一點：不能只追高效率，也要看穩定、可重複，還有能不能解釋。', author:'stu_g1_chien', x:9950, y:200, parentId:'g1-w7-4', date:DATES.W7+4000, cluster:'A', promisingness:96 },
                { id:'g1-w7-6', topicId:'t_g1', type:'improve', title:'整合為最終共識', content:'如果要做最後整合，我會用一句比較完整的話：『第一組真正研究的不是聲波本身，而是聲波如何透過聲場與流場改變粒子的可過濾性。』', author:'stu_g1_huang', x:10200, y:200, parentId:'g1-w7-5', date:DATES.W7+5000, cluster:'A', promisingness:97 },
                { id:'g1-w7-7', topicId:'t_g1', type:'counter', title:'拒絕最強數字說', content:'所以我現在不太會再接受那種『某個數字最強，所以答案就是它』的講法，因為那太忽略條件了。', author:'stu_g1_tsai', x:9700, y:600, parentId:'g1-w7-3', date:DATES.W7+6000, cluster:'B', promisingness:90 },
                { id:'g1-w7-8', topicId:'t_g1', type:'counter', title:'失敗案例的價值', content:'如果最後只留成功案例，我覺得我們反而會退步，因為這七週最有價值的其實是那些讓我們改想法的失敗。', author:'stu_g1_chien', x:9950, y:600, parentId:'g1-w7-7', date:DATES.W7+7000, cluster:'B', promisingness:92 },
                { id:'g1-w7-9', topicId:'t_g1', type:'counter', title:'避免簡單句', content:'所以我現在不太會說「音量越大越強」或「頻率越高越好」這種簡單句，因為這題後來看起來根本不是這樣。', author:'stu_g1_huang', x:10200, y:600, parentId:'g1-w7-8', date:DATES.W7+8000, cluster:'B', promisingness:94 },
                { id:'g1-w7-10', topicId:'t_g1', type:'extend', title:'改變互動關係', content:'我現在比較會說，聲波不是單獨把粒子推過去，而是改變了粒子、流場和結構之間的互動，讓某些條件下更容易被抓住。', author:'stu_g1_tsai', x:9450, y:400, parentId:'g1-w7-1', date:DATES.W7+9000, cluster:'A', promisingness:92 },
                { id:'g1-w7-11', topicId:'t_g1', type:'extend', title:'共同塑造粒子路徑', content:'坤冀那句『共同塑造粒子路徑』我覺得很接近我們這七週走出來的重點，因為它把聲波和結構都放進去了。', author:'stu_g1_chien', x:9700, y:400, parentId:'g1-w7-4', date:DATES.W7+10000, cluster:'A', promisingness:94 },
                { id:'g1-w7-12', topicId:'t_g1', type:'extend', title:'讓題目更扎實', content:'我覺得是，而且這樣反而讓題目更扎實。因為我們不是只說有效，而是知道『什麼情況下比較有效』。', author:'stu_g1_huang', x:9700, y:800, parentId:'g1-w7-3', date:DATES.W7+11000, cluster:'B', promisingness:93 },
                { id:'g1-w7-13', topicId:'t_g1', type:'extend', title:'不是推翻是一直修', content:'如果回頭整理，我覺得我們不是把原本的想法全部推翻，而是一直在修。從『聲波會推粒子』，修到『聲波可能透過改變流場與粒子路徑，增加被攔截的機會』，這個差很多。', author:'stu_g1_tsai', x:9950, y:800, parentId:'g1-w7-12', date:DATES.W7+12000, cluster:'B', promisingness:96 },
                { id:'g1-w7-14', topicId:'t_g1', type:'extend', title:'結論底氣', content:'我現在的想法是，第一組最後最有價值的不是找出一個最好數字，而是知道哪些說法太快、哪些說法比較站得住。這會讓我們的結論更有底氣。', author:'stu_g1_chien', x:10200, y:800, parentId:'g1-w7-13', date:DATES.W7+13000, cluster:'B', promisingness:97 },
                { id:'g1-w7-15', topicId:'t_g1', type:'extend', title:'自然現象運作', content:'如果用知識建構的角度看，我會說我們這七週其實是在把『裝置怎麼做』慢慢修成『自然現象怎麼運作』。我覺得這就是第一組最後最明顯的成長。', author:'stu_g1_huang', x:10450, y:800, parentId:'g1-w7-14', date:DATES.W7+14000, cluster:'B', promisingness:98 },
                { id:'g1-w7-ra', topicId:'t_g1', type:'riseabove', title:'Week 7 總結：多變項交互作用', content:'過濾效果不是單一頻率造成，而是聲場與結構共同塑造粒子路徑的結果；真正有意義的是找出什麼條件讓粒子比較穩定地被抓住。', author:'stu_g1_tsai', x:10700, y:200, parentId:'g1-w7-6', date:DATES.W7+15000, cluster:'C', promisingness:100 },

                // ==================== GROUP 2 NODES ====================
                // --- Week 1 (16 篇) ---
                { id:'g2-w1-1', topicId:'t_g2', type:'question', title:'異常就等於危險嗎？', content:'我現在越想越覺得，我們以前有點太快把『偵測到變化』直接當成『有危險』。可是像心跳變快、呼吸變快，很多時候也可能只是運動完、情緒激動。那我們現在這套邏輯，到底是在抓真正異常，還是抓所有看起來不一樣的狀況？', author:'stu_g2_zhu', x:100, y:400, parentId:null, date:DATES.W1, cluster:'A', promisingness:72 },
                { id:'g2-w1-2', topicId:'t_g2', type:'counter', title:'誤報傷害信任', content:'如果照顧場景是在家裡，不是在醫院，那人的狀態本來就會很多變。如果系統常常發出警報但其實沒事，家裡的人會不會最後乾脆把機器關掉？', author:'stu_g2_huang', x:350, y:200, parentId:'g2-w1-1', date:DATES.W1+1000, cluster:'A', promisingness:70 },
                { id:'g2-w1-3', topicId:'t_g2', type:'counter', title:'是照顧還是負擔？', content:'換個角度想，如果我是被照顧的人，連我看個電視笑得比較大聲都會被系統報『心跳異常』，這到底是被照顧還是被增加負擔？', author:'stu_g2_xie', x:350, y:600, parentId:'g2-w1-1', date:DATES.W1+2000, cluster:'B', promisingness:74 },
                { id:'g2-w1-4', topicId:'t_g2', type:'improve', title:'列出常見異常狀況表', content:'那我們第一步是不是要先盤點『看起來像異常，但在居家情境裡很常見』的狀況表？把它跟真正的醫療危險區分開來。', author:'stu_g2_zhu', x:600, y:200, parentId:'g2-w1-2', date:DATES.W1+3000, cluster:'A', promisingness:76 },
                { id:'g2-w1-5', topicId:'t_g2', type:'extend', title:'釐清哪種需要被管', content:'同意洺賢，如果不先分清楚哪種變化需要被管，系統只會一直叫，家屬根本不知道該不該進去看。', author:'stu_g2_huang', x:850, y:200, parentId:'g2-w1-4', date:DATES.W1+4000, cluster:'A', promisingness:75 },
                { id:'g2-w1-6', topicId:'t_g2', type:'extend', title:'使用者的感受更重要', content:'沒錯，如果只看數據不管感受，這個系統在家裡根本活不下去。非接觸的好處就是無感，不要反而變成了干擾。', author:'stu_g2_xie', x:600, y:600, parentId:'g2-w1-3', date:DATES.W1+5000, cluster:'B', promisingness:78 },
                { id:'g2-w1-7', topicId:'t_g2', type:'improve', title:'重新定義異常問題', content:'我覺得這週我們可以把問題修正一下：系統不應該只問「有沒有不一樣」，而是要問「這個不一樣需不需要被處理」。', author:'stu_g2_zhu', x:1100, y:200, parentId:'g2-w1-5', date:DATES.W1+6000, cluster:'A', promisingness:82 },
                { id:'g2-w1-8', topicId:'t_g2', type:'improve', title:'系統不只要敏感還要聰明', content:'對，系統不只要敏感，還要夠聰明去判斷現在是什麼情況。這才是我們第二組該研究的方向。', author:'stu_g2_huang', x:1350, y:200, parentId:'g2-w1-7', date:DATES.W1+7000, cluster:'A', promisingness:80 },
                { id:'g2-w1-9', topicId:'t_g2', type:'extend', title:'非接觸的隱形優勢', content:'這樣科技才能真的變成隱形的保護，而不是像監視器一樣一直盯著人看。', author:'stu_g2_xie', x:850, y:600, parentId:'g2-w1-6', date:DATES.W1+8000, cluster:'B', promisingness:76 },
                { id:'g2-w1-10', topicId:'t_g2', type:'counter', title:'科技只是輔助', content:'我也覺得要小心，科技只是輔助，它不可能完全取代人的判斷。如果我們把系統想得太萬能，最後一定會失望。', author:'stu_g2_zhu', x:350, y:1000, parentId:'g2-w1-1', date:DATES.W1+9000, cluster:'C', promisingness:74 },
                { id:'g2-w1-11', topicId:'t_g2', type:'improve', title:'先幫忙過濾雜訊', content:'所以系統的責任可能只是「幫忙過濾雜訊」，把真正可疑的狀況留給家屬去確認，而不是直接下結論。', author:'stu_g2_huang', x:1100, y:600, parentId:'g2-w1-9', date:DATES.W1+10000, cluster:'B', promisingness:79 },
                { id:'g2-w1-12', topicId:'t_g2', type:'counter', title:'家屬看到紅字就會慌', content:'可是家屬不是醫生，只要看到紅字就會慌。如果我們把判斷丟給家屬，這不是還是增加了他們的壓力嗎？', author:'stu_g2_xie', x:1350, y:600, parentId:'g2-w1-11', date:DATES.W1+11000, cluster:'B', promisingness:80 },
                { id:'g2-w1-13', topicId:'t_g2', type:'extend', title:'必須要有人性化考量', content:'所以我們不只要設計演算法，還要有人性化的考量，讓系統在報錯時能給人一點緩衝。', author:'stu_g2_zhu', x:1600, y:600, parentId:'g2-w1-12', date:DATES.W1+12000, cluster:'B', promisingness:82 },
                { id:'g2-w1-14', topicId:'t_g2', type:'extend', title:'數據不能直接丟給家屬', content:'沒錯，單純冷冰冰的數據丟出去只會引起恐慌，一定要經過一層包裝解釋。', author:'stu_g2_huang', x:1850, y:600, parentId:'g2-w1-13', date:DATES.W1+13000, cluster:'B', promisingness:84 },
                { id:'g2-w1-15', topicId:'t_g2', type:'extend', title:'否則會製造焦慮', content:'不然這套設備不但沒有幫助照護，反而是製造家庭焦慮的機器。', author:'stu_g2_xie', x:2100, y:600, parentId:'g2-w1-14', date:DATES.W1+14000, cluster:'B', promisingness:86 },
                { id:'g2-w1-ra', topicId:'t_g2', type:'riseabove', title:'Week 1 總結：哪些變化值得當警訊', content:'第二組第一週開始不再把『偵測到變化』直接等同於『有危險』，而是把問題改成：哪些變化在居家情境裡真的值得被當成警訊。', author:'stu_g2_zhu', x:1600, y:200, parentId:'g2-w1-8', date:DATES.W1+15000, cluster:'A', promisingness:90 },

                // --- Week 2 (18 篇) ---
                { id:'g2-w2-1', topicId:'t_g2', type:'question', title:'固定門檻真的夠用嗎？', content:'如果同一個數值在洗澡後和睡覺時意思可能完全不一樣，那我們一直執著要設定一個『絕對的固定門檻』真的夠用嗎？', author:'stu_g2_zhu', x:1850, y:400, parentId:'g2-w1-ra', date:DATES.W2, cluster:'A', promisingness:78 },
                { id:'g2-w2-2', topicId:'t_g2', type:'extend', title:'情境要加到多細？', content:'如果要加入情境，那情境到底要加到什麼程度？吃飯、睡覺、看電視都要標記嗎？會不會太複雜又真的能降低誤報？', author:'stu_g2_huang', x:2100, y:200, parentId:'g2-w2-1', date:DATES.W2+1000, cluster:'A', promisingness:80 },
                { id:'g2-w2-3', topicId:'t_g2', type:'improve', title:'現在到底要不要擔心？', content:'我覺得家屬真正需要的不是一堆數值和情境，而是『現在要不要擔心』，那我們的判讀該怎麼說才有用？', author:'stu_g2_xie', x:2100, y:600, parentId:'g2-w2-1', date:DATES.W2+2000, cluster:'B', promisingness:82 },
                { id:'g2-w2-4', topicId:'t_g2', type:'improve', title:'建立基線與情境', content:'所以我們是不是要先幫每個人建一個『自己的基線』，然後再把數值放回當下的情境裡比對？', author:'stu_g2_zhu', x:2350, y:200, parentId:'g2-w2-2', date:DATES.W2+3000, cluster:'A', promisingness:85 },
                { id:'g2-w2-5', topicId:'t_g2', type:'extend', title:'長輩的個體差異很大', content:'基線真的很重要，有些長輩本來心跳就比較慢，如果套用年輕人的通用門檻，系統一定天天叫。', author:'stu_g2_huang', x:2600, y:200, parentId:'g2-w2-4', date:DATES.W2+4000, cluster:'A', promisingness:84 },
                { id:'g2-w2-6', topicId:'t_g2', type:'counter', title:'睡覺和活動不能混用', content:'如果沒有情境標記，睡覺時心跳變慢很正常，但在活動時變慢可能就是昏倒了。這兩個狀態絕對不能混用同一個判斷標準。', author:'stu_g2_xie', x:2350, y:600, parentId:'g2-w2-3', date:DATES.W2+5000, cluster:'B', promisingness:86 },
                { id:'g2-w2-7', topicId:'t_g2', type:'counter', title:'太多門檻會不會讓系統變遲鈍？', content:'如果我們加入太多情境和不同的基線，系統的判斷邏輯會不會變得太複雜，反而遇到真危險時反應太慢？', author:'stu_g2_zhu', x:2850, y:200, parentId:'g2-w2-5', date:DATES.W2+6000, cluster:'A', promisingness:80 },
                { id:'g2-w2-8', topicId:'t_g2', type:'improve', title:'讓系統自動學習基線？', content:'這或許可以交給機器學習去跑，讓系統自己去抓長輩『正常的日常節奏』，偏離這個節奏太多才視為異常。', author:'stu_g2_huang', x:3100, y:200, parentId:'g2-w2-7', date:DATES.W2+7000, cluster:'A', promisingness:88 },
                { id:'g2-w2-9', topicId:'t_g2', type:'extend', title:'家屬看不懂原始數據', content:'接宜芯的說法，單純丟出心跳 110 的數字沒意義，系統應該要附上『可能原因』，例如『剛運動完心跳偏高，建議觀察』。', author:'stu_g2_xie', x:2600, y:600, parentId:'g2-w2-6', date:DATES.W2+8000, cluster:'B', promisingness:87 },
                { id:'g2-w2-10', topicId:'t_g2', type:'extend', title:'判讀結果要對應具體行動', content:'對，系統的提醒必須能對應到家屬可以做的具體行動，不然只會製造無謂的焦慮。', author:'stu_g2_zhu', x:2850, y:600, parentId:'g2-w2-9', date:DATES.W2+9000, cluster:'B', promisingness:89 },
                { id:'g2-w2-11', topicId:'t_g2', type:'improve', title:'把情境標記當成判斷前提', content:'我們應該把『情境』當成所有判斷的前提。沒有情境，就沒有判斷的基準。', author:'stu_g2_huang', x:3100, y:600, parentId:'g2-w2-10', date:DATES.W2+10000, cluster:'B', promisingness:90 },
                { id:'g2-w2-12', topicId:'t_g2', type:'improve', title:'給出有意義的文字提醒', content:'這也呼應了前面的討論，系統吐出來的不該是冰冷的數據，而是經過情境過濾後，有意義的照顧提醒。', author:'stu_g2_xie', x:3350, y:600, parentId:'g2-w2-11', date:DATES.W2+11000, cluster:'B', promisingness:92 },
                { id:'g2-w2-13', topicId:'t_g2', type:'extend', title:'減少不必要的半夜恐慌', content:'這樣設計的最大好處，就是可以大幅減少家屬半夜被誤報驚醒的恐慌感。', author:'stu_g2_zhu', x:3600, y:600, parentId:'g2-w2-12', date:DATES.W2+12000, cluster:'B', promisingness:91 },
                { id:'g2-w2-14', topicId:'t_g2', type:'extend', title:'真正的信任感來自不過度反應', content:'沒錯，當系統證明它懂得什麼時候『該安靜』，家屬才會在它『發出警報』時真正相信它。', author:'stu_g2_huang', x:3850, y:600, parentId:'g2-w2-13', date:DATES.W2+13000, cluster:'B', promisingness:94 },
                { id:'g2-w2-15', topicId:'t_g2', type:'extend', title:'判斷邏輯要符合日常節奏', content:'這就是我們這組想做的事，把冷硬的技術邏輯，調整成符合家庭日常節奏的照護邏輯。', author:'stu_g2_xie', x:4100, y:600, parentId:'g2-w2-14', date:DATES.W2+14000, cluster:'B', promisingness:95 },
                { id:'g2-w2-16', topicId:'t_g2', type:'extend', title:'不能只看瞬間的絕對值', content:'所以我們不能只看瞬間的絕對值，瞬間可能只是翻身。', author:'stu_g2_zhu', x:3350, y:200, parentId:'g2-w2-8', date:DATES.W2+15000, cluster:'A', promisingness:85 },
                { id:'g2-w2-17', topicId:'t_g2', type:'improve', title:'要看相對的變化量', content:'而是要看相對基線的變化量和變化模式！', author:'stu_g2_huang', x:3600, y:200, parentId:'g2-w2-16', date:DATES.W2+16000, cluster:'A', promisingness:88 },
                { id:'g2-w2-ra', topicId:'t_g2', type:'riseabove', title:'Week 2 總結：情境下的不尋常變化', content:'我們不是在找全世界通用的危險門檻，而是在找『這個人在這個情境下的不尋常變化』。', author:'stu_g2_zhu', x:4350, y:600, parentId:'g2-w2-15', date:DATES.W2+17000, cluster:'B', promisingness:96 },

                // --- Week 3 (20 篇) ---
                { id:'g2-w3-1', topicId:'t_g2', type:'question', title:'最值得先理解的變數是什麼？', content:'如果現在只能優先抓幾個關鍵變數，最值得先理解的是個體基線、當下情境，還是感測干擾？我們必須先挑一個突破口。', author:'stu_g2_zhu', x:4600, y:600, parentId:'g2-w2-ra', date:DATES.W3, cluster:'A', promisingness:80 },
                { id:'g2-w3-2', topicId:'t_g2', type:'counter', title:'量到的是不是真的？', content:'我覺得要先懷疑『量到的是不是真的』。如果設備根本就被厚棉被擋住了，那後面算出來的基線和情境全都是錯的。', author:'stu_g2_huang', x:4850, y:400, parentId:'g2-w3-1', date:DATES.W3+1000, cluster:'A', promisingness:82 },
                { id:'g2-w3-3', topicId:'t_g2', type:'extend', title:'被照顧者願不願意配合？', content:'除了技術變數，『被照顧者願不願意配合』算不算也是研究變數？如果他們覺得不舒服，可能直接拔掉電源。', author:'stu_g2_xie', x:4850, y:800, parentId:'g2-w3-1', date:DATES.W3+2000, cluster:'B', promisingness:81 },
                { id:'g2-w3-4', topicId:'t_g2', type:'improve', title:'拆解量測可信度與數值意義', content:'那我們應該把問題拆成兩層：先分『量測可信度』（有沒有被干擾），再分『數值代表什麼』（是不是真的異常）。', author:'stu_g2_zhu', x:5100, y:400, parentId:'g2-w3-2', date:DATES.W3+3000, cluster:'A', promisingness:86 },
                { id:'g2-w3-5', topicId:'t_g2', type:'extend', title:'蓋被子、翻身都會造成干擾', content:'而且在居家環境裡，蓋被子、翻身背對鏡頭這些干擾太常見了，我們不能假裝這是在完美的實驗室裡量測。', author:'stu_g2_huang', x:5350, y:400, parentId:'g2-w3-4', date:DATES.W3+4000, cluster:'A', promisingness:88 },
                { id:'g2-w3-6', topicId:'t_g2', type:'counter', title:'攝影機或雷達也有死角', content:'任何設備都有死角。如果人剛好走到死角，數值突然掉下來，系統會不會以為人沒呼吸了？這很可怕。', author:'stu_g2_xie', x:5100, y:800, parentId:'g2-w3-3', date:DATES.W3+5000, cluster:'B', promisingness:84 },
                { id:'g2-w3-7', topicId:'t_g2', type:'improve', title:'系統要先確認資料品質', content:'所以系統在開始分析異常之前，一定要多一個步驟：『先評估現在收集到的資料品質夠不夠好』。', author:'stu_g2_zhu', x:5600, y:400, parentId:'g2-w3-5', date:DATES.W3+6000, cluster:'A', promisingness:90 },
                { id:'g2-w3-8', topicId:'t_g2', type:'improve', title:'品質差就先不急著判斷異常', content:'如果品質分數太低，系統應該選擇『暫不發出異常警報』，或者只提示『訊號微弱』，而不是直接亂猜。', author:'stu_g2_huang', x:5850, y:400, parentId:'g2-w3-7', date:DATES.W3+7000, cluster:'A', promisingness:92 },
                { id:'g2-w3-9', topicId:'t_g2', type:'extend', title:'寧可暫時漏報也不要一直誤報', content:'我同意，在家裡，『寧可因為訊號差暫時不報，也不要因為雜訊一直亂叫』，不然真的會被拔插頭。', author:'stu_g2_xie', x:6100, y:400, parentId:'g2-w3-8', date:DATES.W3+8000, cluster:'A', promisingness:94 },
                { id:'g2-w3-10', topicId:'t_g2', type:'counter', title:'但如果漏報剛好是真的危險呢？', content:'可是，如果剛好在訊號最差的時候發生危險怎麼辦？系統如果選擇安靜，會不會反而延誤了救援時間？', author:'stu_g2_zhu', x:5350, y:800, parentId:'g2-w3-6', date:DATES.W3+9000, cluster:'B', promisingness:85 },
                { id:'g2-w3-11', topicId:'t_g2', type:'extend', title:'所以要告知家屬現在品質不佳', content:'這就是為什麼我們要讓系統誠實！系統應該通知家屬：『目前監測角度被遮擋，無法確認狀態』，讓家屬自己決定要不要去看一下。', author:'stu_g2_huang', x:5600, y:800, parentId:'g2-w3-10', date:DATES.W3+10000, cluster:'B', promisingness:88 },
                { id:'g2-w3-12', topicId:'t_g2', type:'extend', title:'用燈號顯示系統狀態', content:'對，可以用設備上的燈號或 APP 的狀態列來顯示可信度。綠燈代表監測完美，黃燈代表有干擾，這樣家屬心裡就有底。', author:'stu_g2_xie', x:5850, y:800, parentId:'g2-w3-11', date:DATES.W3+11000, cluster:'B', promisingness:91 },
                { id:'g2-w3-13', topicId:'t_g2', type:'improve', title:'提高系統透明度', content:'我們討論到現在，其實都在做同一件事：提高系統的透明度。不把 AI 當黑箱，而是讓它把判斷的困難也秀出來。', author:'stu_g2_zhu', x:6100, y:800, parentId:'g2-w3-12', date:DATES.W3+12000, cluster:'B', promisingness:93 },
                { id:'g2-w3-14', topicId:'t_g2', type:'extend', title:'讓家屬知道系統在正常運作', content:'透明度也能增加安全感。家屬只要知道系統還活著、還在努力看，就會比較安心。', author:'stu_g2_huang', x:6350, y:800, parentId:'g2-w3-13', date:DATES.W3+13000, cluster:'B', promisingness:94 },
                { id:'g2-w3-15', topicId:'t_g2', type:'improve', title:'降低使用者對AI的過高期待', content:'這同時也在幫 AI 卸下包袱。告訴大家 AI 也會被干擾，反而能降低期待落差，減少未來的抱怨。', author:'stu_g2_xie', x:6600, y:800, parentId:'g2-w3-14', date:DATES.W3+14000, cluster:'B', promisingness:96 },
                { id:'g2-w3-16', topicId:'t_g2', type:'extend', title:'溝通介面的設計也很關鍵', content:'所以我們最後交付的成果，除了判讀邏輯，連『系統怎麼跟家屬說話』的介面設計，都是降低風險的關鍵。', author:'stu_g2_zhu', x:6850, y:800, parentId:'g2-w3-15', date:DATES.W3+15000, cluster:'B', promisingness:95 },
                { id:'g2-w3-17', topicId:'t_g2', type:'extend', title:'清楚、不嚇人的介面語言', content:'對，用語要很小心。不能用「心跳異常警告！」，要改成「心跳數據短暫偏離，請留意長輩活動狀態」。', author:'stu_g2_huang', x:7100, y:800, parentId:'g2-w3-16', date:DATES.W3+16000, cluster:'B', promisingness:97 },
                { id:'g2-w3-18', topicId:'t_g2', type:'extend', title:'介面本身就是防線', content:'介面語言如果設計得好，它本身就是一道防護線。', author:'stu_g2_xie', x:7350, y:800, parentId:'g2-w3-17', date:DATES.W3+17000, cluster:'B', promisingness:96 },
                { id:'g2-w3-19', topicId:'t_g2', type:'improve', title:'讓家屬有心理準備', content:'這讓家屬在推開房門前，心裡有準備，這對情緒穩定很重要。', author:'stu_g2_zhu', x:7600, y:800, parentId:'g2-w3-18', date:DATES.W3+18000, cluster:'B', promisingness:98 },
                { id:'g2-w3-ra', topicId:'t_g2', type:'riseabove', title:'Week 3 總結：什麼條件下才可信', content:'從『能量到』推進成『知道在什麼條件下量到的東西才值得相信，並誠實溝通。』', author:'stu_g2_zhu', x:7850, y:800, parentId:'g2-w3-19', date:DATES.W3+19000, cluster:'C', promisingness:99 },

                // --- Week 4 (21 篇) ---
                { id:'g2-w4-1', topicId:'t_g2', type:'question', title:'符合情境的偏離算不算異常？', content:'如果一個數值偏離平常範圍，但又剛好符合當下情境，例如活動後呼吸變快，那這到底算不算異常？系統該不該叫？', author:'stu_g2_zhu', x:8100, y:600, parentId:'g2-w3-ra', date:DATES.W4, cluster:'A', promisingness:85 },
                { id:'g2-w4-2', topicId:'t_g2', type:'extend', title:'記錄方式是不是得改？', content:'如果『持續多久』也要算進去，那我們記錄數據的方式是不是得改？不能只看單下一秒，而是要看一個時間區段。', author:'stu_g2_huang', x:8350, y:400, parentId:'g2-w4-1', date:DATES.W4+1000, cluster:'A', promisingness:86 },
                { id:'g2-w4-3', topicId:'t_g2', type:'improve', title:'判準有沒有對應到行動？', content:'家屬真正想知道的是『現在要不要做什麼』。符合情境的偏離，如果不需要行動，系統就不應該把它當作緊急異常。', author:'stu_g2_xie', x:8350, y:800, parentId:'g2-w4-1', date:DATES.W4+2000, cluster:'B', promisingness:88 },
                { id:'g2-w4-4', topicId:'t_g2', type:'improve', title:'基線、情境與時間運作', content:'所以真正異常的定義不再是跨過一條死線，而是『基線 × 情境 × 時間』這三個條件一起綜合判斷的結果。', author:'stu_g2_zhu', x:8600, y:200, parentId:'g2-w4-2', date:DATES.W4+3000, cluster:'A', promisingness:92 },
                { id:'g2-w4-5', topicId:'t_g2', type:'extend', title:'偏離持續多久才算數？', content:'這也帶出一個新問題：偏離基線要持續多久才算危險？五分鐘？十分鐘？這可能也要看具體的情境。', author:'stu_g2_huang', x:8850, y:200, parentId:'g2-w4-4', date:DATES.W4+4000, cluster:'A', promisingness:90 },
                { id:'g2-w4-6', topicId:'t_g2', type:'counter', title:'瞬間的波動應該被忽略', content:'如果只是打個噴嚏造成的數值瞬間飆高，系統絕對要能自動忽略這種極短時間的波動。', author:'stu_g2_xie', x:8600, y:400, parentId:'g2-w4-2', date:DATES.W4+5000, cluster:'A', promisingness:89 },
                { id:'g2-w4-7', topicId:'t_g2', type:'improve', title:'加入時間權重計算', content:'我們可以在演算法裡加入時間權重。偏離的時間越長，警報的優先級和嚴重量級就越高。', author:'stu_g2_zhu', x:8850, y:400, parentId:'g2-w4-6', date:DATES.W4+6000, cluster:'A', promisingness:94 },
                { id:'g2-w4-8', topicId:'t_g2', type:'improve', title:'短期波動 vs 長期趨勢', content:'這表示我們要把『短期瞬間波動』跟『長期的健康趨勢變化』分開來做兩套不同的判斷邏輯。', author:'stu_g2_huang', x:8600, y:800, parentId:'g2-w4-3', date:DATES.W4+7000, cluster:'B', promisingness:93 },
                { id:'g2-w4-9', topicId:'t_g2', type:'extend', title:'長期慢慢變差其實更危險', content:'有時候長輩不是突然昏倒，而是每天心跳、呼吸都慢慢變弱。這種長期趨勢如果不抓，其實潛在風險更大。', author:'stu_g2_xie', x:8850, y:800, parentId:'g2-w4-8', date:DATES.W4+8000, cluster:'B', promisingness:95 },
                { id:'g2-w4-10', topicId:'t_g2', type:'counter', title:'那系統怎麼抓出長期變差？', content:'但系統每天只看當下的基線，它會不會習慣了長輩變虛弱的過程，反而覺得這是「新的正常基線」？', author:'stu_g2_zhu', x:9100, y:800, parentId:'g2-w4-9', date:DATES.W4+9000, cluster:'B', promisingness:92 },
                { id:'g2-w4-11', topicId:'t_g2', type:'extend', title:'自動產出每週回顧報告？', content:'這就需要拉長回顧週期。也許系統可以每週產出一份健康趨勢報告，讓家屬看出一個月來的緩慢變化。', author:'stu_g2_huang', x:9350, y:800, parentId:'g2-w4-10', date:DATES.W4+10000, cluster:'B', promisingness:94 },
                { id:'g2-w4-12', topicId:'t_g2', type:'extend', title:'這樣比較像健康管家', content:'這樣做，AI 就不只是一個緊急警報器，它更像是一個幫忙盯著日常健康的管家。', author:'stu_g2_xie', x:8350, y:1000, parentId:'g2-w4-1', date:DATES.W4+11000, cluster:'C', promisingness:90 },
                { id:'g2-w4-13', topicId:'t_g2', type:'improve', title:'區分即時警報與日常報告', content:'太棒了！我們明確區分出兩個產品功能：一是『處理短期嚴重偏離的即時警報』，二是『觀察長期基線漂移的日常報告』。', author:'stu_g2_zhu', x:8600, y:1000, parentId:'g2-w4-12', date:DATES.W4+12000, cluster:'C', promisingness:96 },
                { id:'g2-w4-14', topicId:'t_g2', type:'extend', title:'建立兩種不同的提醒機制', content:'沒錯，即時警報推送到手機通知，日常報告可能每週末只傳一個小總結給家屬看就好。', author:'stu_g2_huang', x:8850, y:1000, parentId:'g2-w4-13', date:DATES.W4+13000, cluster:'C', promisingness:95 },
                { id:'g2-w4-15', topicId:'t_g2', type:'improve', title:'讓提醒具有彈性', content:'這樣設計非常有彈性，也大大減輕了家屬平常被疲勞轟炸的壓力。', author:'stu_g2_xie', x:9100, y:1000, parentId:'g2-w4-14', date:DATES.W4+14000, cluster:'C', promisingness:97 },
                { id:'g2-w4-16', topicId:'t_g2', type:'extend', title:'甚至讓家屬自己選敏感度', content:'如果再進一步，我們可以讓家屬在 APP 裡自己調：要「嚴格把關模式」還是「輕鬆觀察模式」。', author:'stu_g2_zhu', x:9350, y:1000, parentId:'g2-w4-15', date:DATES.W4+15000, cluster:'C', promisingness:96 },
                { id:'g2-w4-17', topicId:'t_g2', type:'counter', title:'太自由會不會讓家屬設錯？', content:'不過也要小心，如果讓家屬自己亂調，會不會不小心把敏感度調太低，結果出事了沒叫？', author:'stu_g2_huang', x:9600, y:1000, parentId:'g2-w4-16', date:DATES.W4+16000, cluster:'C', promisingness:94 },
                { id:'g2-w4-18', topicId:'t_g2', type:'improve', title:'給幾個預設的安全模式', content:'所以不能讓他們亂填數字，只能給幾個預設好的安全情境模式讓他們選，保證最底線的安全。', author:'stu_g2_xie', x:9850, y:1000, parentId:'g2-w4-17', date:DATES.W4+17000, cluster:'C', promisingness:98 },
                { id:'g2-w4-19', topicId:'t_g2', type:'extend', title:'加上防呆機制', content:'加上這個防呆機制，我們的架構就更完整了！', author:'stu_g2_zhu', x:10100, y:1000, parentId:'g2-w4-18', date:DATES.W4+18000, cluster:'C', promisingness:99 },
                { id:'g2-w4-20', topicId:'t_g2', type:'extend', title:'保障最低的安全底線', content:'確保科技在給人方便的同時，不會犧牲掉最基本的照護安全。', author:'stu_g2_huang', x:10350, y:1000, parentId:'g2-w4-19', date:DATES.W4+19000, cluster:'C', promisingness:98 },
                { id:'g2-w4-ra', topicId:'t_g2', type:'riseabove', title:'Week 4 總結：時間與情境判讀框架', content:'第二組第四週不再找一條固定警戒線，而是在建立『基線 × 情境 × 時間』一起運作的判讀框架。', author:'stu_g2_zhu', x:9100, y:400, parentId:'g2-w4-7', date:DATES.W4+20000, cluster:'A', promisingness:100 },

                // --- Week 5 (22 篇) ---
                { id:'g2-w5-1', topicId:'t_g2', type:'question', title:'系統邏輯改成多條件判斷？', content:'如果我們已經知道不能只看單一數值，那系統邏輯是不是要正式改成『多個條件一起判斷』的架構？', author:'stu_g2_zhu', x:9350, y:600, parentId:'g2-w4-ra', date:DATES.W5, cluster:'A', promisingness:90 },
                { id:'g2-w5-2', topicId:'t_g2', type:'extend', title:'怎麼驗證新邏輯更好？', content:'如果改成多條件判斷，我們後面要怎麼驗證它真的比舊邏輯（單一門檻）更好？我們需要設計實驗。', author:'stu_g2_huang', x:9600, y:400, parentId:'g2-w5-1', date:DATES.W5+1000, cluster:'A', promisingness:92 },
                { id:'g2-w5-3', topicId:'t_g2', type:'extend', title:'提醒傳給誰、怎麼講？', content:'而且如果系統最後判斷要提醒，那提醒應該優先傳給誰？用什麼文字講才不會讓家屬一看到就血壓升高？', author:'stu_g2_xie', x:9600, y:800, parentId:'g2-w5-1', date:DATES.W5+2000, cluster:'B', promisingness:91 },
                { id:'g2-w5-4', topicId:'t_g2', type:'improve', title:'畫出核心三層與判讀樹', content:'我們先畫成一個判讀樹吧！把我們前面討論的過濾條件，一層一層疊加上去，看看資料是怎麼流動的。', author:'stu_g2_zhu', x:9850, y:200, parentId:'g2-w5-2', date:DATES.W5+3000, cluster:'A', promisingness:95 },
                { id:'g2-w5-5', topicId:'t_g2', type:'extend', title:'具體是哪三層？', content:'如果畫樹，最上面的第一層應該放什麼？是訊號好不好，還是偏離多少？', author:'stu_g2_huang', x:10100, y:200, parentId:'g2-w5-4', date:DATES.W5+4000, cluster:'A', promisingness:93 },
                { id:'g2-w5-6', topicId:'t_g2', type:'improve', title:'品質、情境、數值偏離度', content:'我覺得順序應該是：1.確認訊號品質、2.比對情境標記、3.計算偏離程度。這三關都過才算是異常嫌疑。', author:'stu_g2_xie', x:10350, y:200, parentId:'g2-w5-5', date:DATES.W5+5000, cluster:'A', promisingness:96 },
                { id:'g2-w5-7', topicId:'t_g2', type:'extend', title:'還要加上持續時間', content:'別忘了上一週討論的，最後還要加第4關：計算持續時間。瞬間偏離的不算。', author:'stu_g2_zhu', x:10600, y:200, parentId:'g2-w5-6', date:DATES.W5+6000, cluster:'A', promisingness:97 },
                { id:'g2-w5-8', topicId:'t_g2', type:'improve', title:'這樣就是四層過濾機制了', content:'太好了！這四層過濾機制非常清晰，這就是我們第二組產出的核心判讀模型。', author:'stu_g2_huang', x:10850, y:200, parentId:'g2-w5-7', date:DATES.W5+7000, cluster:'A', promisingness:98 },
                { id:'g2-w5-9', topicId:'t_g2', type:'counter', title:'條件這麼多，系統會不會算太久？', content:'但我有個疑慮，如果系統要一直跑這四層迴圈，還要比對以前的歷史基線，運算會不會有延遲？', author:'stu_g2_xie', x:9850, y:400, parentId:'g2-w5-2', date:DATES.W5+8000, cluster:'B', promisingness:90 },
                { id:'g2-w5-10', topicId:'t_g2', type:'improve', title:'可能需要邊緣運算處理', content:'為了避免網路延遲，有些初階的判斷（像是訊號品質好不好）應該在設備端（邊緣運算）直接做掉。', author:'stu_g2_zhu', x:10100, y:400, parentId:'g2-w5-9', date:DATES.W5+9000, cluster:'B', promisingness:94 },
                { id:'g2-w5-11', topicId:'t_g2', type:'extend', title:'減少雲端傳輸延遲', content:'對，只有經過初篩覺得可疑的數據，才送到雲端去跟長期基線比對，這樣就能減少傳輸延遲。', author:'stu_g2_huang', x:10350, y:400, parentId:'g2-w5-10', date:DATES.W5+10000, cluster:'B', promisingness:95 },
                { id:'g2-w5-12', topicId:'t_g2', type:'extend', title:'確保突發狀況的即時性', content:'這樣設計就能兼顧『防誤報的深度』跟『發生真危險時的即時性』了。', author:'stu_g2_xie', x:10600, y:400, parentId:'g2-w5-11', date:DATES.W5+11000, cluster:'B', promisingness:96 },
                { id:'g2-w5-13', topicId:'t_g2', type:'counter', title:'誤判代價 vs 延遲代價的兩難', content:'但這其實是個兩難：你要系統不誤報，它就必須花時間收集更多證據；你要它快，它就容易判錯。', author:'stu_g2_zhu', x:10850, y:400, parentId:'g2-w5-12', date:DATES.W5+12000, cluster:'B', promisingness:94 },
                { id:'g2-w5-14', topicId:'t_g2', type:'improve', title:'我們必須抓一個平衡點', content:'這就是為什麼我們不是在寫一個絕對完美的程式，而是在幫家屬抓一個『他們最能接受的平衡點』。', author:'stu_g2_huang', x:11100, y:400, parentId:'g2-w5-13', date:DATES.W5+13000, cluster:'B', promisingness:97 },
                { id:'g2-w5-15', topicId:'t_g2', type:'extend', title:'我覺得先求穩不亂叫', content:'如果讓我選，在居家環境裡，我絕對會選『先求穩，不要一直亂叫』，因為亂叫的代價是系統被棄用。', author:'stu_g2_xie', x:9850, y:800, parentId:'g2-w5-3', date:DATES.W5+14000, cluster:'C', promisingness:93 },
                { id:'g2-w5-16', topicId:'t_g2', type:'extend', title:'在穩的基礎上再求快', content:'沒錯，先保證信任度，等系統收集到夠多長輩的習慣後，它自然就能在穩的基礎上變得更快更準。', author:'stu_g2_zhu', x:10100, y:800, parentId:'g2-w5-15', date:DATES.W5+15000, cluster:'C', promisingness:95 },
                { id:'g2-w5-17', topicId:'t_g2', type:'improve', title:'把這些寫成系統判斷準則表', content:'我們趕快把剛剛討論的這些取捨，整理成一份『居家照護系統判斷準則表』吧。', author:'stu_g2_huang', x:10350, y:800, parentId:'g2-w5-16', date:DATES.W5+16000, cluster:'C', promisingness:96 },
                { id:'g2-w5-18', topicId:'t_g2', type:'extend', title:'拿真實生活情境來跑跑看', content:'有了準則表，我們就可以拿一些生活裡常見的假警報情境（例如看球賽太激動）丟進去跑跑看了。', author:'stu_g2_xie', x:10600, y:800, parentId:'g2-w5-17', date:DATES.W5+17000, cluster:'C', promisingness:98 },
                { id:'g2-w5-19', topicId:'t_g2', type:'extend', title:'收集各種模擬數據', content:'對，我們來設計幾組數據：A組是純干擾，B組是情緒波動，C組是真的異常。', author:'stu_g2_zhu', x:10850, y:800, parentId:'g2-w5-18', date:DATES.W5+18000, cluster:'C', promisingness:97 },
                { id:'g2-w5-20', topicId:'t_g2', type:'extend', title:'對照舊邏輯的結果差異', content:'然後比較用「單一固定門檻」和我們的「四層過濾機制」，看結果會差多少。', author:'stu_g2_huang', x:11100, y:800, parentId:'g2-w5-19', date:DATES.W5+19000, cluster:'C', promisingness:99 },
                { id:'g2-w5-21', topicId:'t_g2', type:'improve', title:'確認新邏輯能明顯減少誤報', content:'我敢說，我們的四層過濾一定能把 A 組合和 B 組的誤報擋下來大半！這就是我們的價值。', author:'stu_g2_xie', x:11350, y:800, parentId:'g2-w5-20', date:DATES.W5+20000, cluster:'C', promisingness:100 },
                { id:'g2-w5-ra', topicId:'t_g2', type:'riseabove', title:'Week 5 總結：從很會看到比較會判斷', content:'把『感測器很會看』改寫成『系統比較會判斷』；前者只是技術能力，後者才接近照護能力。', author:'stu_g2_zhu', x:11100, y:200, parentId:'g2-w5-8', date:DATES.W5+21000, cluster:'A', promisingness:99 },

                // --- Week 6 (21 篇) ---
                { id:'g2-w6-1', topicId:'t_g2', type:'question', title:'把錯誤拆開來看', content:'如果今天我們的四層系統還是判錯了，我們是不是要練習把錯誤拆開來看，而不是一律都只說『模型不夠準』？', author:'stu_g2_zhu', x:11350, y:600, parentId:'g2-w5-ra', date:DATES.W6, cluster:'A', promisingness:95 },
                { id:'g2-w6-2', topicId:'t_g2', type:'extend', title:'測試紀錄是不是也要改？', content:'對，如果要把錯誤分型，那我們後面記錄測試結果的表格是不是也要跟著改？不能只寫成功或失敗。', author:'stu_g2_huang', x:11600, y:400, parentId:'g2-w6-1', date:DATES.W6+1000, cluster:'A', promisingness:96 },
                { id:'g2-w6-3', topicId:'t_g2', type:'counter', title:'誠實告訴使用者邊界？', content:'如果系統常在某些情況下判錯（像是棉被太厚），我們是不是也應該要在介面上誠實告訴使用者它的極限，而不是假裝它很完美？', author:'stu_g2_xie', x:11600, y:800, parentId:'g2-w6-1', date:DATES.W6+2000, cluster:'B', promisingness:97 },
                { id:'g2-w6-4', topicId:'t_g2', type:'improve', title:'錯誤分型的具體型態', content:'我們趕快把我們發現的系統可能錯誤，分門別類列出來。', author:'stu_g2_zhu', x:11850, y:200, parentId:'g2-w6-2', date:DATES.W6+3000, cluster:'A', promisingness:98 },
                { id:'g2-w6-5', topicId:'t_g2', type:'extend', title:'第一類是訊號品質干擾', content:'第一類很明確，就是物理上的干擾。被遮擋、距離太遠，導致數據根本是假的。這不是算法錯，是硬體限制。', author:'stu_g2_huang', x:12100, y:200, parentId:'g2-w6-4', date:DATES.W6+4000, cluster:'A', promisingness:96 },
                { id:'g2-w6-6', topicId:'t_g2', type:'improve', title:'第二類是情境誤讀', content:'第二類是系統把「運動喘氣」當成「心肺衰竭」。這代表系統還沒有學好分辨當下在幹嘛。', author:'stu_g2_xie', x:12350, y:200, parentId:'g2-w6-5', date:DATES.W6+5000, cluster:'A', promisingness:99 },
                { id:'g2-w6-7', topicId:'t_g2', type:'extend', title:'第三類是門檻太死', content:'第三類是基線設定有問題，沒有適應長輩的個別體質。', author:'stu_g2_zhu', x:12600, y:200, parentId:'g2-w6-6', date:DATES.W6+6000, cluster:'A', promisingness:97 },
                { id:'g2-w6-8', topicId:'t_g2', type:'improve', title:'第四類是恢復時間沒算進去', content:'第四類就是我們上週講的，沒有把短暫的波動濾掉，太快發出警報。', author:'stu_g2_huang', x:12850, y:200, parentId:'g2-w6-7', date:DATES.W6+7000, cluster:'A', promisingness:98 },
                { id:'g2-w6-9', topicId:'t_g2', type:'counter', title:'有些錯目前技術還是改不了', content:'但老實說，像第一類（厚棉被遮擋），以我們現在的非接觸技術，真的就很難解決。這改不了。', author:'stu_g2_xie', x:11850, y:400, parentId:'g2-w6-2', date:DATES.W6+8000, cluster:'B', promisingness:95 },
                { id:'g2-w6-10', topicId:'t_g2', type:'improve', title:'承認極限就是一種進步', content:'所以回到宜芯剛才說的，承認極限！我們不要硬拗，直接把它當作使用說明書的一部分。', author:'stu_g2_zhu', x:12100, y:400, parentId:'g2-w6-9', date:DATES.W6+9000, cluster:'B', promisingness:99 },
                { id:'g2-w6-11', topicId:'t_g2', type:'extend', title:'直接標示在APP介面上', content:'甚至在安裝的時候就用圖示告訴家屬：雷達請避開被子最厚的角度。', author:'stu_g2_huang', x:12350, y:400, parentId:'g2-w6-10', date:DATES.W6+10000, cluster:'B', promisingness:98 },
                { id:'g2-w6-12', topicId:'t_g2', type:'extend', title:'建立家屬對系統的正確期待', content:'對，先幫家屬打預防針。讓他們知道系統在什麼情況會變笨，他們就不會在那種時候怪系統。', author:'stu_g2_xie', x:12600, y:400, parentId:'g2-w6-11', date:DATES.W6+11000, cluster:'B', promisingness:100 },
                { id:'g2-w6-13', topicId:'t_g2', type:'counter', title:'但家屬能接受不完美的系統嗎？', content:'不過我們也要有心理準備，有些家屬花錢買設備，就是期待它 100% 不漏接。我們這麼誠實，他們會買單嗎？', author:'stu_g2_zhu', x:12850, y:400, parentId:'g2-w6-12', date:DATES.W6+12000, cluster:'B', promisingness:97 },
                { id:'g2-w6-14', topicId:'t_g2', type:'improve', title:'講清楚極限，比假裝完美然後出包好', content:'我覺得講清楚比假裝完美好。如果誇大效果，結果有一次長輩跌倒沒測到，那個信任感會瞬間崩潰。', author:'stu_g2_huang', x:13100, y:400, parentId:'g2-w6-13', date:DATES.W6+13000, cluster:'B', promisingness:99 },
                { id:'g2-w6-15', topicId:'t_g2', type:'extend', title:'讓他們知道科技不是神', content:'而且我們要強調，這叫「輔助照護系統」。科技不是神，它只是多一雙眼睛幫忙看。', author:'stu_g2_xie', x:11850, y:800, parentId:'g2-w6-3', date:DATES.W6+14000, cluster:'C', promisingness:96 },
                { id:'g2-w6-16', topicId:'t_g2', type:'extend', title:'照護本來就有不確定性', content:'對，就算換成真人保母 24 小時盯著，也可能會有沒注意到的時候。', author:'stu_g2_zhu', x:12100, y:800, parentId:'g2-w6-15', date:DATES.W6+15000, cluster:'C', promisingness:97 },
                { id:'g2-w6-17', topicId:'t_g2', type:'improve', title:'系統是幫手，不是唯一依賴', content:'所以我們的論述要很穩：我們是在提供一個好幫手，減輕家屬隨時都要精神緊繃的負擔。', author:'stu_g2_huang', x:12350, y:800, parentId:'g2-w6-16', date:DATES.W6+16000, cluster:'C', promisingness:98 },
                { id:'g2-w6-18', topicId:'t_g2', type:'extend', title:'是減輕壓力，而不是製造另一種焦慮', content:'這句講得太好了，這才是居家科技的核心價值。', author:'stu_g2_xie', x:12600, y:800, parentId:'g2-w6-17', date:DATES.W6+17000, cluster:'C', promisingness:99 },
                { id:'g2-w6-19', topicId:'t_g2', type:'extend', title:'而且這些錯誤記錄本身也是重要數據', content:'回到我們談的錯誤分型，家屬標記的每一次「這是誤報」，對系統來說都是很珍貴的學習數據。', author:'stu_g2_zhu', x:12850, y:800, parentId:'g2-w6-18', date:DATES.W6+18000, cluster:'C', promisingness:94 },
                { id:'g2-w6-20', topicId:'t_g2', type:'extend', title:'可以幫助優化下一次的判斷', content:'沒錯！系統會因為這些錯誤回饋，慢慢學會這個家裡的節奏，以後就越來越準。', author:'stu_g2_huang', x:13100, y:800, parentId:'g2-w6-19', date:DATES.W6+19000, cluster:'C', promisingness:96 },
                { id:'g2-w6-21', topicId:'t_g2', type:'improve', title:'變成一個會持續學習的模型', content:'這代表我們的居家判讀模型是活的，它會跟著這個家庭一起成長。', author:'stu_g2_xie', x:13350, y:800, parentId:'g2-w6-20', date:DATES.W6+20000, cluster:'C', promisingness:100 },
                { id:'g2-w6-ra', topicId:'t_g2', type:'riseabove', title:'Week 6 總結：錯誤變成知識', content:'第二組不再追求零錯誤，而是把錯誤變成可以解釋、可以修正、可以對外說清楚的知識，並透過分型讓系統持續學習。', author:'stu_g2_zhu', x:13100, y:200, parentId:'g2-w6-8', date:DATES.W6+21000, cluster:'A', promisingness:100 },

                // --- Week 7 (22 篇) ---
                { id:'g2-w7-1', topicId:'t_g2', type:'question', title:'七週到底進步了什麼？', content:'如果要用一句話講第二組七週到底進步了什麼，我們是不是不能再說『做了一個能監測的系統』？那太膚淺了。', author:'stu_g2_zhu', x:13350, y:600, parentId:'g2-w6-ra', date:DATES.W7, cluster:'A', promisingness:96 },
                { id:'g2-w7-2', topicId:'t_g2', type:'extend', title:'最能說服別人的證據？', content:'對我來說，最有說服力的不是單一漂亮數據，而是我們能說清楚為什麼以前容易誤報、現在為什麼比較不容易。', author:'stu_g2_huang', x:13600, y:400, parentId:'g2-w7-1', date:DATES.W7+1000, cluster:'A', promisingness:97 },
                { id:'g2-w7-3', topicId:'t_g2', type:'improve', title:'家屬最後應記住什麼？', content:'如果最後要讓家屬記得一件事，我希望不是記住某個數值，而是記住我們為什麼一直在講『不能只看數值』。', author:'stu_g2_xie', x:13600, y:800, parentId:'g2-w7-1', date:DATES.W7+2000, cluster:'B', promisingness:98 },
                { id:'g2-w7-4', topicId:'t_g2', type:'improve', title:'四步核心判讀模型', content:'我想把我們的成果整理成：舊邏輯容易把所有偏離都當異常；新邏輯會先檢查訊號品質、情境和基線，再決定提醒。', author:'stu_g2_huang', x:13850, y:200, parentId:'g2-w7-2', date:DATES.W7+3000, cluster:'A', promisingness:99 },
                { id:'g2-w7-5', topicId:'t_g2', type:'extend', title:'我們降低了系統的武斷度', content:'沒錯，如果回頭看，我覺得我們最後建起來的不是一個更會叫的系統，而是一個比較知道什麼時候該講、什麼時候先別太武斷的系統。', author:'stu_g2_zhu', x:14100, y:200, parentId:'g2-w7-4', date:DATES.W7+4000, cluster:'A', promisingness:98 },
                { id:'g2-w7-6', topicId:'t_g2', type:'improve', title:'讓每次提醒都是有根據的判斷', content:'我現在會把第二組的進步講成：我們不是把數值做得更漂亮，而是把判斷做得比較有根據。', author:'stu_g2_huang', x:14350, y:200, parentId:'g2-w7-5', date:DATES.W7+5000, cluster:'A', promisingness:100 },
                { id:'g2-w7-7', topicId:'t_g2', type:'extend', title:'懂生活分寸', content:'如果用比較白話的方式講，我覺得第二組最後是在做一個『比較懂生活，也比較懂分寸』的提醒系統。', author:'stu_g2_xie', x:14600, y:200, parentId:'g2-w7-6', date:DATES.W7+6000, cluster:'A', promisingness:100 },
                { id:'g2-w7-8', topicId:'t_g2', type:'improve', title:'這就是科技的人性面', content:'這種懂分寸的感覺，就是科技進入家庭後最需要的人性面。它不是冰冷的醫院儀器。', author:'stu_g2_zhu', x:13850, y:400, parentId:'g2-w7-2', date:DATES.W7+7000, cluster:'B', promisingness:97 },
                { id:'g2-w7-9', topicId:'t_g2', type:'extend', title:'不再只是丟冷冰冰的數字給人看', content:'對，以前只會丟出 120 的心跳值嚇人，現在它會試著去理解這個 120 背後的生活意義。', author:'stu_g2_huang', x:14100, y:400, parentId:'g2-w7-8', date:DATES.W7+8000, cluster:'B', promisingness:98 },
                { id:'g2-w7-10', topicId:'t_g2', type:'improve', title:'讓監測自然融入家庭日常', content:'這樣科技才能自然地融入家庭日常，不會每天讓大家神經緊繃。', author:'stu_g2_xie', x:14350, y:400, parentId:'g2-w7-9', date:DATES.W7+9000, cluster:'B', promisingness:99 },
                { id:'g2-w7-11', topicId:'t_g2', type:'extend', title:'變成隱形的守護，而不是全天候的監視', content:'這句當作我們的設計理念超棒！「隱形的守護，而非全天候的監視」。', author:'stu_g2_zhu', x:14600, y:400, parentId:'g2-w7-10', date:DATES.W7+10000, cluster:'B', promisingness:100 },
                { id:'g2-w7-12', topicId:'t_g2', type:'counter', title:'但最終做決定的還是要靠人', content:'不過我們在結論還是要拉回來一點，不管模型多聰明，最後決定要不要送醫、要不要給藥的，還是家屬和醫生。', author:'stu_g2_huang', x:13850, y:800, parentId:'g2-w7-3', date:DATES.W7+11000, cluster:'C', promisingness:96 },
                { id:'g2-w7-13', topicId:'t_g2', type:'extend', title:'沒錯，是「系統判讀 + 家屬經驗」', content:'系統提供客觀的變化趨勢和情境比對，家屬補上最後一塊拼圖（像是長輩今天的氣色），這才是完整的。', author:'stu_g2_xie', x:14100, y:800, parentId:'g2-w7-12', date:DATES.W7+12000, cluster:'C', promisingness:98 },
                { id:'g2-w7-14', topicId:'t_g2', type:'improve', title:'這是一種共同決策的照護網路', content:'這聽起來很像我們建立了一個「科技與人共同決策」的照護網路，大家各司其職。', author:'stu_g2_zhu', x:14350, y:800, parentId:'g2-w7-13', date:DATES.W7+13000, cluster:'C', promisingness:99 },
                { id:'g2-w7-15', topicId:'t_g2', type:'extend', title:'可能是目前最實際、最佳的照護模式', content:'考慮到現在的技術極限，這絕對是現階段推廣居家照護最實際也最不傷害信任的模式。', author:'stu_g2_huang', x:14600, y:800, parentId:'g2-w7-14', date:DATES.W7+14000, cluster:'C', promisingness:100 },
                { id:'g2-w7-16', topicId:'t_g2', type:'improve', title:'在數據和實際行動之間搭了一座橋', content:'如果看整體，我們這七週其實就是在冷冰冰的「硬體數據」跟家屬焦慮的「照顧行動」之間，搭了一座理解的橋樑。', author:'stu_g2_xie', x:13850, y:1000, parentId:'g2-w7-3', date:DATES.W7+15000, cluster:'C', promisingness:97 },
                { id:'g2-w7-17', topicId:'t_g2', type:'extend', title:'而且這座橋是我們一步步建構出來的', content:'而且這座橋不是別人給的答案，是我們從「一直亂叫」的挫折中，一層一層把過濾網架出來的。', author:'stu_g2_zhu', x:14100, y:1000, parentId:'g2-w7-16', date:DATES.W7+16000, cluster:'C', promisingness:98 },
                { id:'g2-w7-18', topicId:'t_g2', type:'extend', title:'看著它從混亂變得清晰，真的很有成就感', content:'回顧第一週我們還在吵「異常是不是危險」，現在已經能畫出完整的四層判斷樹，真的很有成就感。', author:'stu_g2_huang', x:14350, y:1000, parentId:'g2-w7-17', date:DATES.W7+17000, cluster:'C', promisingness:99 },
                { id:'g2-w7-19', topicId:'t_g2', type:'extend', title:'希望能變成真正對社會有幫助的東西', content:'如果這個邏輯真的能寫進未來的產品裡，應該能幫到很多照顧長輩到心力交瘁的家庭。', author:'stu_g2_xie', x:14600, y:1000, parentId:'g2-w7-18', date:DATES.W7+18000, cluster:'C', promisingness:100 },
                { id:'g2-w7-20', topicId:'t_g2', type:'improve', title:'回顧這七週，我們不只做了技術', content:'總結下來，第二組做的其實不只是一個技術專題，而是一個關於「人機信任」的研究。', author:'stu_g2_zhu', x:14100, y:1200, parentId:'g2-w7-17', date:DATES.W7+19000, cluster:'C', promisingness:99 },
                { id:'g2-w7-21', topicId:'t_g2', type:'extend', title:'更大的是思維上的轉變', content:'對，是思維上從「工程師想要抓到所有數據」轉變成「照顧者需要什麼樣的安全感」。', author:'stu_g2_huang', x:14350, y:1200, parentId:'g2-w7-20', date:DATES.W7+20000, cluster:'C', promisingness:100 },
                { id:'g2-w7-22', topicId:'t_g2', type:'extend', title:'從技術能做什麼轉變成需要什麼', content:'這七週的歷程，教會我們怎麼把強大的技術，收斂成溫柔且實用的服務。', author:'stu_g2_xie', x:14600, y:1200, parentId:'g2-w7-21', date:DATES.W7+21000, cluster:'C', promisingness:100 },
                { id:'g2-w7-ra', topicId:'t_g2', type:'riseabove', title:'Week 7 總結：居家判讀模型', content:'第二組七週真正建構出的，不是一組更敏感的警報器，而是一個『以可信度為前提、以基線為基礎、以情境為解釋、以風險為目的』的居家判讀模型。', author:'stu_g2_zhu', x:14850, y:200, parentId:'g2-w7-7', date:DATES.W7+23000, cluster:'A', promisingness:100 },

                // ==================== GROUP 3 NODES ====================
                // --- Week 1 (25 篇) ---
                { id:'g3-w1-1', topicId:'t_g3', type:'question', title:'AI真的看懂毛小孩了嗎？', content:'我現在越想越覺得，我們以前太快相信AI了。它看到呼吸變化就往異常想，但毛小孩本來就很常衝來衝去。它真的看懂了嗎？', author:'stu_g3_liu', x:100, y:1600, parentId:null, date:DATES.W1, cluster:'A', promisingness:68 },
                { id:'g3-w1-2', topicId:'t_g3', type:'counter', title:'可能只是很嗨或很熱', content:'如果只是抓不一樣，那很多正常行為也會變紅字。同樣是喘，會不會只是剛玩完，不一定是危險？', author:'stu_g3_huang', x:350, y:1400, parentId:'g3-w1-1', date:DATES.W1+1000, cluster:'A', promisingness:70 },
                { id:'g3-w1-3', topicId:'t_g3', type:'extend', title:'姿勢和毛髮影響', content:'除了行為，感測會不會被毛髮、角度影響？如果是這樣，抓到的『不一樣』可能都是假的。', author:'stu_g3_wen', x:350, y:1800, parentId:'g3-w1-1', date:DATES.W1+2000, cluster:'B', promisingness:65 },
                { id:'g3-w1-4', topicId:'t_g3', type:'improve', title:'量到之後代表什麼', content:'所以我們真正該問的是『量到之後代表什麼』，而不是一直只問『AI能不能測到數值』。', author:'stu_g3_liang', x:600, y:1300, parentId:'g3-w1-2', date:DATES.W1+3000, cluster:'A', promisingness:76 },
                { id:'g3-w1-5', topicId:'t_g3', type:'extend', title:'機器只看像素變化', content:'同意，其實攝影機就只是看像素變化。狗在抓癢像素也會變很大，AI 會覺得牠在抽搐嗎？', author:'stu_g3_liu', x:600, y:1500, parentId:'g3-w1-2', date:DATES.W1+4000, cluster:'A', promisingness:72 },
                { id:'g3-w1-6', topicId:'t_g3', type:'extend', title:'需要行為字典', content:'如果是這樣，AI 裡面是不是缺了一本『行為字典』？它沒有常識，只有數據。', author:'stu_g3_huang', x:850, y:1500, parentId:'g3-w1-5', date:DATES.W1+5000, cluster:'A', promisingness:75 },
                { id:'g3-w1-7', topicId:'t_g3', type:'counter', title:'狗的行為千奇百怪', content:'可是每隻狗的習慣都不一樣，這本字典要怎麼寫才寫得完？', author:'stu_g3_wen', x:1100, y:1500, parentId:'g3-w1-6', date:DATES.W1+6000, cluster:'A', promisingness:70 },
                { id:'g3-w1-8', topicId:'t_g3', type:'improve', title:'不能寫死規則', content:'這就是為什麼不能用寫死規則！系統必須要有彈性，不能把所有狗當成同一隻。', author:'stu_g3_liu', x:1350, y:1500, parentId:'g3-w1-7', date:DATES.W1+7000, cluster:'A', promisingness:80 },
                { id:'g3-w1-9', topicId:'t_g3', type:'extend', title:'光線也會騙人', content:'如果晚上關燈，紅外線拍出來的起伏跟白天不一樣，這時候的異常還能信嗎？', author:'stu_g3_huang', x:600, y:1800, parentId:'g3-w1-3', date:DATES.W1+8000, cluster:'B', promisingness:74 },
                { id:'g3-w1-10', topicId:'t_g3', type:'improve', title:'先評估可信度', content:'那我們是不是一開始就不要太相信它？先檢查環境光線和姿勢，再看數據。', author:'stu_g3_liang', x:850, y:1800, parentId:'g3-w1-9', date:DATES.W1+9000, cluster:'B', promisingness:78 },
                { id:'g3-w1-11', topicId:'t_g3', type:'extend', title:'不盲目相信', content:'對，我們的第一個結論應該是：打破對 AI 的盲目信任。', author:'stu_g3_liu', x:1100, y:1800, parentId:'g3-w1-10', date:DATES.W1+10000, cluster:'B', promisingness:82 },
                { id:'g3-w1-12', topicId:'t_g3', type:'counter', title:'可是我們需要警報', content:'雖然不能盲目相信，但如果發生真危險，我們還是需要它叫啊。', author:'stu_g3_wen', x:850, y:1300, parentId:'g3-w1-4', date:DATES.W1+11000, cluster:'A', promisingness:70 },
                { id:'g3-w1-13', topicId:'t_g3', type:'improve', title:'警報要有前提', content:'警報可以叫，但必須加上「前提」。系統要先說明目前量測條件是否正常。', author:'stu_g3_huang', x:1100, y:1300, parentId:'g3-w1-12', date:DATES.W1+12000, cluster:'A', promisingness:75 },
                { id:'g3-w1-14', topicId:'t_g3', type:'extend', title:'前提是環境正常', content:'沒錯，如果環境光線太暗，系統的權重就應該降低。', author:'stu_g3_liang', x:1350, y:1300, parentId:'g3-w1-13', date:DATES.W1+13000, cluster:'A', promisingness:78 },
                { id:'g3-w1-15', topicId:'t_g3', type:'extend', title:'沒錯，環境參數優先', content:'環境參數必須大於生理參數。環境不對，生理數據直接無效。', author:'stu_g3_liu', x:1600, y:1300, parentId:'g3-w1-14', date:DATES.W1+14000, cluster:'A', promisingness:80 },
                { id:'g3-w1-16', topicId:'t_g3', type:'improve', title:'要排除極端值', content:'所以系統的第一道防線就是排除極端干擾值。', author:'stu_g3_huang', x:1350, y:1100, parentId:'g3-w1-13', date:DATES.W1+15000, cluster:'A', promisingness:77 },
                { id:'g3-w1-17', topicId:'t_g3', type:'extend', title:'像突然的亮光', content:'例如突然開燈導致的畫面全白，這幾秒的數據要丟掉。', author:'stu_g3_wen', x:1600, y:1100, parentId:'g3-w1-16', date:DATES.W1+16000, cluster:'A', promisingness:75 },
                { id:'g3-w1-18', topicId:'t_g3', type:'extend', title:'或是鏡頭被擋住', content:'如果狗狗走到沙發後面，只露出一半，這時候算出來的心跳也是錯的。', author:'stu_g3_liang', x:1850, y:1100, parentId:'g3-w1-17', date:DATES.W1+17000, cluster:'A', promisingness:80 },
                { id:'g3-w1-19', topicId:'t_g3', type:'counter', title:'擋住就不能判斷了', content:'完全擋住的話系統根本瞎了，這時候系統該怎麼辦？', author:'stu_g3_liu', x:2100, y:1100, parentId:'g3-w1-18', date:DATES.W1+18000, cluster:'A', promisingness:82 },
                { id:'g3-w1-20', topicId:'t_g3', type:'improve', title:'標記為未知狀態', content:'這時候系統不能猜，只能誠實標記為「未知狀態」。', author:'stu_g3_huang', x:2350, y:1100, parentId:'g3-w1-19', date:DATES.W1+19000, cluster:'A', promisingness:88 },
                { id:'g3-w1-21', topicId:'t_g3', type:'extend', title:'總比誤報好', content:'「未知」總比跳出「心肺停止警告」來得好。', author:'stu_g3_wen', x:2600, y:1100, parentId:'g3-w1-20', date:DATES.W1+20000, cluster:'A', promisingness:86 },
                { id:'g3-w1-22', topicId:'t_g3', type:'extend', title:'誤報會消磨耐心', content:'對，主人被嚇幾次後，以後遇到真危險也不會信了。', author:'stu_g3_liang', x:2850, y:1100, parentId:'g3-w1-21', date:DATES.W1+21000, cluster:'A', promisingness:89 },
                { id:'g3-w1-23', topicId:'t_g3', type:'improve', title:'寧可不報不誤報', content:'我們第一週的核心原則出來了：寧可暫時不報，也不要用爛數據誤報。', author:'stu_g3_liu', x:3100, y:1100, parentId:'g3-w1-22', date:DATES.W1+22000, cluster:'A', promisingness:92 },
                { id:'g3-w1-24', topicId:'t_g3', type:'extend', title:'建立初步共識', content:'這個共識很好，這讓我們後面設計邏輯時有了底線。', author:'stu_g3_huang', x:3350, y:1100, parentId:'g3-w1-23', date:DATES.W1+23000, cluster:'A', promisingness:90 },
                { id:'g3-w1-ra', topicId:'t_g3', type:'riseabove', title:'Week 1 總結：先懷疑AI是否看懂', content:'第三組第一週真正建起來的不是『怎麼偵測』，而是『AI很可能把毛小孩的生活狀態誤讀成異常』這個問題意識，並確立寧缺勿濫的原則。', author:'stu_g3_liu', x:3600, y:1100, parentId:'g3-w1-24', date:DATES.W1+24000, cluster:'C', promisingness:95 },

                // --- Week 2 (25 篇) ---
                { id:'g3-w2-1', topicId:'t_g3', type:'question', title:'不能找通用門檻？', content:'如果每隻毛小孩本來的活動量、作息都不一樣，我們是不是不能找『全體通用門檻』？', author:'stu_g3_liu', x:3850, y:1100, parentId:'g3-w1-ra', date:DATES.W2, cluster:'A', promisingness:75 },
                { id:'g3-w2-2', topicId:'t_g3', type:'counter', title:'牽繩就興奮', content:'對啊，有些狗看到牽繩就興奮，呼吸變快，這時候 AI 只看呼吸會想太多？', author:'stu_g3_huang', x:4100, y:900, parentId:'g3-w2-1', date:DATES.W2+1000, cluster:'A', promisingness:78 },
                { id:'g3-w2-3', topicId:'t_g3', type:'extend', title:'量測條件要一致', content:'如果要建立基準，量測條件得一致，不能拿睡覺比玩耍。', author:'stu_g3_wen', x:4100, y:1300, parentId:'g3-w2-1', date:DATES.W2+2000, cluster:'B', promisingness:76 },
                { id:'g3-w2-4', topicId:'t_g3', type:'improve', title:'比對平常狀態', content:'所以系統應該先建立模型，比對『這一隻平常怎樣』，而不是一超過標準值就報。', author:'stu_g3_liang', x:4350, y:900, parentId:'g3-w2-2', date:DATES.W2+3000, cluster:'A', promisingness:82 },
                { id:'g3-w2-5', topicId:'t_g3', type:'extend', title:'個體基線概念', content:'這就是「個體基線」！我們必須先幫每隻狗建立牠自己的基線。', author:'stu_g3_liu', x:4600, y:900, parentId:'g3-w2-4', date:DATES.W2+4000, cluster:'A', promisingness:85 },
                { id:'g3-w2-6', topicId:'t_g3', type:'counter', title:'基線收集多久？', content:'但基線要收集多久才準？一天？一個禮拜？如果剛好生病怎麼辦？', author:'stu_g3_huang', x:4850, y:900, parentId:'g3-w2-5', date:DATES.W2+5000, cluster:'A', promisingness:80 },

                { id:'g5-w1-1', topicId:'t_g5', type:'question', title:'講得很順就代表可信嗎？', content:'我現在最想先問的一件事是：我們平常是不是太容易把『講得很像真的』直接當成『它應該是真的』？因為生成式AI最厲害的地方本來就不是先查證，而是先把話說得很順。那這樣的順，到底是在幫助理解，還是在掩蓋錯誤？', author:'stu_g5_liao', x:100, y:3800, parentId:null, date:DATES.W1, cluster:'A', promisingness:82 },
                { id:'g5-w1-2', topicId:'t_g5', type:'extend', title:'人太快相信的風險', content:'如果順暢本身就會讓人比較放下戒心，那幻覺最可怕的地方可能不是單純答錯，而是人太快相信。', author:'stu_g5_xie', x:350, y:3600, parentId:'g5-w1-1', date:DATES.W1+10000, cluster:'A', promisingness:84 },
                { id:'g5-w1-3', topicId:'t_g5', type:'counter', title:'不能只看有沒有錯', content:'可是如果真的要研究，是不是不能只看有沒有錯，還要看它是怎麼錯的？', author:'stu_g5_liu', x:350, y:4000, parentId:'g5-w1-1', date:DATES.W1+20000, cluster:'B', promisingness:80 },
                { id:'g5-w1-4', topicId:'t_g5', type:'improve', title:'流暢感與可信度拆開', content:'我們先把『流暢感』從『可信度』裡拆出來，這是兩個不同的維度，它講得很溜不代表它知道自己在講什麼。', author:'stu_g5_liao', x:600, y:3600, parentId:'g5-w1-2', date:DATES.W1+30000, cluster:'A', promisingness:88 },
                { id:'g5-w1-5', topicId:'t_g5', type:'extend', title:'包裝得像專家', content:'它總是用一種專家的語氣在說話，這種自信的語氣就是一種包裝，很容易唬住人。', author:'stu_g5_xie', x:850, y:3600, parentId:'g5-w1-4', date:DATES.W1+40000, cluster:'A', promisingness:85 },
                { id:'g5-w1-6', topicId:'t_g5', type:'extend', title:'甚至有時候還會道歉', content:'對，而且它如果被糾正還會態度很好地道歉，這種擬人化讓我們更容易對它產生信任。', author:'stu_g5_liu', x:1100, y:3600, parentId:'g5-w1-5', date:DATES.W1+50000, cluster:'A', promisingness:86 },
                { id:'g5-w1-7', topicId:'t_g5', type:'improve', title:'擬人化會降低戒心', content:'所以系統的擬人化設計，其實在無形中降低了使用者的防備心，這點很值得深入探討。', author:'stu_g5_liao', x:1350, y:3600, parentId:'g5-w1-6', date:DATES.W1+60000, cluster:'A', promisingness:90 },
                { id:'g5-w1-8', topicId:'t_g5', type:'counter', title:'但如果是閒聊就沒差', content:'不過也要看情況吧？如果只是一般聊天，它亂講也沒關係；如果是查資料，那就有差了。', author:'stu_g5_xie', x:600, y:4000, parentId:'g5-w1-3', date:DATES.W1+70000, cluster:'B', promisingness:82 },
                { id:'g5-w1-9', topicId:'t_g5', type:'extend', title:'所以重點是情境', content:'沒錯，閒聊沒差，但拿來寫作業或查法規就有差，後果完全不一樣。', author:'stu_g5_liu', x:850, y:4000, parentId:'g5-w1-8', date:DATES.W1+80000, cluster:'B', promisingness:84 },
                { id:'g5-w1-10', topicId:'t_g5', type:'improve', title:'情境的嚴重性', content:'這代表幻覺的風險不是固定的，它會跟著「使用的情境」產生變化。', author:'stu_g5_liao', x:1100, y:4000, parentId:'g5-w1-9', date:DATES.W1+90000, cluster:'B', promisingness:88 },
                { id:'g5-w1-11', topicId:'t_g5', type:'extend', title:'依賴感也是問題', content:'而且一旦習慣了這種方便的流暢感，人就會越來越懶得去查證，這也是一種代價。', author:'stu_g5_xie', x:1350, y:4000, parentId:'g5-w1-10', date:DATES.W1+100000, cluster:'B', promisingness:86 },
                { id:'g5-w1-12', topicId:'t_g5', type:'improve', title:'我們要研究的是信任機制', content:'看來我們不只要研究 AI 為什麼會算錯，更要研究人為什麼會「相信它的錯」。', author:'stu_g5_liu', x:1600, y:3800, parentId:'g5-w1-7', date:DATES.W1+110000, cluster:'C', promisingness:92 },
                { id:'g5-w1-13', topicId:'t_g5', type:'extend', title:'信任被濫用', content:'對，這就像是人類本來只對專家展現的信任，被機器給套用了。', author:'stu_g5_liao', x:1850, y:3800, parentId:'g5-w1-12', date:DATES.W1+120000, cluster:'C', promisingness:94 },
                { id:'g5-w1-14', topicId:'t_g5', type:'extend', title:'就像被詐騙', content:'這不就是高科技詐騙嗎？用你喜歡聽的語氣講出錯的內容。', author:'stu_g5_xie', x:2100, y:3800, parentId:'g5-w1-13', date:DATES.W1+130000, cluster:'C', promisingness:93 },
                { id:'g5-w1-15', topicId:'t_g5', type:'improve', title:'重新定義幻覺', content:'所以第一週，我們決定把幻覺從「技術瑕疵」重新定義為「信任陷阱」！', author:'stu_g5_liu', x:2350, y:3800, parentId:'g5-w1-14', date:DATES.W1+140000, cluster:'C', promisingness:96 },
                { id:'g5-w1-ra', topicId:'t_g5', type:'riseabove', title:'Week 1 總結：流暢本身就是風險入口', content:'第五組第一週真正建立起來的，不只是『AI會幻覺』，而是『流暢、完整、像真的』本身可能就是風險放大的入口。', author:'stu_g5_liao', x:2600, y:3800, parentId:'g5-w1-15', date:DATES.W1+150000, cluster:'C', promisingness:98 },

                // --- Week 2 (18 篇) ---
                { id:'g5-w2-1', topicId:'t_g5', type:'question', title:'把幻覺放回使用情境？', content:'如果把幻覺風險放回使用情境，我們是不是不能再只講一個大概念？', author:'stu_g5_liao', x:2850, y:3800, parentId:'g5-w1-ra', date:DATES.W2, cluster:'A', promisingness:86 },
                { id:'g5-w2-2', topicId:'t_g5', type:'counter', title:'怎麼不憑感覺分風險？', content:'如果開始分任務，要怎麼避免只是憑感覺說哪種比較危險？', author:'stu_g5_xie', x:3100, y:3600, parentId:'g5-w2-1', date:DATES.W2+10000, cluster:'A', promisingness:85 },
                { id:'g5-w2-3', topicId:'t_g5', type:'extend', title:'「誰在用」的代價差異', content:'學生拿 AI 寫報告，跟家長拿 AI 查健康資訊，兩邊錯誤的代價顯然不同，那『誰在用』是不是也要放進來？', author:'stu_g5_liu', x:3100, y:4000, parentId:'g5-w2-1', date:DATES.W2+20000, cluster:'B', promisingness:88 },
                { id:'g5-w2-4', topicId:'t_g5', type:'improve', title:'不同任務類型的風險結構', content:'先把問題縮成：不同任務類型下，生成式 AI 的錯誤有沒有不同風險結構？', author:'stu_g5_liao', x:3350, y:4000, parentId:'g5-w2-3', date:DATES.W2+30000, cluster:'B', promisingness:92 },
                { id:'g5-w2-5', topicId:'t_g5', type:'extend', title:'寫程式錯了會跑不動', content:'像寫程式，如果 AI 給錯語法，程式直接報錯，這種風險其實很低，因為馬上就抓包了。', author:'stu_g5_xie', x:3350, y:3600, parentId:'g5-w2-2', date:DATES.W2+40000, cluster:'A', promisingness:87 },
                { id:'g5-w2-6', topicId:'t_g5', type:'counter', title:'但如果查法規錯了', content:'但如果是叫它總結某個法規，它如果漏掉一句關鍵字，一般人根本不會發現。', author:'stu_g5_liu', x:3600, y:3600, parentId:'g5-w2-5', date:DATES.W2+50000, cluster:'A', promisingness:90 },
                { id:'g5-w2-7', topicId:'t_g5', type:'improve', title:'容錯率與可驗證性', content:'這就是任務的「容錯率」和「可驗證性」。寫程式可驗證性高，查資料可驗證性低。', author:'stu_g5_liao', x:3850, y:3600, parentId:'g5-w2-6', date:DATES.W2+60000, cluster:'A', promisingness:95 },
                { id:'g5-w2-8', topicId:'t_g5', type:'extend', title:'使用者本身的背景', content:'而且這也跟使用者的知識背景有關。如果是律師用 AI 查法規，他可能一眼就看出錯。', author:'stu_g5_xie', x:3600, y:4000, parentId:'g5-w2-4', date:DATES.W2+70000, cluster:'B', promisingness:91 },
                { id:'g5-w2-9', topicId:'t_g5', type:'extend', title:'新手最容易受害', content:'所以 AI 幻覺最大的受害者，其實是那些用它來學習「自己原本不懂的領域」的新手。', author:'stu_g5_liu', x:3850, y:4000, parentId:'g5-w2-8', date:DATES.W2+80000, cluster:'B', promisingness:93 },
                { id:'g5-w2-10', topicId:'t_g5', type:'improve', title:'驗證能力的落差', content:'對，當新手無法驗證，又完全信任 AI 的流暢解答時，這個「代價」就成形了。', author:'stu_g5_liao', x:4100, y:4000, parentId:'g5-w2-9', date:DATES.W2+90000, cluster:'B', promisingness:96 },
                { id:'g5-w2-11', topicId:'t_g5', type:'improve', title:'任務、使用者、代價', content:'我們要把這三個詞串起來：任務的可驗證性、使用者的知識背景、最終造成的代價。', author:'stu_g5_xie', x:4100, y:3800, parentId:'g5-w2-7', date:DATES.W2+100000, cluster:'C', promisingness:94 },
                { id:'g5-w2-12', topicId:'t_g5', type:'extend', title:'建立情境矩陣', content:'我們可以試著建立一個情境矩陣，把不同的使用案例放進去評分。', author:'stu_g5_liu', x:4350, y:3800, parentId:'g5-w2-11', date:DATES.W2+110000, cluster:'C', promisingness:95 },
                { id:'g5-w2-13', topicId:'t_g5', type:'extend', title:'有了實際尺標', content:'這樣做很好，這讓我們不會只在空中討論「幻覺好可怕」，而是有實際的尺標。', author:'stu_g5_liao', x:4600, y:3800, parentId:'g5-w2-12', date:DATES.W2+120000, cluster:'C', promisingness:96 },
                { id:'g5-w2-14', topicId:'t_g5', type:'extend', title:'看缺陷在哪落地', content:'也就是看這個技術的缺陷，在哪種社會場景下會砸到人。', author:'stu_g5_xie', x:4850, y:3800, parentId:'g5-w2-13', date:DATES.W2+130000, cluster:'C', promisingness:92 },
                { id:'g5-w2-15', topicId:'t_g5', type:'extend', title:'挑幾個經典情境', content:'沒錯，有了具體場景，我們的研究就有血有肉了。', author:'stu_g5_liu', x:5100, y:3800, parentId:'g5-w2-14', date:DATES.W2+140000, cluster:'C', promisingness:93 },
                { id:'g5-w2-16', topicId:'t_g5', type:'improve', title:'醫療、法律、程式', content:'我們可以挑「醫療諮詢」、「法律文件總結」、「程式代碼生成」來當對比案例。', author:'stu_g5_xie', x:5350, y:3800, parentId:'g5-w2-15', date:DATES.W2+150000, cluster:'C', promisingness:97 },
                { id:'g5-w2-17', topicId:'t_g5', type:'improve', title:'加上餐廳推薦當對照', content:'再加一個「餐廳推薦」當對照組，因為這個容錯率最高，代價最低。這樣光譜就完整了。', author:'stu_g5_liu', x:5600, y:3800, parentId:'g5-w2-16', date:DATES.W2+160000, cluster:'C', promisingness:98 },
                { id:'g5-w2-ra', topicId:'t_g5', type:'riseabove', title:'Week 2 總結：任務、使用者與代價', content:'第五組第二週不再只問 AI 有沒有錯，而是開始問：不同任務、不同使用者下，哪種錯更容易變成真正代價。', author:'stu_g5_liao', x:5850, y:3800, parentId:'g5-w2-17', date:DATES.W2+170000, cluster:'C', promisingness:100 },

                // --- Week 3 (20 篇) ---
                { id:'g5-w3-1', topicId:'t_g5', type:'question', title:'不是每種錯都能放同一層？', content:'如果第五組後面真的要做風險結構，那第一步是不是要先承認：不是每一種錯都能放在同一層看？', author:'stu_g5_liao', x:6100, y:3800, parentId:'g5-w2-ra', date:DATES.W3, cluster:'A', promisingness:90 },
                { id:'g5-w3-2', topicId:'t_g5', type:'counter', title:'怎麼證明比較危險？', content:'如果要說某種錯比較危險，那要靠什麼證明？我們總不能只用感覺去分。', author:'stu_g5_xie', x:6350, y:3600, parentId:'g5-w3-1', date:DATES.W3+10000, cluster:'A', promisingness:88 },
                { id:'g5-w3-3', topicId:'t_g5', type:'extend', title:'停止懷疑算不算代價？', content:'答案明明不完全對，但因為講得很有自信，人就不會再去問第二次，這種『停止懷疑』算不算代價？', author:'stu_g5_liu', x:6350, y:4000, parentId:'g5-w3-1', date:DATES.W3+20000, cluster:'B', promisingness:92 },
                { id:'g5-w3-4', topicId:'t_g5', type:'improve', title:'可辨識性與後果兩軸', content:'先用兩軸想：容不容易被發現（可辨識性）、相信後後果大不大（後果嚴重性）。', author:'stu_g5_liao', x:6600, y:3600, parentId:'g5-w3-2', date:DATES.W3+30000, cluster:'A', promisingness:95 },
                { id:'g5-w3-5', topicId:'t_g5', type:'extend', title:'有些錯很荒謬', content:'對，像有時候 AI 會亂接一些完全不存在的古代人名，這種一眼就看穿的錯，風險其實很低。', author:'stu_g5_xie', x:6850, y:3600, parentId:'g5-w3-4', date:DATES.W3+40000, cluster:'A', promisingness:90 },
                { id:'g5-w3-6', topicId:'t_g5', type:'improve', title:'沒有穿過信任防線', content:'因為它太容易被辨識，根本沒有穿過我們的信任防線，所以沒有殺傷力。', author:'stu_g5_liu', x:7100, y:3600, parentId:'g5-w3-5', date:DATES.W3+50000, cluster:'A', promisingness:94 },
                { id:'g5-w3-7', topicId:'t_g5', type:'question', title:'哪種錯最危險？', content:'既然荒謬的錯不危險，那到底哪種幻覺的殺傷力最大？', author:'stu_g5_liao', x:6600, y:4000, parentId:'g5-w3-3', date:DATES.W3+60000, cluster:'B', promisingness:92 },
                { id:'g5-w3-8', topicId:'t_g5', type:'improve', title:'九真一假的錯', content:'絕對是「九真一假」的錯。它前面的推論都對，只在最後給你一個捏造的結論。', author:'stu_g5_xie', x:6850, y:4000, parentId:'g5-w3-7', date:DATES.W3+70000, cluster:'B', promisingness:96 },
                { id:'g5-w3-9', topicId:'t_g5', type:'extend', title:'捏造合理出處', content:'或者是它捏造了一個看起來非常專業的論文出處，格式全對，但那篇論文根本不存在。', author:'stu_g5_liu', x:7100, y:4000, parentId:'g5-w3-8', date:DATES.W3+80000, cluster:'B', promisingness:97 },
                { id:'g5-w3-10', topicId:'t_g5', type:'improve', title:'低可辨識性', content:'這就是我們說的「低可辨識性」。因為外表太完美，除非你去查那個DOI碼，不然一定被騙。', author:'stu_g5_liao', x:7350, y:4000, parentId:'g5-w3-9', date:DATES.W3+90000, cluster:'B', promisingness:98 },
                { id:'g5-w3-11', topicId:'t_g5', type:'extend', title:'加上高後果', content:'如果這種低可辨識性的錯，剛好發生在醫療建議上（高後果）...那就是災難。', author:'stu_g5_xie', x:7600, y:4000, parentId:'g5-w3-10', date:DATES.W3+100000, cluster:'B', promisingness:95 },
                { id:'g5-w3-12', topicId:'t_g5', type:'improve', title:'核彈級風險', content:'對，這兩個條件一疊加，這就是核彈級風險！', author:'stu_g5_liu', x:7850, y:4000, parentId:'g5-w3-11', date:DATES.W3+110000, cluster:'B', promisingness:97 },
                { id:'g5-w3-13', topicId:'t_g5', type:'improve', title:'畫十字象限圖', content:'太棒了！我們可以用這兩個軸（可辨識性、後果）畫出一個十字象限圖。', author:'stu_g5_liao', x:7350, y:3600, parentId:'g5-w3-6', date:DATES.W3+120000, cluster:'A', promisingness:96 },
                { id:'g5-w3-14', topicId:'t_g5', type:'extend', title:'第一象限是高風險區', content:'落在「低可辨識性、高後果」的那個象限，就是我們第五組要主攻的魔王區。', author:'stu_g5_xie', x:7600, y:3600, parentId:'g5-w3-13', date:DATES.W3+130000, cluster:'A', promisingness:98 },
                { id:'g5-w3-15', topicId:'t_g5', type:'extend', title:'討論變有層次', content:'這樣我們的討論就非常有層次了，不再是二分法的有錯或沒錯。', author:'stu_g5_liu', x:7850, y:3600, parentId:'g5-w3-14', date:DATES.W3+140000, cluster:'A', promisingness:95 },
                { id:'g5-w3-16', topicId:'t_g5', type:'extend', title:'能不能被抓包', content:'對，重點變成了「這個錯能不能在造成傷害前被輕易抓包」。', author:'stu_g5_xie', x:8100, y:3600, parentId:'g5-w3-15', date:DATES.W3+150000, cluster:'A', promisingness:94 },
                { id:'g5-w3-17', topicId:'t_g5', type:'counter', title:'可辨識性因人而異', content:'不過我想提一點，可辨識性是客觀的嗎？同一篇錯的文章，我看辨識不出來，教授看可能秒懂。', author:'stu_g5_liu', x:8100, y:4000, parentId:'g5-w3-12', date:DATES.W3+160000, cluster:'B', promisingness:96 },
                { id:'g5-w3-18', topicId:'t_g5', type:'improve', title:'扣回使用者背景', content:'沒錯！鈺瑄這個反駁超好，這就完美扣回了我們上週講的「使用者的知識背景」！', author:'stu_g5_liao', x:8350, y:4000, parentId:'g5-w3-17', date:DATES.W3+170000, cluster:'B', promisingness:99 },
                { id:'g5-w3-19', topicId:'t_g5', type:'extend', title:'動態的互動關係', content:'所以風險根本不是寫死在 AI 裡的，而是 AI 生成的內容跟使用者當下的狀態「互動」出來的。這才是真實的風險。', author:'stu_g5_xie', x:8600, y:4000, parentId:'g5-w3-18', date:DATES.W3+180000, cluster:'B', promisingness:100 },
                { id:'g5-w3-ra', topicId:'t_g5', type:'riseabove', title:'Week 3 總結：風險與辨識度及懷疑度', content:'第五組第三週真正往前推了一步：不是每種錯都一樣可怕，風險至少跟可辨識性、後果與使用者停止懷疑有關。', author:'stu_g5_liao', x:8850, y:3800, parentId:'g5-w3-19', date:DATES.W3+190000, cluster:'C', promisingness:100 },

                // --- Week 4 (21 篇) ---
                { id:'g5-w4-1', topicId:'t_g5', type:'question', title:'風險判準最少要幾個面向？', content:'如果現在要正式建立風險判準，那最少要放哪幾個面向才夠？', author:'stu_g5_liao', x:9100, y:3800, parentId:'g5-w3-ra', date:DATES.W4, cluster:'C', promisingness:88 },
                { id:'g5-w4-2', topicId:'t_g5', type:'counter', title:'分層邊界會不會很模糊？', content:'如果真的要把風險分層，邊界會不會很模糊？我們需要具體的指標。', author:'stu_g5_xie', x:9350, y:3600, parentId:'g5-w4-1', date:DATES.W4+10000, cluster:'A', promisingness:86 },
                { id:'g5-w4-3', topicId:'t_g5', type:'extend', title:'分級是給誰看的？', content:'這個分級最終要幫誰看？是給研究者分析，還是給一般使用者理解？', author:'stu_g5_liu', x:9350, y:4000, parentId:'g5-w4-1', date:DATES.W4+20000, cluster:'B', promisingness:85 },
                { id:'g5-w4-4', topicId:'t_g5', type:'improve', title:'四個面向的判準', content:'我試著整理前幾週的結論，提議用四個面向：1.事實偏差程度 2.可辨識性 3.表述自信 4.可能後果。', author:'stu_g5_liao', x:9600, y:3600, parentId:'g5-w4-2', date:DATES.W4+30000, cluster:'A', promisingness:94 },
                { id:'g5-w4-5', topicId:'t_g5', type:'extend', title:'就像風險公式', content:'這四個加起來就像是風險的計算公式，少一個都不行。', author:'stu_g5_xie', x:9850, y:3600, parentId:'g5-w4-4', date:DATES.W4+40000, cluster:'A', promisingness:92 },
                { id:'g5-w4-6', topicId:'t_g5', type:'counter', title:'四個權重一樣嗎？', content:'不過我想問，這四個面向的權重是一樣的嗎？還是有哪一個特別致命？', author:'stu_g5_liu', x:10100, y:3600, parentId:'g5-w4-5', date:DATES.W4+50000, cluster:'A', promisingness:91 },
                { id:'g5-w4-7', topicId:'t_g5', type:'improve', title:'表述自信是放大器', content:'我覺得「表述自信」是一個放大器。它本身不是錯，但它會把錯的殺傷力放大。', author:'stu_g5_liao', x:10350, y:3600, parentId:'g5-w4-6', date:DATES.W4+60000, cluster:'A', promisingness:96 },
                { id:'g5-w4-8', topicId:'t_g5', type:'extend', title:'不確定語氣會引發查證', content:'對，如果它用「我不確定，但可能...」的語氣，就算講錯，我們也會自己去查證。', author:'stu_g5_xie', x:10600, y:3600, parentId:'g5-w4-7', date:DATES.W4+70000, cluster:'A', promisingness:95 },
                { id:'g5-w4-9', topicId:'t_g5', type:'extend', title:'肯定語氣會騙人', content:'但它如果用「毫無疑問」、「絕對是」的語氣給出一個錯的法條，我們就直接被騙了。', author:'stu_g5_liu', x:10850, y:3600, parentId:'g5-w4-8', date:DATES.W4+80000, cluster:'A', promisingness:97 },
                { id:'g5-w4-10', topicId:'t_g5', type:'improve', title:'自信是催化劑', content:'所以表述自信是催化劑，它直接摧毀了我們的「可辨識性」（因為我們懶得辨識了）。', author:'stu_g5_liao', x:11100, y:3600, parentId:'g5-w4-9', date:DATES.W4+90000, cluster:'A', promisingness:99 },
                { id:'g5-w4-11', topicId:'t_g5', type:'extend', title:'摧毀可辨識性', content:'這句超有感覺，它讓我們主動放棄了檢驗。', author:'stu_g5_xie', x:11350, y:3600, parentId:'g5-w4-10', date:DATES.W4+100000, cluster:'A', promisingness:96 },
                { id:'g5-w4-12', topicId:'t_g5', type:'improve', title:'做成評估表Rubric', content:'那我們可以把這四個面向做成一個標準的評估表（Rubric）！', author:'stu_g5_liu', x:9600, y:4000, parentId:'g5-w4-3', date:DATES.W4+110000, cluster:'B', promisingness:93 },
                { id:'g5-w4-13', topicId:'t_g5', type:'extend', title:'拿不同Prompt測試', content:'然後拿不同的 Prompt 去弄 AI，看看它產出的回答在這四個指向上得幾分。', author:'stu_g5_liao', x:9850, y:4000, parentId:'g5-w4-12', date:DATES.W4+120000, cluster:'B', promisingness:95 },
                { id:'g5-w4-14', topicId:'t_g5', type:'question', title:'怎麼客觀量化語氣？', content:'可是要怎麼量化？語氣這種東西很主觀吧？', author:'stu_g5_xie', x:10100, y:4000, parentId:'g5-w4-13', date:DATES.W4+130000, cluster:'B', promisingness:91 },
                { id:'g5-w4-15', topicId:'t_g5', type:'improve', title:'1-5分李克特量表', content:'我們可以定義 1 分是「充滿不確定詞彙」，5 分是「使用絕對肯定句句型」。', author:'stu_g5_liu', x:10350, y:4000, parentId:'g5-w4-14', date:DATES.W4+140000, cluster:'B', promisingness:96 },
                { id:'g5-w4-16', topicId:'t_g5', type:'extend', title:'客觀測量工具', content:'有了這個定義，我們就有客觀的測量工具了，不再只是憑感覺說「它好像在亂掰」。', author:'stu_g5_liao', x:10600, y:4000, parentId:'g5-w4-15', date:DATES.W4+150000, cluster:'B', promisingness:98 },
                { id:'g5-w4-17', topicId:'t_g5', type:'extend', title:'事實偏差也分級', content:'事實偏差也可以分：1分是微小細節錯，5分是整個核心邏輯相反。', author:'stu_g5_xie', x:10850, y:4000, parentId:'g5-w4-16', date:DATES.W4+160000, cluster:'B', promisingness:97 },
                { id:'g5-w4-18', topicId:'t_g5', type:'improve', title:'四維度評估體系', content:'這樣我們第五組就建立了一套獨家的「生成式 AI 幻覺四維度風險評估體系」了！', author:'stu_g5_liu', x:11100, y:4000, parentId:'g5-w4-17', date:DATES.W4+170000, cluster:'B', promisingness:99 },

                { id:'g5-w4-20', topicId:'t_g5', type:'extend', title:'視覺化有說服力', content:'這個視覺化的點子超棒，評審一看雷達圖就能馬上懂我們在做什麼。', author:'stu_g5_xie', x:11600, y:4000, parentId:'g5-w4-19', date:DATES.W4+190000, cluster:'B', promisingness:98 },
                { id:'g5-w4-ra', topicId:'t_g5', type:'riseabove', title:'Week 4 總結：分層評估的風險問題', content:'第五組第四週正式把『幻覺』從單點錯誤，做成可以分層評估（事實偏差、可辨識性、表述自信、可能後果）的四維度風險問題。', author:'stu_g5_liao', x:11850, y:3800, parentId:'g5-w4-20', date:DATES.W4+200000, cluster:'C', promisingness:100 },

                // --- Week 5 (21 篇) ---
                { id:'g5-w5-1', topicId:'t_g5', type:'question', title:'怎麼變成比較的架構？', content:'如果現在已經有風險判準，那後面要怎麼把它變成真的能比較的架構？我們需要實際下場測試了。', author:'stu_g5_liao', x:12100, y:3800, parentId:'g5-w4-ra', date:DATES.W5, cluster:'C', promisingness:90 },
                { id:'g5-w5-2', topicId:'t_g5', type:'extend', title:'錯誤是不是穩定出現？', content:'如果要說某種條件下高風險錯比較容易出現，是不是還要看這個錯誤是不是穩定出現？只發生一次可能是偶然。', author:'stu_g5_xie', x:12350, y:3600, parentId:'g5-w5-1', date:DATES.W5+10000, cluster:'A', promisingness:92 },
                { id:'g5-w5-3', topicId:'t_g5', type:'improve', title:'穩定製造誤解的機制', content:'對，如果一種錯會穩定出現，而且人又穩定容易相信，那這就不只是答錯，而是一種「穩定製造誤解的機制」。', author:'stu_g5_liu', x:12600, y:3600, parentId:'g5-w5-2', date:DATES.W5+20000, cluster:'A', promisingness:95 },
                { id:'g5-w5-4', topicId:'t_g5', type:'improve', title:'三個核心比較', content:'我們先抓三個核心比較：題型（情境）、風險層級（我們的評估表）、表述自信。', author:'stu_g5_liao', x:12350, y:4000, parentId:'g5-w5-1', date:DATES.W5+30000, cluster:'B', promisingness:94 },
                { id:'g5-w5-5', topicId:'t_g5', type:'extend', title:'設計標準題庫', content:'所以我們現在要開始設計一組標準題庫去考 AI。', author:'stu_g5_xie', x:12600, y:4000, parentId:'g5-w5-4', date:DATES.W5+40000, cluster:'B', promisingness:91 },
                { id:'g5-w5-6', topicId:'t_g5', type:'extend', title:'藏不同的陷阱', content:'題庫裡面要藏不同的陷阱，例如常識題、專業冷門題、邏輯推論題。', author:'stu_g5_liu', x:12850, y:4000, parentId:'g5-w5-5', date:DATES.W5+50000, cluster:'B', promisingness:93 },
                { id:'g5-w5-7', topicId:'t_g5', type:'counter', title:'AI更新很快怎麼辦？', content:'但我有點擔心，AI 版本更新很快，今天測出來錯的，會不會下週更新後它就不會錯了？', author:'stu_g5_liao', x:13100, y:4000, parentId:'g5-w5-6', date:DATES.W5+60000, cluster:'B', promisingness:90 },
                { id:'g5-w5-8', topicId:'t_g5', type:'improve', title:'抓的是出錯模式', content:'所以我們要抓的不是「它會不會答對這一題」，而是它出錯時的「模式」。就算題目變了，那種一本正經胡說八道的模式是不會變的。', author:'stu_g5_xie', x:13350, y:4000, parentId:'g5-w5-7', date:DATES.W5+70000, cluster:'B', promisingness:96 },
                { id:'g5-w5-9', topicId:'t_g5', type:'extend', title:'模式與版本無關', content:'沒錯，我們要驗證的是「流暢掩蓋錯誤」這個結構，這個結構與 AI 版本無關。', author:'stu_g5_liu', x:13600, y:4000, parentId:'g5-w5-8', date:DATES.W5+80000, cluster:'B', promisingness:97 },
                { id:'g5-w5-10', topicId:'t_g5', type:'question', title:'要比較不同模型嗎？', content:'那我們需要拿 GPT-3.5 去跟 GPT-4 比較嗎？', author:'stu_g5_liao', x:12850, y:3600, parentId:'g5-w5-3', date:DATES.W5+90000, cluster:'A', promisingness:88 },
                { id:'g5-w5-11', topicId:'t_g5', type:'counter', title:'比較模型會失焦', content:'我覺得比較模型會失焦，別人會以為我們在做產品評測。我們應該固定一個模型，但改變給它的情境。', author:'stu_g5_xie', x:13100, y:3600, parentId:'g5-w5-10', date:DATES.W5+100000, cluster:'A', promisingness:94 },

                { id:'g5-w5-14', topicId:'t_g5', type:'extend', title:'找高表述自信的錯', content:'然後看看在哪種角色設定下，它最容易產生那些「高表述自信、低可辨識」的高風險幻覺。', author:'stu_g5_xie', x:13850, y:3600, parentId:'g5-w5-13', date:DATES.W5+130000, cluster:'A', promisingness:97 },
                { id:'g5-w5-15', topicId:'t_g5', type:'extend', title:'紀錄自信評分', content:'並且在測試紀錄表裡，一定要有一格專門紀錄它的「自信程度評分」。', author:'stu_g5_liu', x:14100, y:3600, parentId:'g5-w5-14', date:DATES.W5+140000, cluster:'A', promisingness:95 },
                { id:'g5-w5-16', topicId:'t_g5', type:'improve', title:'驗證四個面向', content:'這樣一來，我們設計的四個風險面向就真的能在測試中被驗證了。', author:'stu_g5_liao', x:14350, y:3600, parentId:'g5-w5-15', date:DATES.W5+150000, cluster:'A', promisingness:99 },
                { id:'g5-w5-17', topicId:'t_g5', type:'extend', title:'需要大量數據', content:'這代表我們每個人都要下去跑大量的題目測試，數據才會夠。', author:'stu_g5_xie', x:14600, y:3600, parentId:'g5-w5-16', date:DATES.W5+160000, cluster:'A', promisingness:94 },

                { id:'g5-w5-19', topicId:'t_g5', type:'improve', title:'匯總到雷達圖', content:'太棒了，最後再把這三個領域的數據全部匯總到我們的雷達圖評估表上。', author:'stu_g5_liao', x:15100, y:3600, parentId:'g5-w5-18', date:DATES.W5+180000, cluster:'A', promisingness:98 },
