<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>知識建構協作平台 (KB Platform) - Mobile Optimized</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        kb: {
                            blue: '#3b82f6',
                            yellow: '#eab308',
                            green: '#22c55e',
                            red: '#ef4444',
                            purple: '#a855f7',
                        }
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    padding: {
                        'safe-bottom': 'env(safe-area-inset-bottom)',
                    }
                }
            }
        }
    </script>
    <style>
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; /* 防止整個頁面捲動，交由容器處理 */
            overscroll-behavior: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        #canvas-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: -1;
        }
        
        /* 通用滾動條樣式 */
        .custom-scroll {
            -webkit-overflow-scrolling: touch; /* iOS 滑順滾動 */
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        
        /* 隱藏滾動條但保留功能 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .node-card {
            transition: box-shadow 0.2s, transform 0.2s; 
            user-select: none; 
            touch-action: none; 
            -webkit-user-select: none;
            will-change: left, top; 
        }
        .node-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            z-index: 50;
        }
        .node-card.selected-node {
            box-shadow: 0 0 0 3px #3b82f6, 0 10px 15px -3px rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            z-index: 60;
        }
        .promising-node {
            box-shadow: 0 0 0 4px rgba(251, 146, 60, 0.3), 0 0 20px rgba(251, 146, 60, 0.4);
            border-color: #f97316 !important;
        }
        .cluster-zone {
            position: absolute;
            border: 2px dashed rgba(203, 213, 225, 0.6);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 1rem;
            pointer-events: none;
            transition: all 0.5s ease-in-out;
            background: rgba(255, 255, 255, 0.4);
        }
        .cluster-title {
            font-weight: 700;
            font-size: 1rem;
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background: white;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        path.connection { 
            fill: none; 
            stroke-width: 2; 
            transition: stroke 0.3s; 
            pointer-events: none; 
        }
        
        #selection-box {
            position: fixed;
            background-color: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.5);
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        .noselect {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        @keyframes pulse-gentle { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .ai-pulse { animation: pulse-gentle 2s infinite; }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in-up 0.5s ease-out forwards; }
        
        .category-scroll-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .category-scroll-container::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) {
            .category-scroll-container { overflow-x: visible; }
        }

        .nav-btn.active { color: #4f46e5; background-color: #e0e7ff; }
        .mobile-nav-btn.active { color: #4f46e5; }
        .filter-btn { transition: background-color 0.2s, color 0.2s, border-color 0.2s; border-color: rgb(226, 232, 240); }
        .filter-btn.active { background-color: rgb(238, 242, 255); color: rgb(79, 70, 229); border-color: rgb(165, 180, 252); }
        
        #canvas-wrapper { touch-action: none; }
        .category-tag { cursor: pointer; transition: all 0.2s; user-select: none; }
        .category-tag.selected { background-color: #e0e7ff; color: #4338ca; border-color: #818cf8; }

        /* Mobile specific padding helper */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-full w-full flex flex-col font-sans">
    <!-- Top Navbar -->
    <nav class="h-14 md:h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-6 z-50 shadow-sm relative shrink-0">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-8 h-8 md:w-10 md:h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-lg md:text-xl shrink-0">KB</div>
            <div>
                <h1 class="font-bold text-base md:text-lg leading-tight text-slate-800 truncate max-w-[120px] md:max-w-none">知識建構平台</h1>
                <p class="text-[10px] md:text-xs text-slate-500 hidden md:block">Knowledge Building Environment (v2.30)</p>

        </div>
        
        <!-- Desktop Nav -->
        <div class="hidden md:flex items-center bg-slate-100 p-1 rounded-lg gap-1">
            <button onclick="window.location.href='index.html'" class="nav-btn px-4 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-900 transition flex items-center gap-1"><i class="fa-solid fa-home"></i> 首頁</button>
            <button onclick="window.app.router('entrance')" data-nav="entrance" class="nav-btn px-4 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-900 transition flex items-center gap-1"><i class="fa-solid fa-layer-group"></i> 論壇入口</button>
            <button onclick="window.app.router('canvas')" data-nav="canvas" class="nav-btn px-4 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-900 transition flex items-center gap-1"><i class="fa-solid fa-project-diagram"></i> 知識地圖</button>
            
            <!-- External Links Dropdown -->

                <button class="nav-btn px-4 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-900 transition flex items-center gap-1">
                    <i class="fa-solid fa-chart-line"></i> 分析中樞 <i class="fa-solid fa-chevron-down text-[10px] ml-1"></i>
                </button>
                <div class="absolute top-full right-0 mt-1 w-48 bg-white rounded-lg shadow-lg border border-slate-100 hidden group-hover:block overflow-hidden z-50">
                    <a href="ANALYTICS-student.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-indigo-600"><i class="fa-solid fa-user-graduate mr-2"></i> 學生儀表板</a>
                    <a href="ANALYTICS-teacher.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-indigo-600"><i class="fa-solid fa-chalkboard-user mr-2"></i> 老師儀表板</a>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            <div id="ai-persona-indicator" class="hidden md:flex items-center gap-2 px-3 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-medium border border-indigo-100">
                <i class="fa-solid fa-robot ai-pulse"></i>
                <span id="active-ai-role">AI 協作中</span>
            </div>
            <div class="h-6 w-px bg-slate-200 mx-1 md:mx-2 hidden md:block"></div>
            <div class="flex items-center gap-2 group relative">
                <img id="user-avatar" src="" class="w-8 h-8 rounded-full bg-slate-200 object-cover border border-slate-300 shrink-0">
                <div class="text-right hidden sm:block">
                    <div id="user-name" class="text-sm font-semibold">User</div>
                    <div id="user-role" class="text-xs text-slate-500">Role</div>
                </div>
                <button onclick="window.app.toggleUserMenu()" class="ml-1 md:ml-2 text-slate-400 hover:text-indigo-600 p-1"><i class="fa-solid fa-chevron-down"></i></button>
                <div id="user-menu" class="absolute top-full right-0 mt-2 w-56 bg-white rounded-lg shadow-xl border border-slate-100 hidden overflow-hidden z-[100]"></div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main id="app-container" class="flex-1 relative overflow-hidden bg-slate-50 w-full"></main>

    <!-- Desktop Footer -->
    <footer class="hidden md:flex bg-white border-t border-slate-200 px-4 py-2 text-center z-40 text-[10px] md:text-xs text-slate-500 justify-center items-center gap-2 shrink-0">
        <i class="fa-solid fa-seedling text-green-500"></i>
        <span class="truncate">知識建構：在未完成的理解中彼此承擔責任，使想法在社群裡不斷向更好的解釋演化。</span>
    </footer>

    <!-- Mobile Bottom Navigation (Fixed at bottom) -->
    <!-- Added padding-bottom for safe area -->
    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center z-50 pb-safe h-14 box-content">
        <button onclick="window.location.href='index.html'" class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full pt-1 text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-home text-lg mb-0.5"></i> <span class="text-[10px]">首頁</span></button>
        <button onclick="window.app.router('entrance')" data-nav="entrance" class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full pt-1 text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-layer-group text-lg mb-0.5"></i> <span class="text-[10px]">論壇</span></button>
        <button onclick="window.app.router('canvas')" data-nav="canvas" class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full pt-1 text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-project-diagram text-lg mb-0.5"></i> <span class="text-[10px]">地圖</span></button>
        <button onclick="window.app.openAnalyticsMenu()" class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full pt-1 text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-chart-line text-lg mb-0.5"></i> <span class="text-[10px]">分析</span></button>
    </div>

    <!-- Mobile Analytics Menu Modal -->
    <div id="modal-analytics-menu" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex items-end justify-center">
        <div class="bg-white w-full rounded-t-xl p-6 pb-10 space-y-4 animate-fade-in-up">
            <h3 class="text-lg font-bold text-slate-800 border-b pb-2 mb-2">前往分析中樞</h3>
            <a href="ANALYTICS-student.html" class="flex items-center gap-3 p-4 bg-indigo-50 text-indigo-700 rounded-xl font-bold hover:bg-indigo-100 transition">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm text-xl"><i class="fa-solid fa-user-graduate"></i></div>
                <span>學生儀表板 (Student)</span>
            </a>
            <a href="ANALYTICS-teacher.html" class="flex items-center gap-3 p-4 bg-emerald-50 text-emerald-700 rounded-xl font-bold hover:bg-emerald-100 transition">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm text-xl"><i class="fa-solid fa-chalkboard-user"></i></div>

        </div>
    </div>

    <!-- Trash Can FAB (Adjusted position for Mobile) -->
    <button onclick="window.app.openTrash()" id="btn-trash-fab" class="fixed bottom-20 left-4 md:bottom-8 md:left-8 z-[60] bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 rounded-full w-12 h-12 md:w-14 md:h-14 shadow-lg flex items-center justify-center text-xl transition transform hover:scale-105 group" title="資源回收桶">
        <i class="fa-solid fa-trash-can group-hover:text-red-500 transition-colors"></i>
        <span id="trash-count-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full hidden border-2 border-white">0</span>
    </button>

    <!-- Modals (Improved Mobile Responsiveness) -->
    
    <!-- Topic Create Modal -->
    <div id="modal-topic" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] hidden flex items-end md:items-center justify-center p-4">
        <div class="bg-white rounded-t-xl md:rounded-xl shadow-2xl w-full max-w-lg p-6 transform transition-all scale-100 max-h-[85vh] overflow-y-auto mb-safe md:mb-0">
            <h3 id="modal-topic-title" class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-folder-plus text-indigo-600"></i> 開啟探究主題</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">核心問題</label>
                    <input type="text" id="topic-name" placeholder="例如：為什麼天空是藍色的？" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500 transition">
                </div>
                <div>

    </div>

    <!-- Node Composer Modal -->
    <div id="modal-node" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] hidden flex items-end md:items-center justify-center sm:p-4">
        <div class="bg-white rounded-t-xl sm:rounded-xl shadow-2xl w-full max-w-2xl p-4 sm:p-6 relative max-h-[90vh] overflow-y-auto flex flex-col mb-safe md:mb-0">

                <button onclick="window.ui.closeModal('modal-node')" class="text-slate-400 hover:text-slate-600 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scroll pb-2">

                <div id="scaffold-desc" class="hidden"></div>
                <div class="mb-3">
                    <input type="text" id="node-title" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none font-bold text-base md:text-lg placeholder:font-normal" placeholder="輸入想法標題...">
                </div>
                <div class="relative">
                    <textarea id="node-content" rows="4" class="w-full px-4 py-3 border border-slate-300 rounded-lg outline-none text-base" placeholder="輸入詳細內容..."></textarea>
                </div>
                <!-- AI Box moved inside scrollable area for mobile -->

                        <span class="font-bold block text-xs uppercase text-blue-400 mb-1">AI 建議</span>

                    </div>
                </div>

            <div class="mt-4 flex justify-end shrink-0 pt-2 border-t border-slate-100">

    <!-- Node Detail Modal -->

                <button onclick="window.ui.closeModal('modal-addUser')" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg">取消</button>

            </div>
        </div>
    </div>

    <!-- Trash Modal -->
    <div id="modal-trash" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[85vh]">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between shrink-0 bg-red-50 rounded-t-xl">
                <h3 class="text-lg font-bold text-red-700 flex items-center gap-2"><i class="fa-solid fa-trash-can"></i> 資源回收桶</h3>
                <button onclick="window.ui.closeModal('modal-trash')" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-100 text-red-400"><i class="fa-solid fa-xmark text-lg"></i></button>

            nodes: [
                // --- T1: 為什麼天空是藍色的？ (15+ nodes) ---
                { id: 'n1-1', topicId: 't1', type: 'question', title: '晴天與夕陽的顏色差異', content: '我好奇為什麼只有晴天是藍色，夕陽卻是紅色？這跟太陽的位置有關嗎？', author: 'u2', x: 100, y: 100, parentId: null, date: Date.now()-100000, cluster: 'A', promisingness: 30 },
                { id: 'n1-2', topicId: 't1', type: 'improve', title: '距離與顏色的關係', content: '這應該跟光線穿過大氣層的距離有關。距離越長，留下的光越紅。', author: 'u3', x: 100, y: 300, parentId: 'n1-1', date: Date.now()-90000, cluster: 'B', promisingness: 45 },
                { id: 'n1-3', topicId: 't1', type: 'extend', title: '瑞利散射理論', content: '我的理論是瑞利散射 (Rayleigh Scattering)。藍光波長短，容易被氣體分子散射。', author: 'u1', x: 400, y: 300, parentId: 'n1-1', date: Date.now()-85000, cluster: 'A', promisingness: 85 },

                { id: 'n1-6', topicId: 't1', type: 'riseabove', title: '散射與顆粒大小的整合模型', content: '整合觀點：天空顏色取決於「散射顆粒大小」與「光波長」的關係。微小氣體分子造成瑞利散射(藍/紅)，較大水滴造成米氏散射(白)。', author: 'u6', x: 800, y: 700, parentId: 'n1-5', date: Date.now()-70000, cluster: 'C', promisingness: 95 },

                { id: 'n1-10', topicId: 't1', type: 'question', title: '外星球的天空？', content: '如果在火星上，天空會是什麼顏色？那邊的大氣層成分不同吧？', author: 'u10', x: 100, y: 500, parentId: 'n1-1', date: Date.now()-50000, cluster: 'A', promisingness: 50 },
                { id: 'n1-11', topicId: 't1', type: 'extend', title: '火星的紅色天空', content: '我看過NASA照片，火星天空通常是紅褐色的，這跟空氣中的氧化鐵塵埃有關。', author: 'u2', x: 200, y: 600, parentId: 'n1-10', date: Date.now()-45000, cluster: 'A', promisingness: 65 },
                { id: 'n1-12', topicId: 't1', type: 'riseabove', title: '大氣成分與顏色的普適原則', content: '所以我們可以歸納出：天空顏色 = 光源光譜 + 大氣成分(散射性質) + 觀察者感官。不僅限於地球。', author: 'u1', x: 300, y: 750, parentId: 'n1-11', date: Date.now()-40000, cluster: 'C', promisingness: 90 },
                { id: 'n1-13', topicId: 't1', type: 'question', title: '夜晚的天空為什麼是黑的？', content: '這聽起來很笨，但既然宇宙有無數恆星，為什麼天空不會充滿光亮？(奧伯斯佯謬)', author: 'u3', x: 900, y: 200, parentId: null, date: Date.now()-35000, cluster: 'A', promisingness: 80 },
                { id: 'n1-14', topicId: 't1', type: 'improve', title: '宇宙膨脹與紅移', content: '因為宇宙在膨脹，遠方恆星的光發生紅移，變成了我們肉眼看不見的紅外線。', author: 'u4', x: 1000, y: 350, parentId: 'n1-13', date: Date.now()-30000, cluster: 'B', promisingness: 85 },
                { id: 'n1-15', topicId: 't1', type: 'extend', title: '光速有限', content: '還有一個原因是宇宙年齡有限，很多光還沒傳到地球。', author: 'u5', x: 1100, y: 450, parentId: 'n1-14', date: Date.now()-25000, cluster: 'B', promisingness: 80 },

                // --- T2: AI 是否具有創造力？ (15+ nodes) ---
                { id: 'n2-1', topicId: 't2', type: 'question', title: 'AI 真的能「創作」嗎？', content: 'AI 生成的畫作很美，但這算是創造嗎？還是只是高級的拼貼？', author: 'u1', x: 100, y: 100, parentId: null, date: Date.now()-100000, cluster: 'A', promisingness: 40 },
                { id: 'n2-2', topicId: 't2', type: 'counter', title: '只是統計學鸚鵡', content: '目前的 LLM 或 Diffusion 模型本質上是預測下一個字/像素的機率，沒有靈魂或意圖。', author: 'u2', x: 100, y: 300, parentId: 'n2-1', date: Date.now()-90000, cluster: 'A', promisingness: 50 },

                { id: 'n2-4', topicId: 't2', type: 'extend', title: 'Boden 的三種創造力', content: '瑪格麗特·博登提出三種創造力：組合性、探索性、變革性。AI 目前很擅長前兩者。', author: 'u1', x: 600, y: 300, parentId: 'n2-3', date: Date.now()-80000, cluster: 'B', promisingness: 85 },
                { id: 'n2-5', topicId: 't2', type: 'extend', title: 'AlphaGo 的第 37 手', content: 'AlphaGo 下出的第 37 手被圍棋界稱為「神之一手」，這是人類從未想過的下法，這算變革性創造力吧？', author: 'u4', x: 850, y: 400, parentId: 'n2-4', date: Date.now()-75000, cluster: 'B', promisingness: 90 },
                { id: 'n2-6', topicId: 't2', type: 'counter', title: '缺乏意圖 (Intentionality)', content: '但 AlphaGo 不知道自己在下棋，它只是在優化函數。沒有「想表達什麼」的意圖，能算藝術嗎？', author: 'u5', x: 600, y: 500, parentId: 'n2-5', date: Date.now()-70000, cluster: 'A', promisingness: 70 },
                { id: 'n2-7', topicId: 't2', type: 'riseabove', title: '重新定義創造力', content: '或許我們需要區分「過程的創造力」與「結果的創造力」。AI 擁有結果的創造力，但缺乏過程中的主觀體驗。', author: 'u6', x: 500, y: 700, parentId: 'n2-6', date: Date.now()-65000, cluster: 'C', promisingness: 95 },
                { id: 'n2-8', topicId: 't2', type: 'question', title: '版權歸屬問題', content: '如果 AI 真的有創造力，那生成的作品版權歸誰？', author: 'u7', x: 1000, y: 200, parentId: null, date: Date.now()-60000, cluster: 'A', promisingness: 50 },
                { id: 'n2-9', topicId: 't2', type: 'improve', title: '提示詞工程師的貢獻', content: '應該歸給寫 Prompt 的人？因為那是創意的源頭。', author: 'u8', x: 1000, y: 400, parentId: 'n2-8', date: Date.now()-55000, cluster: 'B', promisingness: 55 },
                { id: 'n2-10', topicId: 't2', type: 'counter', title: '工具論', content: '就像用 Photoshop 畫圖，版權不屬於 Adobe。AI 只是工具。', author: 'u9', x: 1200, y: 500, parentId: 'n2-8', date: Date.now()-50000, cluster: 'B', promisingness: 60 },
                { id: 'n2-11', topicId: 't2', type: 'extend', title: '幻覺作為創意', content: '有時候 AI 的 Hallucination (幻覺/胡說八道) 反而是一種跳脫框架的創意來源。', author: 'u10', x: 200, y: 600, parentId: 'n2-1', date: Date.now()-45000, cluster: 'B', promisingness: 75 },
                { id: 'n2-12', topicId: 't2', type: 'question', title: '人機協作 (Co-Creation)', content: '未來會不會不再區分人或 AI，而是「人馬座 (Centaur)」模式？', author: 'u2', x: 400, y: 800, parentId: 'n2-7', date: Date.now()-40000, cluster: 'C', promisingness: 85 },

                { id: 'n3-1', topicId: 't3', type: 'question', title: '艾連是自由的嗎？', content: '艾連一直追求自由，但他看見未來記憶後，做的一切似乎都是為了實現那個未來。這算自由嗎？', author: 'u2', x: 100, y: 100, parentId: null, date: Date.now()-100000, cluster: 'A', promisingness: 60 },

                { id: 'n3-3', topicId: 't3', type: 'improve', title: '相容論 (Compatibilism)', content: '雖然未來是固定的，但那是因為艾連「渴望」那樣的結果。他是按自己的意志去選擇了那個必然的未來。', author: 'u4', x: 350, y: 300, parentId: 'n3-1', date: Date.now()-85000, cluster: 'B', promisingness: 85 },
                { id: 'n3-4', topicId: 't3', type: 'extend', title: '進擊的巨人的能力', content: '進擊的巨人能看見未來繼承者的記憶，這本身就是一種詛咒。', author: 'u8', x: 600, y: 300, parentId: 'n3-3', date: Date.now()-80000, cluster: 'B', promisingness: 75 },
                { id: 'n3-5', topicId: 't3', type: 'improve', title: '肯尼的遺言', content: '「人都必須沈醉在某些東西裡，否則活不下去。大家都是某種東西的奴隸。」艾連是自由的奴隸。', author: 'u5', x: 850, y: 400, parentId: 'n3-4', date: Date.now()-75000, cluster: 'B', promisingness: 90 },
                { id: 'n3-6', topicId: 't3', type: 'counter', title: '阿爾敏的自由', content: '對比艾連，阿爾敏想看海的夢想，似乎更接近純粹的自由？', author: 'u9', x: 600, y: 500, parentId: 'n3-1', date: Date.now()-70000, cluster: 'A', promisingness: 65 },

                { id: 'n3-8', topicId: 't3', type: 'question', title: '尤米爾的選擇', content: '尤米爾在道路中待了兩千年，她是奴隸還是神？', author: 'u3', x: 1000, y: 200, parentId: null, date: Date.now()-60000, cluster: 'A', promisingness: 50 },
                { id: 'n3-9', topicId: 't3', type: 'improve', title: '愛的束縛', content: '她是愛的奴隸。她對弗里茲王的扭曲之愛束縛了她。', author: 'u10', x: 1000, y: 400, parentId: 'n3-8', date: Date.now()-55000, cluster: 'B', promisingness: 60 },
                { id: 'n3-10', topicId: 't3', type: 'extend', title: '米卡莎的關鍵作用', content: '所以米卡莎最後的選擇（斬殺愛人）才解放了尤米爾。那才是真正的自由意志展現。', author: 'u6', x: 1200, y: 500, parentId: 'n3-9', date: Date.now()-50000, cluster: 'B', promisingness: 80 },
                { id: 'n3-11', topicId: 't3', type: 'question', title: '牆壁的象徵意義', content: '牆壁保護了人，也奪走了自由。這跟現實社會有什麼對應？', author: 'u2', x: 200, y: 600, parentId: null, date: Date.now()-45000, cluster: 'A', promisingness: 55 },
                { id: 'n3-12', topicId: 't3', type: 'extend', title: '無知是幸福嗎？', content: '牆內王消除了記憶，讓人們活在虛假的和平中。知情但痛苦 vs 無知但幸福，哪個比較好？', author: 'u4', x: 400, y: 800, parentId: 'n3-11', date: Date.now()-40000, cluster: 'C', promisingness: 75 },
                { id: 'n3-13', topicId: 't3', type: 'improve', title: '走出森林', content: '薩夏父親說的「必須讓孩子們走出森林」，是指切斷仇恨的連鎖，這才是人類真正的解放。', author: 'u1', x: 600, y: 800, parentId: 'n3-12', date: Date.now()-35000, cluster: 'C', promisingness: 95 },
                { id: 'n3-14', topicId: 't3', type: 'counter', title: '滅世是自由嗎？', content: '艾連選擇踏平世界來保護帕拉迪島，這種剝奪他人自由來換取自己自由的行為，矛盾且悲劇。', author: 'u5', x: 100, y: 500, parentId: 'n3-1', date: Date.now()-30000, cluster: 'A', promisingness: 85 },
                { id: 'n3-15', topicId: 't3', type: 'riseabove', title: '存在主義觀點', content: '「因為我誕生在這個世界上。」這句話表明生命本身就是目的，自由在於賦予自己生命意義。', author: 'u3', x: 800, y: 800, parentId: 'n3-13', date: Date.now()-25000, cluster: 'C', promisingness: 90 },

                // --- T4: Discord Bot (15 nodes) ---
                { id: 'n4-1', topicId: 't4', type: 'question', title: '如何開始寫一個 Bot？', content: '我完全是新手，要先安裝什麼？Discord Developer Portal 要怎麼設定？', author: 'u3', x: 100, y: 100, parentId: null, date: Date.now()-100000, cluster: 'A', promisingness: 40 },
                { id: 'n4-2', topicId: 't4', type: 'improve', title: '環境建置', content: '首先要安裝 Python，然後用 `pip install discord.py`。記得要在 Developer Portal 開啟 Privileged Gateway Intents。', author: 'u7', x: 100, y: 300, parentId: 'n4-1', date: Date.now()-90000, cluster: 'B', promisingness: 60 },
                { id: 'n4-3', topicId: 't4', type: 'extend', title: 'Token 安全', content: '絕對不要把 Token 直接寫在程式碼裡上傳 GitHub！要用 `.env` 檔或是環境變數。', author: 'u9', x: 350, y: 300, parentId: 'n4-2', date: Date.now()-85000, cluster: 'B', promisingness: 90 },
                { id: 'n4-4', topicId: 't4', type: 'question', title: 'Prefix vs Slash Commands', content: '以前都用 `!` 開頭的指令，現在好像都推薦用斜線指令 (Slash Commands)？', author: 'u10', x: 600, y: 300, parentId: 'n4-1', date: Date.now()-80000, cluster: 'A', promisingness: 50 },
                { id: 'n4-5', topicId: 't4', type: 'improve', title: '交互體驗差異', content: 'Slash commands 有 UI 提示，使用者體驗好很多，而且 Discord 官方也強推。建議用 `app_commands`。', author: 'u1', x: 850, y: 400, parentId: 'n4-4', date: Date.now()-75000, cluster: 'B', promisingness: 70 },
                { id: 'n4-6', topicId: 't4', type: 'question', title: 'Async/Await 是什麼？', content: '程式碼裡到處都是 `async def` 和 `await`，不寫會怎樣？', author: 'u6', x: 100, y: 500, parentId: 'n4-1', date: Date.now()-70000, cluster: 'A', promisingness: 65 },
                { id: 'n4-7', topicId: 't4', type: 'extend', title: '非同步概念', content: 'Discord bot 是 I/O bound 的，如果不用 async，當機器人在等網路回應時，整個程式會卡住，其他人都不能用。', author: 'u8', x: 350, y: 600, parentId: 'n4-6', date: Date.now()-65000, cluster: 'B', promisingness: 85 },
                { id: 'n4-8', topicId: 't4', type: 'question', title: '怎麼讓機器人播音樂？', content: '想做一個像 Rythm 的音樂機器人。', author: 'u2', x: 600, y: 500, parentId: null, date: Date.now()-60000, cluster: 'A', promisingness: 50 },
                { id: 'n4-9', topicId: 't4', type: 'improve', title: 'FFmpeg 與 VoiceClient', content: '需要安裝 FFmpeg。邏輯是：加入語音頻道 -> 下載/串流音訊 -> 用 FFmpeg 轉碼 -> 播放。', author: 'u4', x: 800, y: 600, parentId: 'n4-8', date: Date.now()-55000, cluster: 'B', promisingness: 75 },
                { id: 'n4-10', topicId: 't4', type: 'counter', title: '法律風險', content: '要注意 YouTube 的 TOS，最近很多音樂機器人都被迫關閉了。', author: 'u5', x: 1000, y: 650, parentId: 'n4-8', date: Date.now()-50000, cluster: 'A', promisingness: 80 },
                { id: 'n4-11', topicId: 't4', type: 'riseabove', title: '機器人架構模式', content: '隨著功能變多，要用 `Cogs` 來管理模組。不要把所有程式碼寫在 `main.py`。', author: 'u1', x: 500, y: 800, parentId: 'n4-2', date: Date.now()-45000, cluster: 'C', promisingness: 90 },
                { id: 'n4-12', topicId: 't4', type: 'question', title: '24小時運作', content: '我關掉電腦機器人就下線了，怎麼讓它一直跑？', author: 'u3', x: 100, y: 700, parentId: null, date: Date.now()-40000, cluster: 'A', promisingness: 60 },
                { id: 'n4-13', topicId: 't4', type: 'improve', title: '雲端部署', content: '可以用 Heroku (現在要錢了)、Render、或是買個便宜的 VPS (如 DigitalOcean)。', author: 'u7', x: 300, y: 800, parentId: 'n4-12', date: Date.now()-35000, cluster: 'B', promisingness: 70 },
                { id: 'n4-14', topicId: 't4', type: 'extend', title: 'UptimeRobot 大法', content: '如果是 Replit，可以用 UptimeRobot 定時 ping 你的網址來保持喚醒 (但不推薦，不穩定)。', author: 'u10', x: 300, y: 900, parentId: 'n4-13', date: Date.now()-30000, cluster: 'B', promisingness: 50 },
                { id: 'n4-15', topicId: 't4', type: 'riseabove', title: '資料庫整合', content: '如果要記住使用者的等級或金錢，需要串接資料庫。建議新手從 SQLite 開始，進階用 MongoDB。', author: 'u9', x: 600, y: 900, parentId: 'n4-11', date: Date.now()-25000, cluster: 'C', promisingness: 85 },

                // --- T5: 文藝復興 (15 nodes) ---
                { id: 'n5-1', topicId: 't5', type: 'question', title: '文藝復興的核心精神是什麼？', content: '是畫畫變得很像真的人嗎？還是有更深層的含義？', author: 'u1', x: 100, y: 100, parentId: null, date: Date.now()-100000, cluster: 'A', promisingness: 50 },
                { id: 'n5-2', topicId: 't5', type: 'improve', title: '人文主義 (Humanism)', content: '核心是「以人為本」。從中世紀關注「神」，轉變為關注「人」的價值、情感與現世生活。', author: 'u5', x: 100, y: 300, parentId: 'n5-1', date: Date.now()-90000, cluster: 'B', promisingness: 80 },
                { id: 'n5-3', topicId: 't5', type: 'extend', title: '透視法的發現', content: '布魯內萊斯基發現了線性透視法，這讓二維平面能展現三維空間，改變了人類觀看世界的方式。', author: 'u6', x: 350, y: 300, parentId: 'n5-2', date: Date.now()-85000, cluster: 'B', promisingness: 75 },
                { id: 'n5-4', topicId: 't5', type: 'extend', title: '解剖學的應用', content: '達文西透過解剖屍體來了解肌肉結構，這讓藝術與科學結合。', author: 'u8', x: 600, y: 300, parentId: 'n5-2', date: Date.now()-80000, cluster: 'B', promisingness: 70 },
                { id: 'n5-5', topicId: 't5', type: 'counter', title: '中世紀真的黑暗嗎？', content: '我們常說文藝復興是光明的，但中世紀其實也有很多技術進步，不該完全否定。', author: 'u2', x: 350, y: 500, parentId: 'n5-2', date: Date.now()-75000, cluster: 'A', promisingness: 65 },
                { id: 'n5-6', topicId: 't5', type: 'riseabove', title: '古今融合的創新', content: '文藝復興不是單純復古，而是結合古典希臘羅馬美學與基督教精神，創造出全新的文化體系。', author: 'u1', x: 600, y: 600, parentId: 'n5-2', date: Date.now()-70000, cluster: 'C', promisingness: 85 },
                { id: 'n5-7', topicId: 't5', type: 'question', title: '對現代設計的影響？', content: '現在的平面設計或建築，還有文藝復興的影子嗎？', author: 'u4', x: 900, y: 200, parentId: null, date: Date.now()-65000, cluster: 'A', promisingness: 55 },
                { id: 'n5-8', topicId: 't5', type: 'improve', title: '黃金比例', content: '很多現代 Logo (如 Apple, Twitter) 仍在使用黃金比例，這是文藝復興時期推崇的美學標準。', author: 'u7', x: 900, y: 400, parentId: 'n5-7', date: Date.now()-60000, cluster: 'B', promisingness: 70 },
                { id: 'n5-9', topicId: 't5', type: 'extend', title: '個人品牌的興起', content: '藝術家開始簽名，建立個人風格，這可以說是現代「個人品牌」的雛形。', author: 'u3', x: 1150, y: 400, parentId: 'n5-7', date: Date.now()-55000, cluster: 'B', promisingness: 60 },
                { id: 'n5-10', topicId: 't5', type: 'question', title: '梅迪奇家族的角色', content: '沒有金主贊助，會有文藝復興嗎？', author: 'u10', x: 100, y: 600, parentId: null, date: Date.now()-50000, cluster: 'A', promisingness: 60 },
                { id: 'n5-11', topicId: 't5', type: 'improve', title: '藝術與權力', content: '藝術成為展示權力與財富的工具。這跟現代企業贊助藝術展覽很像。', author: 'u9', x: 100, y: 800, parentId: 'n5-10', date: Date.now()-45000, cluster: 'B', promisingness: 75 },
                { id: 'n5-12', topicId: 't5', type: 'riseabove', title: '跨領域通才 (Polymath)', content: '文藝復興人(Renaissance Man) 代表通曉多種領域的人。在現代分工細化的社會，我們是否更需要這種整合能力？', author: 'u1', x: 500, y: 800, parentId: 'n5-4', date: Date.now()-40000, cluster: 'C', promisingness: 95 },
                { id: 'n5-13', topicId: 't5', type: 'counter', title: '菁英主義的侷限', content: '但當時的藝術主要是服務貴族和教會，平民百姓的生活並沒有太大改善。', author: 'u5', x: 300, y: 700, parentId: 'n5-2', date: Date.now()-35000, cluster: 'A', promisingness: 70 },
                { id: 'n5-14', topicId: 't5', type: 'extend', title: '印刷術的推波助瀾', content: '古騰堡印刷術加速了知識傳播，這才是文藝復興能擴散到全歐洲的關鍵。', author: 'u6', x: 700, y: 500, parentId: 'n5-6', date: Date.now()-30000, cluster: 'B', promisingness: 80 },
                { id: 'n5-15', topicId: 't5', type: 'riseabove', title: '知識的民主化', content: '從文藝復興的印刷術到現代的網際網路，知識載體的改變總是引發思想革命。', author: 'u1', x: 900, y: 700, parentId: 'n5-14', date: Date.now()-25000, cluster: 'C', promisingness: 90 },

                // --- T7: 英文口說 (15 nodes) ---
                { id: 'n7-1', topicId: 't7', type: 'question', title: '不敢開口怎麼辦？', content: '我看得懂也會寫，但遇到外國人就腦袋一片空白，怕講錯文法。', author: 'u3', x: 100, y: 100, parentId: null, date: Date.now()-100000, cluster: 'A', promisingness: 50 },
                { id: 'n7-2', topicId: 't7', type: 'improve', title: '心態調整', content: '溝通的目的是「傳達訊息」，不是「考試」。只要對方聽得懂，文法錯了也沒關係。', author: 'u8', x: 100, y: 300, parentId: 'n7-1', date: Date.now()-90000, cluster: 'B', promisingness: 80 },
                { id: 'n7-3', topicId: 't7', type: 'extend', title: '跟讀法 (Shadowing)', content: '推薦 Echo Method 或 Shadowing。模仿母語人士的語調和斷句，練到肌肉記憶。', author: 'u2', x: 350, y: 300, parentId: 'n7-2', date: Date.now()-85000, cluster: 'B', promisingness: 85 },
                { id: 'n7-4', topicId: 't7', type: 'question', title: '沒有練習對象？', content: '身邊都是台灣人，沒環境怎麼練？', author: 'u6', x: 600, y: 200, parentId: null, date: Date.now()-80000, cluster: 'A', promisingness: 60 },
                { id: 'n7-5', topicId: 't7', type: 'improve', title: '自言自語', content: '可以試著用英文描述自己正在做的事（例如：I am making coffee now）。', author: 'u10', x: 600, y: 400, parentId: 'n7-4', date: Date.now()-75000, cluster: 'B', promisingness: 70 },
                { id: 'n7-6', topicId: 't7', type: 'extend', title: '利用 AI 工具', content: '現在 ChatGPT 的語音功能很強，可以把它當成練口說的家教，它不會笑你，還會糾正你。', author: 'u9', x: 850, y: 400, parentId: 'n7-5', date: Date.now()-70000, cluster: 'B', promisingness: 90 },
                { id: 'n7-7', topicId: 't7', type: 'counter', title: '口音重要嗎？', content: '很多人執著要練成美式或英式口音，但其實有口音很正常，那是身份認同的一部分。', author: 'u5', x: 350, y: 500, parentId: 'n7-3', date: Date.now()-65000, cluster: 'A', promisingness: 75 },
                { id: 'n7-8', topicId: 't7', type: 'improve', title: '清晰度 > 口音', content: '重點是發音 (Pronunciation) 要清晰，重音 (Intonation) 要對，而不是口音 (Accent)。', author: 'u1', x: 600, y: 600, parentId: 'n7-7', date: Date.now()-60000, cluster: 'C', promisingness: 85 },
                { id: 'n7-9', topicId: 't7', type: 'question', title: '字彙量不足', content: '講一講常常卡住，因為想不到那個單字。', author: 'u7', x: 100, y: 600, parentId: 'n7-1', date: Date.now()-55000, cluster: 'A', promisingness: 60 },
                { id: 'n7-10', topicId: 't7', type: 'improve', title: '換句話說 (Paraphrasing)', content: '學會用簡單的字解釋複雜的概念。不知道 "ambitious" 可以說 "really wants to succeed"。', author: 'u4', x: 100, y: 800, parentId: 'n7-9', date: Date.now()-50000, cluster: 'B', promisingness: 90 },
                { id: 'n7-11', topicId: 't7', type: 'riseabove', title: '沉浸式環境', content: '把手機介面改成英文、看 Netflix 開英文字幕，把自己「泡」在英文裡。', author: 'u2', x: 400, y: 800, parentId: 'n7-4', date: Date.now()-45000, cluster: 'C', promisingness: 80 },
                { id: 'n7-12', topicId: 't7', type: 'extend', title: 'Filler Words 的運用', content: '學會用 "Well", "You know", "Let me see" 來爭取思考時間，聽起來會更自然。', author: 'u8', x: 800, y: 600, parentId: 'n7-2', date: Date.now()-40000, cluster: 'B', promisingness: 65 },
                { id: 'n7-13', topicId: 't7', type: 'counter', title: '背演講稿有用嗎？', content: '背 TED Talk 有用嗎？還是會變得太像背書？', author: 'u3', x: 1100, y: 300, parentId: 'n7-3', date: Date.now()-35000, cluster: 'A', promisingness: 50 },
                { id: 'n7-14', topicId: 't7', type: 'improve', title: '內化而非死背', content: '要分析講者的邏輯架構，而不只是背逐字稿。模仿他們的 body language 也有幫助。', author: 'u1', x: 1100, y: 500, parentId: 'n7-13', date: Date.now()-30000, cluster: 'B', promisingness: 75 },
                { id: 'n7-15', topicId: 't7', type: 'riseabove', title: '語言是文化的載體', content: '學英文不只是學語言，更是學習另一種邏輯思維和文化價值觀。', author: 'u6', x: 800, y: 800, parentId: 'n7-8', date: Date.now()-25000, cluster: 'C', promisingness: 95 },

                // --- T8: 病毒 (15 nodes) ---
                { id: 'n8-1', topicId: 't8', type: 'question', title: '病毒是生物嗎？', content: '它有遺傳物質，會演化，但不能自己繁殖，必須寄生。這樣算生物嗎？', author: 'u1', x: 100, y: 100, parentId: null, date: Date.now()-100000, cluster: 'A', promisingness: 50 },
                { id: 'n8-2', topicId: 't8', type: 'extend', title: '生物的定義', content: '傳統定義要有：生長、代謝、反應、生殖。病毒缺乏代謝能力。', author: 'u4', x: 100, y: 300, parentId: 'n8-1', date: Date.now()-90000, cluster: 'B', promisingness: 60 },
                { id: 'n8-3', topicId: 't8', type: 'improve', title: '介於邊緣', content: '科學家通常把它歸類為「介於生物與非生物之間的複雜有機體」。', author: 'u5', x: 350, y: 300, parentId: 'n8-2', date: Date.now()-85000, cluster: 'B', promisingness: 70 },
                { id: 'n8-4', topicId: 't8', type: 'counter', title: '巨型病毒的發現', content: '但最近發現的擬菌病毒 (Mimivirus) 很大，基因也很多，甚至有部分代謝機制，挑戰了邊界。', author: 'u6', x: 600, y: 400, parentId: 'n8-3', date: Date.now()-80000, cluster: 'A', promisingness: 85 },
                { id: 'n8-5', topicId: 't8', type: 'riseabove', title: '連續光譜觀點', content: '生命可能不是二分法 (是/否)，而是一個連續的光譜。病毒處於化學物質演化成生命的過渡階段。', author: 'u1', x: 500, y: 600, parentId: 'n8-4', date: Date.now()-75000, cluster: 'C', promisingness: 90 },
                { id: 'n8-6', topicId: 't8', type: 'question', title: '病毒起源假說', content: '病毒是最早的生命？還是從細胞退化來的？', author: 'u9', x: 800, y: 200, parentId: null, date: Date.now()-70000, cluster: 'A', promisingness: 60 },
                { id: 'n8-7', topicId: 't8', type: 'extend', title: '逃逸假說 (Escaped)', content: '可能是細胞內的 DNA/RNA 片段「逃家」了，獲得了外殼。', author: 'u2', x: 800, y: 400, parentId: 'n8-6', date: Date.now()-65000, cluster: 'B', promisingness: 70 },
                { id: 'n8-8', topicId: 't8', type: 'extend', title: '退化假說 (Regressive)', content: '可能是原本寄生的細胞退化到只剩下核心遺傳物質。', author: 'u8', x: 1050, y: 400, parentId: 'n8-6', date: Date.now()-60000, cluster: 'B', promisingness: 70 },

            else if (maxType === 'counter') { role = "建設性批判者 (Constructive Critic)"; desc = "你勇於挑戰既有假設..."; icon = "fa-gavel"; }

                }).join('');

            const replyCount = nodes.filter(n => n.parentId).length;

            const statsHTML = Object.entries(counts).map(([k, v]) => { 
                const pct = (v / total) * 100; 
                const s = window.SCAFFOLDS[k]; 
                return `<div class="mb-2"><div class="flex justify-between text-xs mb-1"><span class="font-medium text-slate-600 flex items-center gap-1"><i class="fa-solid ${s.icon} ${s.text}"></i> ${s.label}</span><span class="text-slate-400">${Math.round(pct)}%</span></div><div class="w-full bg-slate-100 rounded-full h-1.5"><div class="${s.color} h-1.5 rounded-full transition-all duration-1000" style="width: ${pct}%"></div></div></div>`; 
            }).join('');
            
            return { role, desc, icon, trajectoryHTML, communityHTML, statsHTML };
        };

        // --- 4. Canvas Logic (Isolated Module) ---
        window.app.canvas = {
            renderLoop: () => {
                if (window.state.currentView === 'canvas') {
                    const nodes = window.state.nodes.filter(n => n.topicId === window.state.currentTopicId);
                    if (window.state.canvas.draggedNodeId || window.state.canvas.isAnimating) {
                            window.ui.drawConnections(nodes);
                    }
                }
                requestAnimationFrame(window.app.canvas.renderLoop);
            },
            applyTransform: () => {
                const el = document.getElementById('canvas-content');
                if(el) el.style.transform = `translate(${window.state.canvas.offsetX}px, ${window.state.canvas.offsetY}px) scale(${window.state.canvas.scale})`;
                const bg = document.getElementById('canvas-bg');
                if(bg) bg.style.backgroundPosition = `${window.state.canvas.offsetX}px ${window.state.canvas.offsetY}px`;
            },
            getCoords: (e) => (e.touches && e.touches.length > 0) ? {x: e.touches[0].clientX, y: e.touches[0].clientY} : {x: e.clientX, y: e.clientY},
            getDistance: (touches) => {
                return Math.hypot(
                    touches[0].clientX - touches[1].clientX,
                    touches[0].clientY - touches[1].clientY
                );
            },
            
            toggleMode: () => {
                window.state.canvas.isPanMode = !window.state.canvas.isPanMode;
                const w = document.getElementById('canvas-wrapper');
                if (window.state.canvas.isPanMode) {
                    if(w) w.style.cursor = 'grab';
                    window.state.canvas.isSelecting = false;
                    const sb = document.getElementById('selection-box');
                    if(sb) sb.style.display = 'none';
                    window.ui.showToast('已切換為：拖曳模式 (按左鍵拖曳)', 'success');
                } else {
                    if(w) w.style.cursor = 'default';
                    window.ui.showToast('已切換為：選取模式 (按左鍵框選)', 'info');
                }
                window.ui.renderCanvas();
            },
            
            handleDoubleClick: (e) => {
                if (e.target.closest('.node-card')) return;
                window.app.canvas.toggleMode();
            },

            startPan: (e) => {
                // Pinch to Zoom Logic
                if (e.touches && e.touches.length === 2) {
                    window.state.canvas.isPinching = true;
                    window.state.canvas.lastPinchDist = window.app.canvas.getDistance(e.touches);
                    window.state.canvas.startPinchScale = window.state.canvas.scale;
                    return; // Don't start pan if pinching
                }

                if(e.target.closest('.node-card')) {
                    const nodeId = e.target.closest('.node-card').id.replace('node-', '');
                    if (!e.shiftKey && !e.ctrlKey && !window.state.selectedNodeIds.includes(nodeId)) {
                        window.state.selectedNodeIds = [];
                        // Manually clear classes to avoid re-render that kills double click
                        document.querySelectorAll('.node-card.selected-node').forEach(el => el.classList.remove('selected-node'));
                    }
                    if (!window.state.selectedNodeIds.includes(nodeId)) {
                        window.state.selectedNodeIds.push(nodeId);
                        // 🔥 [OPTIMIZED FIX] Visual update only - NO RENDER CANVAS
                        const card = document.getElementById(`node-${nodeId}`);
                        if(card) card.classList.add('selected-node');
                    }
                    return; 
                }
                if (e.ctrlKey || window.state.canvas.isPanMode) {
                    window.state.canvas.isDragging = true;
                    const c = window.app.canvas.getCoords(e);
                    window.state.canvas.lastX = c.x; 
                    window.state.canvas.lastY = c.y;
                    const w = document.getElementById('canvas-wrapper'); 
                    if(w) w.style.cursor = 'grabbing';
                    return;
                }
                
                window.state.canvas.isSelecting = true;
                const c = window.app.canvas.getCoords(e);
                window.state.canvas.selectionStart = {x: c.x, y: c.y};
                window.state.canvas.selectionCurrent = {x: c.x, y: c.y};
                const box = document.getElementById('selection-box');
                box.style.left = c.x + 'px';
                box.style.top = c.y + 'px';
                box.style.width = '0px';
                box.style.height = '0px';
                box.style.display = 'block';
                if (!e.shiftKey) {
                    window.state.selectedNodeIds = [];
                    // Visual update only
                    document.querySelectorAll('.node-card.selected-node').forEach(el => el.classList.remove('selected-node'));
                }
            },
            pan: (e) => {
                // Pinch to Zoom Logic
                if (window.state.canvas.isPinching && e.touches && e.touches.length === 2) {
                    const dist = window.app.canvas.getDistance(e.touches);
                    const zoomFactor = dist / window.state.canvas.lastPinchDist;
                    const newScale = window.state.canvas.startPinchScale * zoomFactor;
                    window.state.canvas.scale = Math.min(Math.max(0.2, newScale), 3);
                    window.app.canvas.applyTransform();
                    return;
                }

                const c = window.app.canvas.getCoords(e);
                if(window.state.canvas.isDragging) {
                    window.state.canvas.offsetX += c.x - window.state.canvas.lastX;
                    window.state.canvas.offsetY += c.y - window.state.canvas.lastY;
                    window.state.canvas.lastX = c.x; window.state.canvas.lastY = c.y;
                    window.app.canvas.applyTransform();
                } else if(window.state.canvas.draggedNodeId) {
                    const dx = (c.x - window.state.canvas.lastX) / window.state.canvas.scale;
                    const dy = (c.y - window.state.canvas.lastY) / window.state.canvas.scale;
                    
                    // Check if dragged node is part of selection
                    let nodesToMoveIds = [window.state.canvas.draggedNodeId];
                    if (window.state.selectedNodeIds.includes(window.state.canvas.draggedNodeId)) {
                        nodesToMoveIds = window.state.selectedNodeIds;
                    }

                    nodesToMoveIds.forEach(id => {
                        const node = window.state.nodes.find(n => n.id === id);
                        if(node) {
                            node.x += dx;
                            node.y += dy;
                            const el = document.getElementById(`node-${node.id}`);
                            if(el) {
                                el.style.left = `${node.x}px`;
                                el.style.top = `${node.y}px`;
                            }
                        }
                    });

                    window.state.canvas.lastX = c.x; 
                    window.state.canvas.lastY = c.y;
                } else if (window.state.canvas.isSelecting) {
                    window.state.canvas.selectionCurrent = {x: c.x, y: c.y};
                    const start = window.state.canvas.selectionStart;
                    const current = window.state.canvas.selectionCurrent;
                    const x = Math.min(start.x, current.x);
                    const y = Math.min(start.y, current.y);
                    const w = Math.abs(current.x - start.x);
                    const h = Math.abs(current.y - start.y);
                    const box = document.getElementById('selection-box');
                    box.style.left = x + 'px';
                    box.style.top = y + 'px';
                    box.style.width = w + 'px';
                    box.style.height = h + 'px';
                }
            },
            handleEnd: (e) => {
                // Pinch End Logic
                if (window.state.canvas.isPinching && (!e.touches || e.touches.length < 2)) {
                    window.state.canvas.isPinching = false;
                }

                if (window.state.canvas.isDragging) {
                    window.state.canvas.isDragging = false;
                    const cursor = window.state.canvas.isPanMode ? 'grab' : 'default'; 
                    const w = document.getElementById('canvas-wrapper'); 
                    if(w) w.style.cursor = cursor;
                }
                if (window.state.canvas.draggedNodeId) {
                    window.state.canvas.draggedNodeId = null;
                }
                if (window.state.canvas.isSelecting) {
                    const start = window.state.canvas.selectionStart;
                    const current = window.state.canvas.selectionCurrent;
                    const selRect = { 
                        left: Math.min(start.x, current.x), 
                        top: Math.min(start.y, current.y), 
                        right: Math.max(start.x, current.x), 
                        bottom: Math.max(start.y, current.y) 
                    };
                    
                    // If box is tiny, just hide it and return (treat as click)
                    if (Math.abs(selRect.right - selRect.left) < 5 && Math.abs(selRect.bottom - selRect.top) < 5) {
                            window.state.canvas.isSelecting = false;
                            document.getElementById('selection-box').style.display = 'none';
                            return;
                    }

                    const nodeElements = document.querySelectorAll('.node-card');
                    const newSelectedIds = [];
                    nodeElements.forEach(el => {
                        const rect = el.getBoundingClientRect();
                        if (rect.left < selRect.right && rect.right > selRect.left &&
                            rect.top < selRect.bottom && rect.bottom > selRect.top) {
                            const id = el.id.replace('node-', '');
                            newSelectedIds.push(id);
                        }
                    });
                    
                    // Update Selection State
                    newSelectedIds.forEach(id => { 
                        if (!window.state.selectedNodeIds.includes(id)) {
                            window.state.selectedNodeIds.push(id); 
                        }
                    });
                    
                    // 🔥 [CRITICAL FIX] Visual Update Only (Direct DOM Manipulation)
                    // 1. Remove highlight from all nodes first
                    document.querySelectorAll('.node-card.selected-node').forEach(el => {
                        const id = el.id.replace('node-', '');
                        if(!window.state.selectedNodeIds.includes(id)) { 
                             el.classList.remove('selected-node');
                        }
                    });

                    // 2. Add highlight to all currently selected nodes
                    window.state.selectedNodeIds.forEach(id => {
                        const el = document.getElementById(`node-${id}`);
                        if(el) el.classList.add('selected-node');
                    });

                    window.state.canvas.isSelecting = false;
                    document.getElementById('selection-box').style.display = 'none';
                }
            },
            handleWheel: (e) => {
                e.preventDefault();
                const d = -e.deltaY * 0.001;
                window.state.canvas.scale = Math.min(Math.max(0.2, window.state.canvas.scale + d), 3);
                window.app.canvas.applyTransform();
            },
            zoom: (d) => { 
                window.state.canvas.scale = Math.min(Math.max(0.2, window.state.canvas.scale + d), 3); 
                window.app.canvas.applyTransform(); 
            },
            fitView: () => { 
                window.state.canvas.scale = window.innerWidth < 768 ? 0.8 : 1; 
                window.state.canvas.offsetX = 0; 
                window.state.canvas.offsetY = 0; 
                window.app.canvas.applyTransform(); 
            },
            startDrag: (e, id) => {
                window.state.canvas.draggedNodeId = id;
                const c = window.app.canvas.getCoords(e);
                window.state.canvas.lastX = c.x; 
                window.state.canvas.lastY = c.y;
                
                if (!window.state.selectedNodeIds.includes(id)) {
                    if (!e.shiftKey) window.state.selectedNodeIds = [];
                    window.state.selectedNodeIds.push(id);
                    
                    // 🔥 [OPTIMIZED FIX] Visual update only - NO RENDER CANVAS
                    document.querySelectorAll('.node-card').forEach(el => el.classList.remove('selected-node'));
                    window.state.selectedNodeIds.forEach(i => { 
                         const el = document.getElementById(`node-${i}`);
                         if(el) el.classList.add('selected-node');
                    });
                }
            },
            toggleHeatmap: () => {
                window.state.canvas.isHeatmapMode = !window.state.canvas.isHeatmapMode;
                window.ui.renderCanvas(); 
            },
            toggleCluster: () => {
                const isCluster = !window.state.canvas.isClusterMode;
                window.state.canvas.isClusterMode = isCluster;
                const nodes = window.state.nodes.filter(n => n.topicId === window.state.currentTopicId);
                if (isCluster) {
                    const clusterGroups = { 'A': [], 'B': [], 'C': [], 'Other': [] };
                    nodes.forEach(n => {
                        if (window.CLUSTER_CENTERS[n.cluster]) clusterGroups[n.cluster].push(n);
                        else clusterGroups['Other'].push(n);
                    });
                    const targets = [];
                    const nodeW = 320; 
                    const nodeH = 200; 
                    Object.entries(clusterGroups).forEach(([key, groupNodes]) => {
                        const center = window.CLUSTER_CENTERS[key] || {x: 0, y: 0, width: 1000, height: 1000};
                        const cols = Math.max(1, Math.floor(center.width / nodeW));
                        groupNodes.forEach((n, idx) => {
                            if (n.savedX === undefined) { n.savedX = n.x; n.savedY = n.y; }
                            const col = idx % cols;
                            const row = Math.floor(idx / cols);
                            const startX = center.x - ((cols * nodeW) / 2) + (nodeW / 2);
                            const startY = center.y - (center.height / 2) + 100; 
                            const tx = startX + (col * nodeW);
                            const ty = startY + (row * nodeH);
                            targets.push({ id: n.id, x: tx, y: ty });
                        });
                    });
                    window.app.canvas.animateNodes(targets);
                } else {
                    const targets = nodes.map(n => ({ id: n.id, x: n.savedX !== undefined ? n.savedX : n.x, y: n.savedY !== undefined ? n.savedY : n.y }));
                    window.app.canvas.animateNodes(targets);
                }
                window.ui.renderCanvas();
            },
            animateNodes: (targets) => {
                const startPositions = {};
                const nodes = window.state.nodes.filter(n => n.topicId === window.state.currentTopicId);
                nodes.forEach(n => { startPositions[n.id] = {x: n.x, y: n.y}; });
                const duration = 800; 
                const startTime = performance.now(); 
                window.state.canvas.isAnimating = true;
                
                const animate = (time) => {
                    const elapsed = time - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
                    targets.forEach(target => {
                        const node = nodes.find(n => n.id === target.id);
                        if (node) {
                            const start = startPositions[target.id];
                            node.x = start.x + (target.x - start.x) * ease;
                            node.y = start.y + (target.y - start.y) * ease;
                            const el = document.getElementById(`node-${node.id}`);
                            if (el) { el.style.left = `${node.x}px`; el.style.top = `${node.y}px`; }
                        }
                    });
                    if (progress < 1) { 
                        requestAnimationFrame(animate); 
                    } else { 
                        window.state.canvas.isAnimating = false;
                        targets.forEach(target => { 
                            const node = nodes.find(n => n.id === target.id); 
                            if(node) { node.x = target.x; node.y = target.y; } 
                        });

                        <h3 class="font-bold text-lg flex items-center gap-2"><i class="fa-solid fa-robot text-indigo-600"></i> 我的知識建構檔案 (KB Profile)</h3>
                        <button onclick="window.app.generateAIProfile()" id="btn-gen-profile" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-700 transition flex items-center gap-2"><i class="fa-solid fa-wand-magic-sparkles"></i> <span>生成分析</span></button>
                    </div>
                    <div id="ai-loading" class="hidden p-8 text-center bg-white rounded-2xl border border-slate-100">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mb-2"></div>
                        <p class="text-sm text-slate-500 animate-pulse">正在回顧你的知識演化軌跡...</p>
                    </div>
                    <div id="ai-profile-result" class="hidden space-y-4"></div>
                </div>
            </div>`;
            
            if (window.state.profile && document.getElementById('ai-profile-result')) { 
                window.ui.renderProfileContent(window.state.profile); 
            }
        };
        
        window.ui.renderProfileContent = (data) => {
            const result = document.getElementById('ai-profile-result');
            result.innerHTML = `
            <div class="animate-fade-in bg-white p-5 rounded-xl shadow-sm border-l-4 border-indigo-500 relative overflow-hidden">
                <div class="absolute right-0 top-0 opacity-5 transform translate-x-4 -translate-y-4"><i class="fa-solid ${data.icon} text-9xl text-indigo-900"></i></div>
                <h4 class="text-sm font-bold text-indigo-500 uppercase tracking-wider mb-3 flex items-center gap-2"><i class="fa-solid fa-fire"></i> 使用者知識角色</h4>
                <div class="relative z-10">
                    <p class="text-xl font-bold text-slate-800 mb-2">${data.role}</p>
                    <p class="text-sm text-slate-600 leading-relaxed">${data.desc}</p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="animate-fade-in bg-white p-5 rounded-xl shadow-sm border-l-4 border-green-500" style="animation-delay: 0.1s">
                    <h4 class="text-sm font-bold text-green-600 uppercase tracking-wider mb-4 flex items-center gap-2"><i class="fa-solid fa-seedling"></i> 想法演化軌跡</h4>
                    <div class="pl-2">${data.trajectoryHTML}</div>
                </div>
                <div class="animate-fade-in bg-white p-5 rounded-xl shadow-sm border-l-4 border-blue-500" style="animation-delay: 0.2s">
                    <h4 class="text-sm font-bold text-blue-600 uppercase tracking-wider mb-4 flex items-center gap-2"><i class="fa-solid fa-puzzle-piece"></i> 社群推動力</h4>
                    ${data.communityHTML}
                </div>
            </div>
            <div class="animate-fade-in bg-white p-5 rounded-xl shadow-sm border-l-4 border-purple-500" style="animation-delay: 0.3s">
                <h4 class="text-sm font-bold text-purple-600 uppercase tracking-wider mb-4 flex items-center gap-2"><i class="fa-solid fa-chart-pie"></i> 知識建構策略分佈</h4>
                <p class="text-xs text-slate-500 mb-4">這顯示了你在知識建構過程中所使用的認知策略多樣性 (Idea Diversity)：</p>
                <div class="grid grid-cols-1 gap-2">${data.statsHTML}</div>
            </div>`;
            result.classList.remove('hidden');
        };
        
        window.ui.drawNodes = (nodes) => {
            document.getElementById('nodes-layer').innerHTML = nodes.map(node => {
                const s = window.SCAFFOLDS[node.type];
                const user = Object.values(window.state.userList).find(u => u.id === node.author) || {name: '?'};
                const canDel = window.state.user.role === window.ROLES.LEAD || node.author === window.state.user.id;
                const isPromising = window.state.canvas.isHeatmapMode && node.promisingness > 70;
                const heatmapClass = isPromising ? 'promising-node' : '';
                const flameBadge = isPromising ? `<div class="absolute -top-3 -right-2 bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full flex items-center gap-1 shadow-sm animate-bounce-slow z-50"><i class="fa-solid fa-fire"></i> 熱點</div>` : '';
                const isSelected = window.state.selectedNodeIds.includes(node.id) ? 'selected-node' : '';
                return `
                <div id="node-${node.id}" class="absolute node-card w-64 md:w-72 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-visible ${heatmapClass} ${isSelected}" style="left: ${node.x}px; top: ${node.y}px;" onmousedown="event.stopPropagation(); window.app.canvas.startDrag(event, '${node.id}')" ontouchstart="event.stopPropagation(); window.app.canvas.startDrag(event, '${node.id}')" ondblclick="event.stopPropagation(); window.app.openNodeDetail('${node.id}')">
                    ${flameBadge}
                    <div class="px-3 py-2 ${s.bgSoft} border-b ${s.border} flex justify-between items-center cursor-move rounded-t-xl">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 rounded-full ${s.color} text-white flex justify-center items-center text-xs"><i class="fa-solid ${s.icon}"></i></span>
                            <span class="text-xs font-bold ${s.text}">${s.label}</span>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="event.stopPropagation(); window.app.openNodeDetail('${node.id}')" class="w-8 h-8 rounded hover:bg-white/50 text-slate-500 flex justify-center items-center"><i class="fa-solid fa-eye"></i></button>
                            <button onclick="event.stopPropagation(); window.app.openComposer('${node.id}')" class="w-8 h-8 rounded hover:bg-white/50 text-slate-500 flex justify-center items-center"><i class="fa-solid fa-reply"></i></button>
                            ${canDel ? `<button onclick="event.stopPropagation(); window.app.deleteNode('${node.id}')" class="w-8 h-8 rounded hover:bg-white/50 text-slate-500 hover:text-red-500 flex justify-center items-center"><i class="fa-solid fa-xmark"></i></button>` : ''}
                        </div>
                    </div>
                    <div class="p-3 text-sm text-slate-700 leading-relaxed min-h-[60px] pointer-events-none bg-white">
                        <h4 class="font-bold mb-1 text-slate-900 block truncate text-base">${node.title || '無標題'}</h4>
                        <p class="line-clamp-2 text-slate-600">${node.content}</p>
                    </div>
                    <div class="px-3 py-2 bg-slate-50 border-t flex justify-between text-[10px] text-slate-500 items-center rounded-b-xl">
                        <div class="flex items-center gap-2">
                            <img src="${user.avatar}" class="w-4 h-4 rounded-full">
                            <span>${user.name}</span>
                        </div>
                        <span>${new Date(node.date).toLocaleDateString()}</span>
                    </div>
                </div>`;
            }).join('');
        };
        
        window.ui.drawConnections = (nodes) => { 
            const layer = document.getElementById('connections-layer');
            if(!layer) return;
            layer.innerHTML = `<defs>${Object.keys(window.SCAFFOLDS).map(k => { 
                const c = { question: '#3b82f6', extend: '#eab308', improve: '#22c55e', counter: '#ef4444', riseabove: '#a855f7' }[k]; 
                return `<marker id="arrow-${k}" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="${c}" /></marker>`; 
            }).join('')}</defs>`;
            
            const cardWidth = window.innerWidth < 768 ? 256 : 288;
            const halfW = cardWidth / 2;
            
            const paths = nodes.filter(n => n.parentId).map(node => {
                const parent = window.state.nodes.find(p => p.id === node.parentId);
                if (!parent) return '';
                const startX = parent.x + halfW; 
                const startY = parent.y + 140; 
                const endX = node.x + halfW; 
                const endY = node.y;
                
                const dist = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                let curveFactor = 0.4; 
                if (endY < startY) curveFactor = 0.6; 
                
                const cp1x = startX; 
                const cp1y = startY + dist * curveFactor; 
                const cp2x = endX; 
                const cp2y = endY - dist * curveFactor;
                const colorMap = { question: '#3b82f6', extend: '#eab308', improve: '#22c55e', counter: '#ef4444', riseabove: '#a855f7' };
                
                return `<path d="M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}" stroke="${colorMap[node.type]}" fill="none" stroke-width="2" stroke-opacity="0.6" marker-end="url(#arrow-${node.type})" />`;
            }).join('');
            
            layer.innerHTML += paths;
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (window.ui && typeof window.ui.init === 'function') {
                window.ui.init();
            } else {
                console.error("UI Init failed");
            }
        });
    </script>
    <script async data-explicit-opt-in="true" data-cookie-opt-in="true" data-deployment-id="dpl_9RLRsCafPtrzbyED6G6LKCapvJtC" src="https://vercel.live/_next-live/feedback/feedback.js"></script>
</body>
